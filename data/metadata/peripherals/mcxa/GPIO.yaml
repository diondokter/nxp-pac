    description: Secure access.
    value: 0
  - name: Nse1
    description: Nonsecure access.
    value: 1
enum/IcnsNse1:
  bit_size: 1
  variants:
  - name: Nse0
    description: Secure access.
    value: 0
  - name: Nse1
    description: Nonsecure access.
    value: 1
enum/Irqc:
  bit_size: 4
  variants:
  - name: Irqc0
    description: ISF is disabled.
    value: 0
  - name: Irqc1
    description: ISF and DMA request on rising edge.
    value: 1
  - name: Irqc2
    description: ISF and DMA request on falling edge.
    value: 2
  - name: Irqc3
    description: ISF and DMA request on either edge.
    value: 3
  - name: Irqc5
    description: ISF sets on rising edge.
    value: 5
  - name: Irqc6
    description: ISF sets on falling edge.
    value: 6
  - name: Irqc7
    description: ISF sets on either edge.
    value: 7
  - name: Irqc8
    description: ISF and interrupt when logic 0.
    value: 8
  - name: Irqc9
    description: ISF and interrupt on rising edge.
    value: 9
  - name: Irqc10
    description: ISF and interrupt on falling edge.
    value: 10
  - name: Irqc11
    description: ISF and Interrupt on either edge.
    value: 11
  - name: Irqc12
    description: ISF and interrupt when logic 1.
    value: 12
  - name: Irqc13
    description: Enable active-high trigger output; ISF on rising edge (pin state is ORed with other enabled triggers to generate the output trigger for use by other peripherals).
    value: 13
  - name: Irqc14
    description: Enable active-low trigger output; ISF on falling edge (pin state is inverted and ORed with other enabled triggers to generate the output trigger for use by other peripherals).
    value: 14
enum/Irqs:
  bit_size: 1
  variants:
  - name: Irqs0
    description: Interrupt, trigger output, or DMA request 0.
    value: 0
  - name: Irqs1
    description: Interrupt, trigger output, or DMA request 1.
    value: 1
enum/Isf:
  bit_size: 1
  variants:
  - name: Isf0
    description: Not detected.
    value: 0
  - name: Isf1
    description: Detected.
    value: 1
