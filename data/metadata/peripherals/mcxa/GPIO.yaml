    value: 0
  - name: Pdd1
    description: Output.
    value: 1
enum/Pid:
  bit_size: 1
  variants:
  - name: Pid0
    description: Configured for general-purpose input.
    value: 0
  - name: Pid1
    description: Disabled for general-purpose input.
    value: 1
enum/Ptco:
  bit_size: 1
  variants:
  - name: Ptco0
    description: No change.
    value: 0
  - name: Ptco1
    description: Corresponding field in PDOR becomes 0.
    value: 1
enum/Ptso:
  bit_size: 1
  variants:
  - name: Ptso0
    description: No change.
    value: 0
  - name: Ptso1
    description: Corresponding field in PDOR becomes 1.
    value: 1
