enum/Addrcfg:
  bit_size: 3
  variants:
  - name: ADDRESS_MATCH0_7_BIT
    description: Address match 0 (7-bit).
    value: 0
  - name: ADDRESS_MATCH0_10_BIT
    description: Address match 0 (10-bit).
    value: 1
  - name: ADDRESS_MATCH0_7_BIT_OR_ADDRESS_MATCH1_7_BIT
    description: Address match 0 (7-bit) or address match 1 (7-bit).
    value: 2
  - name: ADDRESS_MATCH0_10_BIT_OR_ADDRESS_MATCH1_10_BIT
    description: Address match 0 (10-bit) or address match 1 (10-bit).
    value: 3
  - name: ADDRESS_MATCH0_7_BIT_OR_ADDRESS_MATCH1_10_BIT
    description: Address match 0 (7-bit) or address match 1 (10-bit).
    value: 4
  - name: ADDRESS_MATCH0_10_BIT_OR_ADDRESS_MATCH1_7_BIT
    description: Address match 0 (10-bit) or address match 1 (7-bit).
    value: 5
  - name: FROM_ADDRESS_MATCH0_7_BIT_TO_ADDRESS_MATCH1_7_BIT
    description: From address match 0 (7-bit) to address match 1 (7-bit).
    value: 6
  - name: FROM_ADDRESS_MATCH0_10_BIT_TO_ADDRESS_MATCH1_10_BIT
    description: From address match 0 (10-bit) to address match 1 (10-bit).
    value: 7
enum/Alf:
  bit_size: 1
  variants:
  - name: INT_NO
    description: Controller did not lose arbitration.
    value: 0
  - name: INT_YES
    description: Controller lost arbitration.
    value: 1
enum/Anv:
  bit_size: 1
  variants:
  - name: VALID
    description: Valid.
    value: 0
  - name: NOT_VALID
    description: Not valid.
    value: 1
enum/Cmd:
  bit_size: 3
  variants:
  - name: TRANSMIT
    description: Transmit value in DATA[7:0]
    value: 0
  - name: RECEIVE
    description: Receive (DATA[7:0] + 1) bytes.
    value: 1
  - name: STOP
    description: Generate Stop condition on I2C bus.
    value: 2
  - name: RECEIVE_AND_DISCARD
    description: Receive and discard (DATA[7:0] + 1) bytes.
    value: 3
  - name: START
    description: Generate (repeated) Start on the I2C bus and transmit the address in DATA[7:0]
    value: 4
  - name: START_EXPECT_NACK
    description: Generate (repeated) Start on the I2C bus and transmit the address in DATA[7:0] expecting a NACK response
    value: 5
  - name: START_HS
    description: Generate (repeated) Start on the I2C bus and transmit the address in DATA[7:0] using HS mode
    value: 6
  - name: START_HS_EXPECT_NACK
    description: Generate (repeated) Start on the I2C bus and transmit the address in DATA[7:0] using HS mode expecting a NACK response
    value: 7
enum/Dmf:
  bit_size: 1
  variants:
  - name: INT_NO
    description: Matching data not received.
    value: 0
  - name: INT_YES
    description: Matching data received.
    value: 1
enum/Dozen:
  bit_size: 1
