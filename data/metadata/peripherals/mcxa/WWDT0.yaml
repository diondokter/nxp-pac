block/WWDT0:
  description: Windowed Watchdog Timer.
  items:
  - name: MOD
    description: Mode.
    byte_offset: 0
    fieldset: MOD
  - name: TC
    description: Timer Constant.
    byte_offset: 4
    fieldset: TC
  - name: FEED
    description: Feed Sequence.
    byte_offset: 8
    access: Write
    fieldset: FEED
  - name: TV
    description: Timer Value.
    byte_offset: 12
    access: Read
    fieldset: TV
  - name: WARNINT
    description: Warning Interrupt Compare Value.
    byte_offset: 20
    fieldset: WARNINT
  - name: WINDOW
    description: Window Compare Value.
    byte_offset: 24
    fieldset: WINDOW
fieldset/FEED:
  description: Feed Sequence.
  fields:
  - name: FEED
    description: Feed Value.
    bit_offset: 0
    bit_size: 8
fieldset/MOD:
  description: Mode.
  fields:
  - name: WDEN
    description: Watchdog Enable.
    bit_offset: 0
    bit_size: 1
    enum: WDEN
  - name: WDRESET
    description: Watchdog Reset Enable.
    bit_offset: 1
    bit_size: 1
    enum: WDRESET
  - name: WDTOF
    description: Watchdog Timeout Flag.
    bit_offset: 2
    bit_size: 1
    enum: WDTOF
  - name: WDINT
    description: Warning Interrupt Flag.
    bit_offset: 3
    bit_size: 1
  - name: WDPROTECT
    description: Watchdog Update Mode.
    bit_offset: 4
    bit_size: 1
    enum: WDPROTECT
  - name: LOCK
    description: Lock.
    bit_offset: 5
    bit_size: 1
fieldset/TC:
  description: Timer Constant.
  fields:
  - name: COUNT
    description: Watchdog Timeout Value.
    bit_offset: 0
    bit_size: 24
fieldset/TV:
  description: Timer Value.
  fields:
  - name: COUNT
    description: Counter Timer Value.
    bit_offset: 0
    bit_size: 24
fieldset/WARNINT:
  description: Warning Interrupt Compare Value.
  fields:
  - name: WARNINT
    description: Watchdog Warning Interrupt Compare Value.
    bit_offset: 0
    bit_size: 10
fieldset/WINDOW:
  description: Window Compare Value.
  fields:
  - name: WINDOW
    description: Watchdog Window Value.
    bit_offset: 0
    bit_size: 24
enum/WDEN:
  bit_size: 1
  variants:
  - name: STOP
    description: Timer stopped.
    value: 0
  - name: RUN
    description: Timer running.
    value: 1
enum/WDPROTECT:
  bit_size: 1
  variants:
  - name: FLEXIBLE
    description: Flexible.
    value: 0
  - name: THRESHOLD
    description: Threshold.
    value: 1
enum/WDRESET:
  bit_size: 1
  variants:
  - name: INTERRUPT
    description: Interrupt.
    value: 0
  - name: RESET
    description: Reset.
    value: 1
enum/WDTOF:
  bit_size: 1
  variants:
  - name: CLEAR
    description: Watchdog event has not occurred.
    value: 0
  - name: RESET
    description: Watchdog event has occurred (causes a chip reset if WDRESET = 1).
    value: 1
