    description: Disabled.
    value: 0
  - name: CMP0IE1
    description: Enabled.
    value: 1
enum/CMP0IRQ:
  bit_size: 1
  variants:
  - name: CMP0IRQ0
    description: No match has occurred (the position counter does not match the COMP0 value).
    value: 0
  - name: CMP0IRQ1
    description: COMP match has occurred (the position counter matches the COMP0 value).
    value: 1
enum/CMP1F:
  bit_size: 1
  variants:
  - name: CMP1F0
    description: When the position counter is less than value of COMP1 register.
    value: 0
  - name: CMP1F1
    description: When the position counter is greater or equal than value of COMP1 register.
    value: 1
