    value: 0
  - name: CMPF01
    description: When the position counter is greater or equal than value of COMP0 register.
    value: 1
enum/DIR:
  bit_size: 1
  variants:
  - name: DIR0
    description: Current count was in the down direction.
    value: 0
  - name: DIR1
    description: Current count was in the up direction.
    value: 1
enum/DIRIE:
  bit_size: 1
  variants:
  - name: DIRIE0
    description: Disabled.
    value: 0
  - name: DIRIE1
    description: Enabled.
    value: 1
enum/DIRIRQ:
  bit_size: 1
  variants:
  - name: DIRIRQ0
    description: Count direction unchanged.
    value: 0
  - name: DIRIRQ1
    description: Count direction changed.
    value: 1
enum/DMAEN:
  bit_size: 1
  variants:
  - name: DMAEN_0
    description: DMA is disabled.
    value: 0
  - name: DMAEN_1
    description: DMA is enabled. DMA request asserts automatically when the values in the outer-set of buffered compare registers (UCOMP0/LCOMP0;UCOMP1/LCOMP1;UCOMP2/LCOMP2;UCOMP3/LCOMP3), initial registers(UINIT/LINIT) and modulus registers (UMOD/LMOD) are loaded into the inner-set of buffer and then LDOK is cleared automatically. After the completion of this DMA transfer, LDOK is set automatically, it ensures outer-set values can be loaded into inner-set which in turn triggers DMA again.
    value: 1
enum/EMIP:
  bit_size: 1
  variants:
  - name: EMIP0
    description: disables the position counter to be initialized by Index Event Edge Mark.
    value: 0
  - name: EMIP1
    description: enables the position counter to be initialized by Index Event Edge Mark.
    value: 1
enum/FILT_CS:
  bit_size: 1
  variants:
  - name: FILT_CS0
    description: Peripheral Clock.
    value: 0
  - name: FILT_CS1
    description: Prescaled peripheral clock by PRSC.
    value: 1
enum/HIE:
  bit_size: 1
  variants:
  - name: HIE0
    description: Disabled.
    value: 0
  - name: HIE1
    description: Enabled.
    value: 1
enum/HIP:
  bit_size: 1
  variants:
  - name: HIP0
    description: No action.
    value: 0
  - name: HIP1
    description: HOME signal initializes the position counter.
    value: 1
enum/HIRQ:
  bit_size: 1
  variants:
  - name: HIRQ0
    description: No transition on the HOME/ENABLE signal has occurred.
    value: 0
  - name: HIRQ1
    description: A transition on the HOME/ENABLE signal has occurred.
    value: 1
enum/HNE:
  bit_size: 1
  variants:
  - name: HNE0
    description: When CTRL[OPMODE] = 0,use HOME positive edge to trigger initialization of position counters. When CTRL[OPMODE] = 1,use ENABLE high level to enable POS/POSD/WDG/REV counters.
    value: 0
  - name: HNE1
    description: When CTRL[OPMODE] = 0,use HOME negative edge to trigger initialization of position counters. When CTRL[OPMODE] = 1,use ENABLE low level to enable POS/POSD/WDG/REV counters.
    value: 1
enum/INITPOS:
  bit_size: 1
  variants:
  - name: INITPOS0
    description: Don't initialize position counter on rising edge of TRIGGER.
    value: 0
  - name: INITPOS1
    description: Initialize position counter on rising edge of TRIGGER.
    value: 1
enum/LDMOD:
  bit_size: 1
  variants:
  - name: LDMOD0
    description: Buffered registers are loaded and take effect immediately upon CTRL[LDOK] is set.
    value: 0
  - name: LDMOD1
    description: Buffered registers are loaded and take effect at the next roll-over or roll-under if CTRL[LDOK] is set.
    value: 1
enum/LDOK:
  bit_size: 1
  variants:
  - name: LDOK0
    description: No loading action taken. Users can write new values to buffered registers (writing into outer-set of these buffered registers).
    value: 0
  - name: LDOK1
    description: Outer-set values are ready to be loaded into inner-set and take effect. The loading time point depends on CTRL2[LDMOD].
    value: 1
enum/ONCE:
  bit_size: 1
  variants:
  - name: ONCE0
    description: Position counter counts repeatedly.
    value: 0
  - name: ONCE1
    description: Position counter counts until roll-over or roll-under, then stop.
    value: 1
enum/OPMODE:
  bit_size: 1
  variants:
  - name: OPMODE0
    description: 'Decode Mode: Input nodes INDEX/PRESET and HOME/ENABLE are assigned to function of INDEX and HOME.'
    value: 0
  - name: OPMODE1
    description: 'Count Mode: Input nodes INDEX/PRESET and HOME/ENABLE are assigned to functions of PRESET and ENABLE. In this mode: (1)only when ENABLE=1, all counters (position/position difference/revolution/watchdog) can run, when ENABLE=0, all counters (position/position difference/revolution/watchdog) can''t run. (2) the rising edge of PRESET input can initialize position/revolution/watchdog counters (position counter initialization also need referring to bit CTRL[REV]).'
    value: 1
enum/OUTCTL:
  bit_size: 1
  variants:
  - name: OUTCTL0
    description: POS_MATCH[x](x range is 0-3) is asserted when the Position Counter is equal to according compare value (UCOMPx/LCOMPx)(x range is 0-3), and de-asserted when the Position Counter not equal to the compare value (UCOMPx/LCOMPx)(x range is 0-3).
    value: 0
  - name: OUTCTL1
    description: All POS_MATCH[x](x range is 0-3) are asserted a pulse, when the UPOS, LPOS, REV, or POSD registers are read.
    value: 1
enum/PH1:
  bit_size: 1
  variants:
  - name: PH10
    description: Standard quadrature decoder, where PHASEA and PHASEB represent a two-phase quadrature signal.
    value: 0
  - name: PH11
    description: Single phase mode, bypass the quadrature decoder, refer to CTRL2[CMODE] description.
    value: 1
enum/PMEN:
  bit_size: 1
  variants:
  - name: PMEN0
    description: Period measurement functions are not used. POSD is loaded to POSDH and then cleared whenever POSD, UPOS, LPOS or REV is read.
    value: 0
  - name: PMEN1
    description: Period measurement functions are used. POSD is loaded into POSDH and then cleared only when POSD is read.
    value: 1
enum/QDN:
  bit_size: 1
  variants:
  - name: QDN0
    description: Generates a positive quadrature decoder signal.
    value: 0
  - name: QDN1
    description: Generates a negative quadrature decoder signal.
    value: 1
enum/REV_VAL:
  bit_size: 1
  variants:
  - name: REV0
    description: Count normally and the position counter initialization uses upper/lower initialization register UINIT/LINIT.
    value: 0
  - name: REV1
    description: Count in the reverse direction and the position counter initialization uses upper/lower modulus register UMOD/LMOD.
    value: 1
enum/REVMOD:
  bit_size: 1
  variants:
  - name: REVMOD0
    description: Use INDEX pulse to increment/decrement revolution counter (REV).
    value: 0
  - name: REVMOD1
    description: Use modulus counting roll-over/under to increment/decrement revolution counter (REV).
    value: 1
enum/ROIE:
  bit_size: 1
  variants:
  - name: ROIE
    description: Disabled.
    value: 0
  - name: ROIE1
    description: Enabled.
    value: 1
enum/ROIRQ:
  bit_size: 1
  variants:
  - name: ROIRQ0
    description: No roll-over has occurred.
    value: 0
  - name: ROIRQ1
    description: Roll-over has occurred.
    value: 1
enum/RUIE:
  bit_size: 1
  variants:
  - name: RUIE0
    description: Disabled.
    value: 0
  - name: RUIE1
    description: Enabled.
    value: 1
enum/RUIRQ:
  bit_size: 1
  variants:
  - name: RUIRQ0
    description: No roll-under has occurred.
    value: 0
  - name: RUIRQ1
    description: Roll-under has occurred.
    value: 1
enum/SABIE:
  bit_size: 1
  variants:
  - name: SABIE0
    description: Disabled.
    value: 0
  - name: SABIE1
    description: Enabled.
    value: 1
enum/SABIRQ:
  bit_size: 1
  variants:
  - name: SABIRQ0
    description: No simultaneous change of PHASEA and PHASEB has occurred.
    value: 0
  - name: SABIRQ1
    description: A simultaneous change of PHASEA and PHASEB has occurred.
    value: 1
enum/SWIP:
  bit_size: 1
  variants:
  - name: SWIP0
    description: No action.
    value: 0
  - name: SWIP1
    description: Initialize position counter.
    value: 1
enum/TCE:
  bit_size: 1
  variants:
  - name: TCE0
    description: Disabled.
    value: 0
  - name: TCE1
    description: Enabled.
    value: 1
enum/TEN:
  bit_size: 1
  variants:
  - name: TEN0
    description: Disabled.
    value: 0
  - name: TEN1
    description: Enabled.
    value: 1
enum/WDE:
  bit_size: 1
  variants:
  - name: WDE0
    description: Disabled.
    value: 0
  - name: WDE1
    description: Enabled.
    value: 1
enum/WDIE:
  bit_size: 1
  variants:
  - name: WDIE0
    description: Disabled.
    value: 0
  - name: WDIE1
    description: Enabled.
    value: 1
enum/WDIRQ:
  bit_size: 1
  variants:
  - name: WDIRQ0
    description: No Watchdog timeout interrupt has occurred.
    value: 0
  - name: WDIRQ1
    description: Watchdog timeout interrupt has occurred.
    value: 1
enum/XIE:
  bit_size: 1
  variants:
  - name: XIE0
    description: Disabled.
    value: 0
  - name: XIE1
    description: Enabled.
    value: 1
enum/XIP:
  bit_size: 1
  variants:
  - name: XIP0
    description: INDEX pulse does not initialize the position counter.
    value: 0
  - name: XIP1
    description: INDEX pulse initializes the position counter.
    value: 1
enum/XIRQ:
  bit_size: 1
  variants:
  - name: XIRQ0
    description: INDEX/PRESET pulse has not occurred.
    value: 0
  - name: XIRQ1
    description: INDEX/PRESET pulse has occurred.
    value: 1
enum/XNE:
  bit_size: 1
  variants:
  - name: XNE0
    description: Use positive edge of INDEX/PRESET pulse.
    value: 0
  - name: XNE1
    description: Use negative edge of INDEX/PRESET pulse.
    value: 1
