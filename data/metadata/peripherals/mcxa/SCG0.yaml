    bit_size: 1
  - name: SPLLSTEN
    description: SPLL Stop Enable.
    bit_offset: 2
    bit_size: 1
    enum: SPLLSTEN
  - name: FRM_CLOCKSTABLE
    description: Free running mode clock stable.
    bit_offset: 3
    bit_size: 1
  - name: SPLLCM
    description: SPLL Clock Monitor.
    bit_offset: 16
    bit_size: 1
  - name: SPLLCMRE
    description: SPLL Clock Monitor Reset Enable.
    bit_offset: 17
    bit_size: 1
    enum: SPLLCMRE
  - name: LK
    description: Lock Register.
    bit_offset: 23
    bit_size: 1
    enum: SPLLCSR_LK
  - name: SPLL_LOCK
    description: SPLL LOCK.
    bit_offset: 24
    bit_size: 1
    enum: SPLL_LOCK
  - name: SPLLSEL
    description: SPLL Selected.
    bit_offset: 25
    bit_size: 1
  - name: SPLLERR
    description: SPLL Clock Error.
    bit_offset: 26
    bit_size: 1
    enum: SPLLERR
  - name: SPLL_LOCK_IE
    description: SPLL LOCK Interrupt Enable.
    bit_offset: 30
    bit_size: 1
fieldset/SPLLCTRL:
  description: SPLL Control Register.
  fields:
  - name: SELR
    description: Bandwidth select R (resistor) value.
    bit_offset: 0
    bit_size: 4
  - name: SELI
    description: Bandwidth select I (interation) value.
    bit_offset: 4
    bit_size: 6
  - name: SELP
    description: Bandwidth select P (proportional) value.
    bit_offset: 10
    bit_size: 5
  - name: BYPASSPOSTDIV2
    description: Bypass of the divide-by-2 divider.
    bit_offset: 16
    bit_size: 1
  - name: LIMUPOFF
    description: Up Limiter.
    bit_offset: 17
    bit_size: 1
  - name: BANDDIRECT
    description: Control of the bandwidth of the PLL.
    bit_offset: 18
    bit_size: 1
  - name: BYPASSPREDIV
    description: Bypass of the pre-divider.
    bit_offset: 19
    bit_size: 1
  - name: BYPASSPOSTDIV
    description: Bypass of the post-divider.
    bit_offset: 20
    bit_size: 1
  - name: FRM
    description: Free Running Mode Enable.
    bit_offset: 22
    bit_size: 1
  - name: SOURCE
    description: Clock Source.
    bit_offset: 25
    bit_size: 2
    enum: SOURCE
fieldset/SPLLLOCK_CNFG:
  description: SPLL LOCK Configuration Register.
  fields:
