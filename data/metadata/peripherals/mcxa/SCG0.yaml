    description: Feedback ratio change request.
    bit_offset: 31
    bit_size: 1
fieldset/SPLLNDIV:
  description: SPLL N Divider Register.
  fields:
  - name: NDIV
    description: Pre-divider divider ratio (N-divider).
    bit_offset: 0
    bit_size: 8
  - name: NREQ
    description: Pre-divider ratio change request.
    bit_offset: 31
    bit_size: 1
fieldset/SPLLPDIV:
  description: SPLL P Divider Register.
  fields:
  - name: PDIV
    description: Post-divider divider ratio (P-divider).
    bit_offset: 0
    bit_size: 5
  - name: PREQ
    description: Post-divider ratio change request.
    bit_offset: 31
    bit_size: 1
fieldset/SPLLSSCG0:
  description: SPLL Spread Spectrum Control 0 Register.
  fields:
  - name: SS_MDIV_LSB
    description: SS_MDIV[31:0].
    bit_offset: 0
    bit_size: 32
fieldset/SPLLSSCG1:
  description: SPLL Spread Spectrum Control 1 Register.
  fields:
  - name: SS_MDIV_MSB
    description: SS_MDIV[32].
    bit_offset: 0
    bit_size: 1
  - name: SS_MDIV_REQ
    description: SS_MDIV[32:0] change request.
    bit_offset: 1
    bit_size: 1
  - name: MF
    description: Modulation Frequency Control.
    bit_offset: 2
    bit_size: 3
  - name: MR
    description: Modulation Depth Control.
    bit_offset: 5
    bit_size: 3
  - name: MC
    description: Modulation Waveform Control.
    bit_offset: 8
    bit_size: 2
  - name: DITHER
    description: Dither Enable.
    bit_offset: 10
    bit_size: 1
  - name: SEL_SS_MDIV
    description: SS_MDIV select.
    bit_offset: 11
    bit_size: 1
  - name: SS_PD
    description: SSCG Power Down.
    bit_offset: 31
    bit_size: 1
fieldset/SPLLSSCGSTAT:
  description: SPLL SSCG Status Register.
  fields:
  - name: SS_MDIV_ACK
    description: SS_MDIV change acknowledge.
    bit_offset: 0
    bit_size: 1
fieldset/SPLLSTAT:
  description: SPLL Status Register.
  fields:
  - name: NDIVACK
    description: Pre-divider (N) ratio change acknowledge.
    bit_offset: 1
    bit_size: 1
  - name: MDIVACK
    description: Feedback (M) divider ratio change acknowledge.
    bit_offset: 2
    bit_size: 1
  - name: PDIVACK
    description: Post-divider (P) ratio change acknowledge.
    bit_offset: 3
    bit_size: 1
  - name: FRMDET
    description: Free running detector (active high).
    bit_offset: 4
    bit_size: 1
fieldset/TRIM_LOCK:
  description: Trim Lock register.
  fields:
  - name: TRIM_UNLOCK
    description: TRIM_UNLOCK.
    bit_offset: 0
    bit_size: 1
    enum: TRIM_UNLOCK
  - name: IFR_DISABLE
    description: IFR_DISABLE.
    bit_offset: 1
    bit_size: 1
    enum: IFR_DISABLE
  - name: TRIM_LOCK_KEY
    description: TRIM_LOCK_KEY.
    bit_offset: 16
    bit_size: 16
fieldset/VERID:
  description: Version ID Register.
  fields:
  - name: VERSION
    description: SCG Version Number.
    bit_offset: 0
    bit_size: 32
enum/CSR_SCS:
  bit_size: 3
  variants:
  - name: SOSC
    description: SOSC.
    value: 1
  - name: SIRC
    description: SIRC.
    value: 2
  - name: FIRC
    description: FIRC.
    value: 3
  - name: ROSC
    description: ROSC.
    value: 4
  - name: SPLL
    description: SPLL.
    value: 6
enum/EREFS:
  bit_size: 1
  variants:
  - name: EXTERNAL
    description: External reference clock selected.
    value: 0
  - name: INTERNAL
    description: Internal crystal oscillator of OSC selected.
    value: 1
enum/FIRCACC:
  bit_size: 1
  variants:
  - name: NOT_ENABLED_OR_NOT_VALID
    description: FIRC is not enabled or clock is not accurate.
    value: 0
  - name: ENABLED_AND_VALID
    description: FIRC is enabled and output clock is accurate after some preparation time which is obtained by counting FRO_HF clock.
    value: 1
enum/FIRCACC_IE:
  bit_size: 1
  variants:
  - name: FIRCACCNOT
    description: FIRCACC interrupt is not enabled.
    value: 0
  - name: FIRCACCYES
    description: FIRCACC interrupt is enabled.
    value: 1
enum/FIRCCSR_LK:
  bit_size: 1
  variants:
  - name: WRITE_ENABLED
    description: Control Status Register can be written.
    value: 0
  - name: WRITE_DISABLED
    description: Control Status Register cannot be written.
    value: 1
enum/FIRCERR:
  bit_size: 1
  variants:
  - name: ERROR_NOT_DETECTED
    description: Error not detected with the FIRC trimming.
    value: 0
  - name: ERROR_DETECTED
    description: Error detected with the FIRC trimming.
    value: 1
enum/FIRCERR_IE:
  bit_size: 1
  variants:
  - name: ERROR_NOT_DETECTED
    description: FIRCERR interrupt is not enabled.
    value: 0
  - name: ERROR_DETECTED
    description: FIRCERR interrupt is enabled.
    value: 1
enum/FIRCSTEN:
  bit_size: 1
  variants:
  - name: DISABLED_IN_STOP_MODES
    description: FIRC is disabled in Deep Sleep mode.
    value: 0
  - name: ENABLED_IN_STOP_MODES
    description: FIRC is enabled in Deep Sleep mode.
    value: 1
enum/FIRCVLD:
  bit_size: 1
  variants:
  - name: NOT_ENABLED_OR_NOT_VALID
    description: FIRC is not enabled or clock is not valid.
    value: 0
  - name: ENABLED_AND_VALID
    description: FIRC is enabled and output clock is valid. The clock is valid after there is an output clock from the FIRC analog.
    value: 1
enum/FREQ_SEL:
  bit_size: 3
  variants:
  - name: FIRC_48MHz_192S
    description: 45 MHz FIRC clock selected, divided from 180 MHz.
    value: 1
  - name: FIRC_64MHz
    description: 60 MHz FIRC clock selected.
    value: 3
  - name: FIRC_96MHz
    description: 90 MHz FIRC clock selected.
    value: 5
  - name: FIRC_192MHz
    description: 180 MHz FIRC clock selected.
    value: 7
enum/IFR_DISABLE:
  bit_size: 1
  variants:
  - name: ENABLED
    description: IFR write access to SCG trim registers not disabled. The SCG Trim registers are reprogrammed with the IFR values after any system reset.
    value: 0
  - name: DISABLED
    description: IFR write access to SCG trim registers during system reset is blocked.
    value: 1
enum/RANGE:
  bit_size: 2
  variants:
  - name: FREQ_16TO20MHz
    description: Frequency range select of 8-16 MHz.
    value: 0
  - name: LOW_FREQ
    description: Frequency range select of 16-25 MHz.
    value: 1
  - name: MEDIUM_FREQ
    description: Frequency range select of 25-40 MHz.
    value: 2
  - name: HIGH_FREQ
    description: Frequency range select of 40-50 MHz.
    value: 3
enum/RCCR_SCS:
  bit_size: 3
  variants:
  - name: SOSC
    description: SOSC.
    value: 1
  - name: SIRC
    description: SIRC.
    value: 2
  - name: FIRC
    description: FIRC.
    value: 3
  - name: ROSC
    description: ROSC.
    value: 4
  - name: SPLL
    description: SPLL.
    value: 6
enum/ROSCCSR_LK:
  bit_size: 1
  variants:
  - name: WRITE_ENABLED
    description: Control Status Register can be written.
    value: 0
  - name: WRITE_DISABLED
    description: Control Status Register cannot be written.
    value: 1
enum/ROSCERR:
  bit_size: 1
  variants:
  - name: DISABLED_OR_NO_ERROR
    description: ROSC Clock has not detected an error.
    value: 0
  - name: ENABLED_AND_ERROR
    description: ROSC Clock has detected an error.
    value: 1
enum/ROSCVLD:
  bit_size: 1
  variants:
  - name: DISABLED_OR_NOT_VALID
    description: ROSC is not enabled or clock is not valid.
    value: 0
  - name: ENABLED_AND_VALID
    description: ROSC is enabled and output clock is valid.
    value: 1
enum/SIRCCSR_LK:
  bit_size: 1
  variants:
  - name: WRITE_ENABLED
    description: Control Status Register can be written.
    value: 0
  - name: WRITE_DISABLED
    description: Control Status Register cannot be written.
    value: 1
enum/SIRCERR:
  bit_size: 1
  variants:
  - name: ERROR_NOT_DETECTED
    description: Error not detected with the SIRC trimming.
    value: 0
  - name: ERROR_DETECTED
    description: Error detected with the SIRC trimming.
    value: 1
enum/SIRCERR_IE:
  bit_size: 1
  variants:
  - name: ERROR_NOT_DETECTED
    description: SIRCERR interrupt is not enabled.
    value: 0
  - name: ERROR_DETECTED
    description: SIRCERR interrupt is enabled.
    value: 1
enum/SIRCVLD:
  bit_size: 1
  variants:
  - name: DISABLED_OR_NOT_VALID
    description: SIRC is not enabled or clock is not valid.
    value: 0
  - name: ENABLED_AND_VALID
    description: SIRC is enabled and output clock is valid.
    value: 1
