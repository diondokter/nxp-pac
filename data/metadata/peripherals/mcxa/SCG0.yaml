    bit_offset: 16
    bit_size: 7
fieldset/SIRCTRIM:
  description: SIRC Trim Register.
  fields:
  - name: CCOTRIM
    description: CCO Trim.
    bit_offset: 0
    bit_size: 6
  - name: CLTRIM
    description: CL Trim.
    bit_offset: 8
    bit_size: 6
