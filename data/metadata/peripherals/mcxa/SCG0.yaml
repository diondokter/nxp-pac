    description: Configures the number of reference clocks to count before SPLL is considered locked.
    bit_offset: 0
    bit_size: 17
fieldset/SPLLMDIV:
  description: SPLL M Divider Register.
  fields:
  - name: MDIV
    description: Feedback divider ratio (M-divider).
    bit_offset: 0
    bit_size: 16
