  bit_size: 16
  fields:
  - name: SOFF
    description: Source Address Signed Offset.
    bit_offset: 0
    bit_size: 16
enum/BWC:
  bit_size: 2
  variants:
  - name: NO_STALL
    description: No eDMA engine stalls.
    value: 0
  - name: ENGINE_STALLS_FOUR
    description: eDMA engine stalls for 4 cycles after each R/W.
    value: 2
  - name: ENGINE_STALLS_EIGHT
    description: eDMA engine stalls for 8 cycles after each R/W.
    value: 3
enum/DPA:
  bit_size: 1
  variants:
  - name: SUSPEND
    description: Channel can suspend a lower-priority channel.
    value: 0
  - name: CANNOT_SUSPEND
    description: Channel cannot suspend any other channel, regardless of channel priority.
    value: 1
enum/DREQ:
  bit_size: 1
  variants:
  - name: CHANNEL_NOT_AFFECTED
    description: No operation.
    value: 0
  - name: ERQ_FIELD_CLEAR
    description: Clear the ERQ field to 0 upon major loop completion, thus disabling hardware service requests.
    value: 1
enum/ECP:
  bit_size: 1
  variants:
  - name: CANNOT_SUSPEND
    description: Channel cannot be suspended by a higher-priority channel's service request.
    value: 0
  - name: SUSPEND
    description: Channel can be temporarily suspended by a higher-priority channel's service request.
    value: 1
enum/ESG:
  bit_size: 1
  variants:
  - name: NORMAL_FORMAT
    description: Current channel's TCD is normal format.
    value: 0
  - name: SCATTER_GATHER_FORMAT
    description: Current channel's TCD specifies scatter/gather format.
    value: 1
enum/INT:
  bit_size: 1
  variants:
  - name: INTERRUPT_CLEARED
    description: Interrupt request for corresponding channel cleared.
    value: 0
  - name: INTERRUPT_ACTIVE
    description: Interrupt request for corresponding channel active.
    value: 1
enum/PAL:
  bit_size: 1
  variants:
  - name: USER_PROTECTION
    description: User protection level for DMA transfers.
    value: 0
  - name: PRIVILEGED_PROTECTION
    description: Privileged protection level for DMA transfers.
    value: 1
enum/SMOD:
  bit_size: 5
  variants:
  - name: DISABLE
    description: Source address modulo feature disabled.
    value: 0
enum/SSIZE:
  bit_size: 3
  variants:
  - name: EIGHT_BIT
    description: 8-bit.
    value: 0
  - name: SIXTEEN_BIT
    description: 16-bit.
    value: 1
  - name: THIRTYTWO_BIT
    description: 32-bit.
    value: 2
  - name: SIXTYFOUR_BIT
    description: 64-bit.
    value: 3
  - name: SIXTEEN_BYTE
    description: 16-byte.
    value: 4
  - name: THIRTYTWO_BYTE
    description: 32-byte.
    value: 5
enum/START:
  bit_size: 1
  variants:
  - name: CHANNEL_NOT_STARTED
    description: Channel not explicitly started.
    value: 0
  - name: CHANNEL_STARTED
    description: Channel explicitly started via a software-initiated service request.
    value: 1
enum/TCD_NBYTES_MLOFFNO_DMLOE:
  bit_size: 1
  variants:
  - name: OFFSET_NOT_APPLIED
    description: Minor loop offset not applied to DADDR.
    value: 0
  - name: OFFSET_APPLIED
    description: Minor loop offset applied to DADDR.
    value: 1
enum/TCD_NBYTES_MLOFFNO_SMLOE:
  bit_size: 1
  variants:
  - name: OFFSET_NOT_APPLIED
    description: Minor loop offset not applied to SADDR.
    value: 0
  - name: OFFSET_APPLIED
    description: Minor loop offset applied to SADDR.
    value: 1
enum/TCD_NBYTES_MLOFFYES_DMLOE:
  bit_size: 1
  variants:
  - name: OFFSET_NOT_APPLIED
    description: Minor loop offset not applied to DADDR.
    value: 0
  - name: OFFSET_APPLIED
    description: Minor loop offset applied to DADDR.
    value: 1
enum/TCD_NBYTES_MLOFFYES_SMLOE:
  bit_size: 1
  variants:
  - name: OFFSET_NOT_APPLIED
    description: Minor loop offset not applied to SADDR.
    value: 0
  - name: OFFSET_APPLIED
    description: Minor loop offset applied to SADDR.
    value: 1
