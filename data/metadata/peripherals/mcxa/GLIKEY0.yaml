block/GLIKEY0:
  description: GLIKEY.
  items:
  - name: CTRL_0
    description: Control Register 0 SFR.
    byte_offset: 0
    fieldset: CTRL_0
  - name: CTRL_1
    description: Control Register 1 SFR.
    byte_offset: 4
    fieldset: CTRL_1
  - name: INTR_CTRL
    description: Interrupt Control.
    byte_offset: 8
    fieldset: INTR_CTRL
  - name: STATUS
    description: Status.
    byte_offset: 12
    access: Read
    fieldset: STATUS
  - name: VERSION
    description: IP Version.
    byte_offset: 252
    access: Read
    fieldset: VERSION
fieldset/CTRL_0:
  description: Control Register 0 SFR.
  fields:
  - name: WRITE_INDEX
    description: Write Index.
    bit_offset: 0
    bit_size: 8
  - name: RESERVED15
    description: Reserved for Future Use.
    bit_offset: 8
    bit_size: 8
  - name: WR_EN_0
    description: Write Enable 0.
    bit_offset: 16
    bit_size: 2
  - name: SFT_RST
    description: Soft reset for the core reset (SFR configuration will be preseved).This register reads as 0.
    bit_offset: 18
    bit_size: 1
  - name: RESERVED31
    description: Reserved for Future Use.
    bit_offset: 19
    bit_size: 13
fieldset/CTRL_1:
  description: Control Register 1 SFR.
  fields:
  - name: READ_INDEX
    description: Index status, Writing an index value to this register will request the block to return the lock status of this index.
    bit_offset: 0
    bit_size: 8
  - name: RESERVED15
    description: Reserved for Future Use.
    bit_offset: 8
    bit_size: 8
  - name: WR_EN_1
    description: Write Enable One.
    bit_offset: 16
    bit_size: 2
  - name: SFR_LOCK
    description: LOCK register for GLIKEY.
    bit_offset: 18
    bit_size: 4
  - name: RESERVED31
    description: Reserved for Future Use.
    bit_offset: 22
    bit_size: 10
fieldset/INTR_CTRL:
  description: Interrupt Control.
  fields:
  - name: INT_EN
    description: Interrupt Enable. Writing a 1, Interrupt asserts on Interrupt output port.
    bit_offset: 0
    bit_size: 1
  - name: INT_CLR
    description: Interrupt Clear. Writing a 1 to this register creates a single interrupt clear pulse. This register reads as 0.
    bit_offset: 1
    bit_size: 1
  - name: INT_SET
    description: Interrupt Set. Writing a 1 to this register asserts the interrupt. This register reads as 0.
    bit_offset: 2
    bit_size: 1
  - name: RESERVED31
    description: Reserved for Future Use.
    bit_offset: 3
    bit_size: 29
fieldset/STATUS:
  description: Status.
  fields:
  - name: INT_STATUS
    description: Interrupt Status.
    bit_offset: 0
    bit_size: 1
  - name: LOCK_STATUS
    description: Provides the current lock status of indexes.
    bit_offset: 1
    bit_size: 1
    enum: LOCK_STATUS
  - name: ERROR_STATUS
    description: Status of the Error.
    bit_offset: 2
    bit_size: 3
    enum: ERROR_STATUS
  - name: RESERVED18
    description: Reserved for Future Use.
    bit_offset: 5
    bit_size: 14
  - name: FSM_STATE
    description: Status of FSM.
    bit_offset: 19
    bit_size: 13
fieldset/VERSION:
  description: IP Version.
  fields:
  - name: Reserved3
    description: Reserved.
    bit_offset: 0
    bit_size: 4
  - name: Reserved7
    description: Reserved.
    bit_offset: 4
    bit_size: 4
  - name: Reserved11
    description: Reserved.
    bit_offset: 8
    bit_size: 4
  - name: Reserved15
    description: Reserved.
    bit_offset: 12
    bit_size: 4
  - name: MILESTONE
    description: Release milestone. 00-PREL, 01-BR, 10-SI, 11-GO.
    bit_offset: 16
    bit_size: 2
  - name: FSM_CONFIG
    description: 0:4 step, 1:8 step.
    bit_offset: 18
    bit_size: 1
  - name: INDEX_CONFIG
    description: Configured number of addressable indexes.
    bit_offset: 19
    bit_size: 8
  - name: Reserved31
    description: Reserved for Future Use.
    bit_offset: 27
    bit_size: 5
enum/ERROR_STATUS:
  bit_size: 3
  variants:
  - name: STAT0
    description: No error.
    value: 0
  - name: STAT1
    description: FSM error has occurred.
    value: 1
  - name: STAT2
    description: Write index out of the bound (OOB) error.
    value: 2
  - name: STAT3
    description: Write index OOB and FSM error.
    value: 3
  - name: STAT4
    description: Read index OOB error.
    value: 4
  - name: STAT5
    description: Write index and read index OOB error.
    value: 6
  - name: STAT6
    description: Read index OOB, write index OOB, and FSM error.
    value: 7
enum/LOCK_STATUS:
  bit_size: 1
  variants:
  - name: LOCK0
    description: Current read index is not locked.
    value: 0
  - name: LOCK1
    description: Current read index is locked.
    value: 1
