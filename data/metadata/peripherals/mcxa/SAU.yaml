block/SAU:
  description: Security Attribution Unit.
  items:
  - name: CTRL
    description: Security Attribution Unit Control Register.
    byte_offset: 208
    fieldset: CTRL
  - name: TYPE
    description: Security Attribution Unit Type Register.
    byte_offset: 212
    fieldset: TYPE
  - name: RNR
    description: Security Attribution Unit Region Number Register.
    byte_offset: 216
    fieldset: RNR
  - name: RBAR
    description: Security Attribution Unit Region Base Address Register.
    byte_offset: 220
    fieldset: RBAR
  - name: RLAR
    description: Security Attribution Unit Region Limit Address Register.
    byte_offset: 224
    fieldset: RLAR
  - name: SFSR
    description: Secure Fault Status Register.
    byte_offset: 228
    fieldset: SFSR
  - name: SFAR
    description: Secure Fault Address Register.
    byte_offset: 232
    fieldset: SFAR
fieldset/CTRL:
  description: Security Attribution Unit Control Register.
  fields:
  - name: ENABLE
    description: Enable. Enables the SAU. This bit is RAZ/WI when the Security Extension is implemented without an SAU region.
    bit_offset: 0
    bit_size: 1
  - name: ALLNS
    description: All Non-secure.
    bit_offset: 1
    bit_size: 1
    enum: ALLNS
fieldset/RBAR:
  description: Security Attribution Unit Region Base Address Register.
  fields:
  - name: BADDR
    description: Base address. Holds bits[31:5] of the base address for the selected SAU region. Bits[4:0] of the base address are defined as 0x00.
    bit_offset: 5
    bit_size: 27
fieldset/RLAR:
  description: Security Attribution Unit Region Limit Address Register.
  fields:
  - name: ENABLE
    description: Enable. SAU region enable.
    bit_offset: 0
    bit_size: 1
    enum: RLAR_ENABLE
  - name: NSC
    description: Non-secure callable. Controls whether Non-secure state is permitted to execute an SG instruction from this region.
    bit_offset: 1
    bit_size: 1
  - name: LADDR
    description: Limit address. Holds bits[31:5] of the limit address for the selected SAU region. Bits[4:0] of the limit address are defined as 0x1F.
    bit_offset: 5
    bit_size: 27
fieldset/RNR:
  description: Security Attribution Unit Region Number Register.
  fields:
  - name: REGION
    description: Region number.
    bit_offset: 0
    bit_size: 8
fieldset/SFAR:
  description: Secure Fault Address Register.
  fields:
  - name: ADDRESS
    description: When the SFARVALID bit of the SFSR is set to 1, this field holds the address of an access that caused an SAU violation.
    bit_offset: 0
    bit_size: 32
fieldset/SFSR:
  description: Secure Fault Status Register.
  fields:
  - name: INVEP
    description: Invalid entry point.
    bit_offset: 0
    bit_size: 1
  - name: INVIS
    description: Invalid integrity signature flag.
    bit_offset: 1
    bit_size: 1
  - name: INVER
    description: Invalid exception return flag.
    bit_offset: 2
    bit_size: 1
  - name: AUVIOL
    description: Attribution unit violation flag.
    bit_offset: 3
    bit_size: 1
  - name: INVTRAN
    description: Invalid transition flag.
    bit_offset: 4
    bit_size: 1
  - name: LSPERR
    description: Lazy state preservation error flag.
    bit_offset: 5
    bit_size: 1
  - name: SFARVALID
    description: Secure fault address valid.
    bit_offset: 6
    bit_size: 1
  - name: LSERR
    description: Lazy state error flag.
    bit_offset: 7
    bit_size: 1
fieldset/TYPE:
  description: Security Attribution Unit Type Register.
  fields:
  - name: SREGION
    description: SAU regions. The number of implemented SAU regions.
    bit_offset: 0
    bit_size: 8
enum/ALLNS:
  bit_size: 1
  variants:
  - name: SECURED_MEMORY
    description: Memory is marked as Secure and is not Non-secure callable.
    value: 0
  - name: NON_SECURED_MEMORY
    description: Memory is marked as Non-secure.
    value: 1
enum/RLAR_ENABLE:
  bit_size: 1
  variants:
  - name: ENABLED
    description: SAU region is enabled.
    value: 0
  - name: DISABLED
    description: SAU region is disabled.
    value: 1
