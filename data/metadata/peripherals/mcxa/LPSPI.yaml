    bit_offset: 0
    bit_size: 8
  - name: dbt
    description: Delay Between Transfers.
    bit_offset: 8
    bit_size: 8
  - name: pcssck
    description: PCS-to-SCK Delay.
    bit_offset: 16
    bit_size: 8
  - name: sckpcs
    description: SCK-to-PCS Delay.
    bit_offset: 24
    bit_size: 8
fieldset/Ccr1:
  description: Clock Configuration 1.
  fields:
  - name: sckset
    description: SCK Setup.
    bit_offset: 0
    bit_size: 8
  - name: sckhld
    description: SCK Hold.
    bit_offset: 8
    bit_size: 8
  - name: pcspcs
    description: PCS to PCS Delay.
    bit_offset: 16
    bit_size: 8
  - name: scksck
    description: SCK Inter-Frame Delay.
    bit_offset: 24
    bit_size: 8
fieldset/Cfgr0:
