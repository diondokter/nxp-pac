  - name: pincfg
    description: Pin Configuration.
    bit_offset: 24
    bit_size: 2
    enum: Pincfg
  - name: outcfg
    description: Output Configuration.
    bit_offset: 26
    bit_size: 1
    enum: Outcfg
  - name: pcscfg
    description: Peripheral Chip Select Configuration.
    bit_offset: 27
    bit_size: 1
    enum: Pcscfg
fieldset/Cr:
