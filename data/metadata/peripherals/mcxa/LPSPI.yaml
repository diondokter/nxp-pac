  - name: START
    description: Command word for start of new transfer.
    value: 0
  - name: CONTINUE
    description: Command word for continuing transfer.
    value: 1
enum/CPHA:
  bit_size: 1
  variants:
  - name: CAPTURED
    description: Captured.
    value: 0
  - name: CHANGED
    description: Changed.
    value: 1
enum/CPOL:
  bit_size: 1
  variants:
  - name: INACTIVE_LOW
    description: Inactive low.
    value: 0
  - name: INACTIVE_HIGH
    description: Inactive high.
    value: 1
enum/FEATURE:
  bit_size: 16
  variants:
  - name: STANDARD
    description: Standard feature set supporting a 32-bit shift register.
    value: 4
enum/HRDIR:
  bit_size: 1
  variants:
  - name: INPUT
    description: Input.
    value: 0
  - name: OUTPUT
    description: Output.
    value: 1
enum/HRSEL:
  bit_size: 1
  variants:
  - name: HREQPIN
    description: HREQ pin.
    value: 0
  - name: INPUT_TRIGGER
    description: Input trigger.
    value: 1
enum/LSBF:
  bit_size: 1
  variants:
  - name: MSB_FIRST
    description: MSB first.
    value: 0
  - name: LSB_FIRST
    description: LSB first.
    value: 1
enum/MASTER:
  bit_size: 1
  variants:
  - name: SLAVE_MODE
    description: Peripheral mode.
    value: 0
  - name: MASTER_MODE
    description: Controller mode.
    value: 1
enum/MATCFG:
  bit_size: 3
  variants:
  - name: DISABLED
    description: Match is disabled.
    value: 0
  - name: ENABLED_FIRSTDATAMATCH
    description: Match first data word with compare word.
    value: 2
  - name: ENABLED_ANYDATAMATCH
    description: Match any data word with compare word.
    value: 3
  - name: ENABLED_DATAMATCH_100
    description: Sequential match, first data word.
    value: 4
  - name: ENABLED_DATAMATCH_101
    description: Sequential match, any data word.
    value: 5
  - name: ENABLED_DATAMATCH_110
    description: Match first data word (masked) with compare word (masked).
    value: 6
  - name: ENABLED_DATAMATCH_111
    description: Match any data word (masked) with compare word (masked).
    value: 7
enum/MBF:
  bit_size: 1
  variants:
  - name: IDLE
    description: LPSPI is idle.
    value: 0
  - name: BUSY
    description: LPSPI is busy.
    value: 1
enum/OUTCFG:
  bit_size: 1
  variants:
  - name: RETAIN_LASTVALUE
    description: Retain last value.
    value: 0
  - name: TRISTATED
    description: 3-stated.
    value: 1
enum/PARTIAL:
  bit_size: 1
  variants:
  - name: DISCARDED
    description: Discard.
    value: 0
  - name: STORED
    description: Store.
    value: 1
enum/PCS:
  bit_size: 2
  variants:
  - name: TX_PCS0
    description: Transfer using PCS[0].
    value: 0
  - name: TX_PCS1
    description: Transfer using PCS[1].
    value: 1
  - name: TX_PCS2
    description: Transfer using PCS[2].
    value: 2
  - name: TX_PCS3
    description: Transfer using PCS[3].
    value: 3
enum/PCSCFG:
  bit_size: 1
  variants:
  - name: CHIP_SELECT
    description: PCS[3:2] configured for chip select function.
    value: 0
  - name: HALFDUPLEX4BIT
    description: PCS[3:2] configured for half-duplex 4-bit transfers (PCS[3:2] = DATA[3:2]).
    value: 1
enum/PCSPOL:
  bit_size: 4
  variants:
  - name: DISCARDED
    description: Active low.
    value: 0
  - name: STORED
    description: Active high.
    value: 1
enum/PINCFG:
  bit_size: 2
  variants:
  - name: SIN_IN_SOUT_OUT
    description: SIN is used for input data; SOUT is used for output data.
    value: 0
  - name: SIN_BOTH_IN_OUT
    description: SIN is used for both input and output data; only half-duplex serial transfers are supported.
    value: 1
  - name: SOUT_BOTH_IN_OUT
    description: SOUT is used for both input and output data; only half-duplex serial transfers are supported.
    value: 2
  - name: SOUT_IN_SIN_OUT
    description: SOUT is used for input data; SIN is used for output data.
    value: 3
enum/PRESCALE:
  bit_size: 3
  variants:
  - name: DIVIDEBY1
    description: Divide by 1.
    value: 0
  - name: DIVIDEBY2
    description: Divide by 2.
    value: 1
  - name: DIVIDEBY4
    description: Divide by 4.
    value: 2
  - name: DIVIDEBY8
    description: Divide by 8.
    value: 3
  - name: DIVIDEBY16
    description: Divide by 16.
    value: 4
  - name: DIVIDEBY32
    description: Divide by 32.
    value: 5
  - name: DIVIDEBY64
    description: Divide by 64.
    value: 6
  - name: DIVIDEBY128
    description: Divide by 128.
    value: 7
enum/RDMO:
  bit_size: 1
  variants:
  - name: STORED
    description: Disable.
    value: 0
  - name: DISCARDED
    description: Enable.
    value: 1
enum/RRF:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: No effect.
    value: 0
  - name: RXFIFO_RST
    description: Reset.
    value: 1
enum/RTF:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: No effect.
    value: 0
  - name: TXFIFO_RST
    description: Reset.
    value: 1
enum/RXMSK:
  bit_size: 1
  variants:
  - name: NORMAL
    description: Normal transfer.
    value: 0
  - name: MASK
    description: Mask receive data.
    value: 1
enum/SAMPLE:
  bit_size: 1
  variants:
  - name: ON_SCK_EDGE
    description: SCK edge.
    value: 0
  - name: ON_DELAYED_SCK_EDGE
    description: Delayed SCK edge.
    value: 1
enum/SOF:
  bit_size: 1
  variants:
  - name: NEXT_DATAWORD
    description: Subsequent data word or RX FIFO is empty (RXEMPTY=1).
    value: 0
  - name: FIRST_DATAWORD
    description: First data word.
    value: 1
enum/TDF:
  bit_size: 1
  variants:
  - name: TXDATA_NOT_REQST
    description: Transmit data not requested.
    value: 0
  - name: TXDATA_REQST
    description: Transmit data requested.
    value: 1
enum/TXMSK:
  bit_size: 1
  variants:
  - name: NORMAL
    description: Normal transfer.
    value: 0
  - name: MASK
    description: Mask transmit data.
    value: 1
enum/WIDTH:
  bit_size: 2
  variants:
  - name: ONEBIT
    description: 1-bit transfer.
    value: 0
  - name: TWOBIT
    description: 2-bit transfer.
    value: 1
  - name: FOURBIT
    description: 4-bit transfer.
    value: 2
