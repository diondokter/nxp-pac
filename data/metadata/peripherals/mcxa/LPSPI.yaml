    bit_offset: 27
    bit_size: 3
    enum: Prescale
  - name: cpha
    description: Clock Phase.
    bit_offset: 30
    bit_size: 1
    enum: Cpha
  - name: cpol
    description: Clock Polarity.
    bit_offset: 31
    bit_size: 1
    enum: Cpol
fieldset/Tdbr:
  description: Transmit Data Burst.
  fields:
  - name: data
    description: Data.
    bit_offset: 0
    bit_size: 32
fieldset/Tdr:
  description: Transmit Data.
  fields:
  - name: data
    description: Transmit Data.
    bit_offset: 0
    bit_size: 32
fieldset/Verid:
  description: Version ID.
  fields:
  - name: feature
    description: Module Identification Number.
    bit_offset: 0
    bit_size: 16
    enum: Feature
  - name: minor
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: major
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/Contc:
  bit_size: 1
  variants:
  - name: Start
    description: Command word for start of new transfer.
    value: 0
  - name: Continue
    description: Command word for continuing transfer.
    value: 1
enum/Cpha:
  bit_size: 1
  variants:
  - name: Captured
    description: Captured.
    value: 0
  - name: Changed
    description: Changed.
    value: 1
enum/Cpol:
  bit_size: 1
  variants:
  - name: InactiveLow
    description: Inactive low.
    value: 0
  - name: InactiveHigh
    description: Inactive high.
    value: 1
enum/Dozen:
  bit_size: 1
  variants:
  - name: Enabled
    description: Enable.
    value: 0
  - name: Disabled
    description: Disable.
    value: 1
enum/Feature:
  bit_size: 16
  variants:
  - name: Standard
    description: Standard feature set supporting a 32-bit shift register.
    value: 4
enum/Hrdir:
  bit_size: 1
  variants:
  - name: Input
    description: Input.
    value: 0
  - name: Output
    description: Output.
    value: 1
enum/Hrsel:
  bit_size: 1
  variants:
  - name: Hreqpin
    description: HREQ pin.
    value: 0
  - name: InputTrigger
    description: Input trigger.
    value: 1
enum/Lsbf:
  bit_size: 1
  variants:
  - name: MsbFirst
    description: MSB first.
    value: 0
  - name: LsbFirst
    description: LSB first.
    value: 1
enum/Master:
  bit_size: 1
  variants:
  - name: SlaveMode
    description: Peripheral mode.
    value: 0
  - name: MasterMode
    description: Controller mode.
    value: 1
enum/Matcfg:
  bit_size: 3
  variants:
  - name: Disabled
    description: Match is disabled.
    value: 0
  - name: EnabledFirstdatamatch
    description: Match first data word with compare word.
    value: 2
  - name: EnabledAnydatamatch
    description: Match any data word with compare word.
    value: 3
  - name: EnabledDatamatch100
    description: Sequential match, first data word.
    value: 4
  - name: EnabledDatamatch101
    description: Sequential match, any data word.
    value: 5
  - name: EnabledDatamatch110
    description: Match first data word (masked) with compare word (masked).
    value: 6
  - name: EnabledDatamatch111
    description: Match any data word (masked) with compare word (masked).
    value: 7
enum/Mbf:
  bit_size: 1
  variants:
  - name: Idle
    description: LPSPI is idle.
    value: 0
  - name: Busy
    description: LPSPI is busy.
    value: 1
enum/Outcfg:
  bit_size: 1
  variants:
  - name: RetainLastvalue
    description: Retain last value.
    value: 0
  - name: Tristated
    description: 3-stated.
    value: 1
enum/Partial:
  bit_size: 1
  variants:
  - name: Discarded
    description: Discard.
    value: 0
  - name: Stored
    description: Store.
    value: 1
enum/Pcs:
  bit_size: 2
  variants:
  - name: TxPcs0
    description: Transfer using PCS[0].
    value: 0
  - name: TxPcs1
    description: Transfer using PCS[1].
    value: 1
  - name: TxPcs2
    description: Transfer using PCS[2].
    value: 2
  - name: TxPcs3
    description: Transfer using PCS[3].
    value: 3
enum/Pcscfg:
  bit_size: 1
  variants:
  - name: ChipSelect
    description: PCS[3:2] configured for chip select function.
    value: 0
  - name: Halfduplex4bit
    description: PCS[3:2] configured for half-duplex 4-bit transfers (PCS[3:2] = DATA[3:2]).
    value: 1
enum/Pcspol:
  bit_size: 4
  variants:
  - name: Discarded
    description: Active low.
    value: 0
  - name: Stored
    description: Active high.
    value: 1
enum/Pincfg:
  bit_size: 2
  variants:
  - name: SinInSoutOut
    description: SIN is used for input data; SOUT is used for output data.
    value: 0
  - name: SinBothInOut
    description: SIN is used for both input and output data; only half-duplex serial transfers are supported.
    value: 1
  - name: SoutBothInOut
    description: SOUT is used for both input and output data; only half-duplex serial transfers are supported.
    value: 2
  - name: SoutInSinOut
    description: SOUT is used for input data; SIN is used for output data.
    value: 3
enum/Prescale:
  bit_size: 3
  variants:
  - name: DivideBy1
    description: Divide by 1.
    value: 0
  - name: DivideBy2
    description: Divide by 2.
    value: 1
  - name: DivideBy4
    description: Divide by 4.
    value: 2
  - name: DivideBy8
    description: Divide by 8.
    value: 3
  - name: DivideBy16
    description: Divide by 16.
    value: 4
  - name: DivideBy32
    description: Divide by 32.
    value: 5
  - name: DivideBy64
    description: Divide by 64.
    value: 6
  - name: DivideBy128
    description: Divide by 128.
    value: 7
enum/Rdmo:
  bit_size: 1
  variants:
  - name: Stored
    description: Disable.
    value: 0
  - name: Discarded
    description: Enable.
    value: 1
enum/Rrf:
  bit_size: 1
  variants:
  - name: NoEffect
    description: No effect.
    value: 0
  - name: RxfifoRst
    description: Reset.
    value: 1
enum/Rtf:
  bit_size: 1
  variants:
  - name: NoEffect
    description: No effect.
    value: 0
  - name: TxfifoRst
    description: Reset.
    value: 1
enum/Rxmsk:
  bit_size: 1
  variants:
  - name: Normal
    description: Normal transfer.
    value: 0
  - name: Mask
    description: Mask receive data.
    value: 1
enum/Sample:
  bit_size: 1
  variants:
  - name: OnSckEdge
    description: SCK edge.
    value: 0
  - name: OnDelayedSckEdge
    description: Delayed SCK edge.
    value: 1
enum/Sof:
  bit_size: 1
  variants:
  - name: NextDataword
    description: Subsequent data word or RX FIFO is empty (RXEMPTY=1).
    value: 0
  - name: FirstDataword
    description: First data word.
    value: 1
enum/Tdf:
  bit_size: 1
  variants:
  - name: TxdataNotReqst
    description: Transmit data not requested.
    value: 0
  - name: TxdataReqst
    description: Transmit data requested.
    value: 1
enum/Txmsk:
  bit_size: 1
  variants:
  - name: Normal
    description: Normal transfer.
    value: 0
  - name: Mask
    description: Mask transmit data.
    value: 1
enum/Width:
  bit_size: 2
  variants:
  - name: Onebit
    description: 1-bit transfer.
    value: 0
  - name: Twobit
    description: 2-bit transfer.
    value: 1
  - name: Fourbit
    description: 4-bit transfer.
    value: 2
