block/Lpspi:
  description: Low-Power Serial Peripheral Interface.
  items:
  - name: verid
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: Verid
  - name: param
    description: Parameter.
    byte_offset: 4
    access: Read
    fieldset: Param
  - name: cr
    description: Control.
    byte_offset: 16
    fieldset: Cr
  - name: sr
    description: Status.
    byte_offset: 20
    fieldset: Sr
  - name: ier
    description: Interrupt Enable.
    byte_offset: 24
    fieldset: Ier
  - name: der
    description: DMA Enable.
    byte_offset: 28
    fieldset: Der
  - name: cfgr0
    description: Configuration 0.
    byte_offset: 32
    fieldset: Cfgr0
  - name: cfgr1
    description: Configuration 1.
    byte_offset: 36
    fieldset: Cfgr1
  - name: dmr0
    description: Data Match 0.
    byte_offset: 48
    fieldset: Dmr0
  - name: dmr1
    description: Data Match 1.
    byte_offset: 52
    fieldset: Dmr1
  - name: ccr
    description: Clock Configuration.
    byte_offset: 64
    fieldset: Ccr
  - name: ccr1
    description: Clock Configuration 1.
    byte_offset: 68
    fieldset: Ccr1
  - name: fcr
    description: FIFO Control.
    byte_offset: 88
    fieldset: Fcr
  - name: fsr
    description: FIFO Status.
    byte_offset: 92
    access: Read
    fieldset: Fsr
  - name: tcr
    description: Transmit Command.
    byte_offset: 96
    fieldset: Tcr
  - name: tdr
    description: Transmit Data.
    byte_offset: 100
    access: Write
    fieldset: Tdr
  - name: rsr
    description: Receive Status.
    byte_offset: 112
    access: Read
    fieldset: Rsr
  - name: rdr
    description: Receive Data.
    byte_offset: 116
    access: Read
    fieldset: Rdr
  - name: rdror
    description: Receive Data Read Only.
    byte_offset: 120
    access: Read
    fieldset: Rdror
  - name: tcbr
    description: Transmit Command Burst.
    byte_offset: 1020
    access: Write
    fieldset: Tcbr
  - name: tdbr
    description: Transmit Data Burst.
    array:
      len: 128
      stride: 4
    byte_offset: 1024
    access: Write
    fieldset: Tdbr
  - name: rdbr
    description: Receive Data Burst.
    array:
      len: 128
      stride: 4
    byte_offset: 1536
    access: Read
    fieldset: Rdbr
fieldset/Ccr:
