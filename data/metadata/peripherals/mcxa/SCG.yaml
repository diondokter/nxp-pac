    description: SPLL is not powered on or not locked.
    value: 0
  - name: ENABLED_AND_VALID
    description: SPLL is locked.
    value: 1
enum/Spllcmre:
  bit_size: 1
  variants:
  - name: GENERATE_INTERRUPT
