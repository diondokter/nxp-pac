  - name: EXCLUDE_DISABLED_INTERRUPTS
    description: Only enabled interrupts or events can wakeup the processor, disabled interrupts are excluded.
    value: 0
  - name: INCLUDE_DISABLED_INTERRUPTS
    description: Enabled events and all interrupts, including disabled interrupts, can wakeup the processor.
    value: 1
