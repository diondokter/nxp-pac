enum/BFHFNMINS:
  bit_size: 1
  variants:
  - name: SECURE
    description: BusFault, HardFault, and NMI are Secure.
    value: 0
  - name: NON_SECURE
    description: BusFault and NMI are Non-secure and exceptions can target Non-secure HardFault.
    value: 1
enum/CP11:
  bit_size: 2
  variants:
  - name: ACCESS_DENIED
    description: Access Denied. All accesses to the Floating-point Extension result in NOCP UsageFault.
    value: 0
  - name: PRIVILEGED_ONLY
    description: Privileged access only. Unprivileged access to the Floatingpoint Extension result in NOCP UsageFault.
    value: 1
  - name: FULL_ACCESS
    description: Full access. Full access rights to the Floatingpoint Extension.
    value: 3
