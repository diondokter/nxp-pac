block/SCB:
  description: System Control Block.
  items:
  - name: AIRCR
    description: Application Interrupt and Reset Control Register.
    byte_offset: 12
    fieldset: AIRCR
  - name: SCR
    description: The SCR controls features of entry to and exit from low-power state.
    byte_offset: 16
    fieldset: SCR
  - name: SHCSR
    description: System Handler Control and State Register.
    byte_offset: 36
    fieldset: SHCSR
  - name: CPACR
    description: Coprocessor Access Control Register.
    byte_offset: 136
    fieldset: CPACR
  - name: NSACR
    description: Non-secure Access Control Register.
    byte_offset: 140
    fieldset: NSACR
fieldset/AIRCR:
  description: Application Interrupt and Reset Control Register.
  fields:
  - name: VECTCLRACTIVE
    description: Reserved for Debug use. This bit reads as 0. When writing to the register you must write 0 to this bit, otherwise behavior is UNPREDICTABLE. This bit is not banked between Security states.
    bit_offset: 1
    bit_size: 1
  - name: SYSRESETREQ
    description: System reset request. This bit allows software or a debugger to request a system reset. This bit is not banked between Security states. RW if SYSRESETREQS is 0. When SYSRESETREQS is set to 1, from Non-secure state this bit acts as RAZ/WI.
    bit_offset: 2
    bit_size: 1
    enum: SYSRESETREQ
  - name: SYSRESETREQS
    description: System reset request, Secure state only. The value of this bit defines whether the SYSRESETREQ bit is functional for Non-secure use. This bit is not banked between Security states. RW from Secure State and RAZ/WI from Non-secure state.
    bit_offset: 3
    bit_size: 1
    enum: SYSRESETREQS
  - name: PRIGROUP
    description: Interrupt priority grouping field. This field determines the split of group priority from subpriority. This bit is banked between Security states.
    bit_offset: 8
    bit_size: 3
  - name: BFHFNMINS
    description: BusFault, HardFault, and NMI Non-secure enable. The value of this bit defines whether BusFault and NMI exceptions are Non-secure, and whether exceptions target the Non-secure HardFault exception. This bit is not banked between Security states. RW from Secure-state and RO from Non-secure state.
    bit_offset: 13
    bit_size: 1
    enum: BFHFNMINS
  - name: PRIS
    description: Prioritize Secure exceptions. The value of this bit defines whether Secure exception priority boosting is enabled. This bit is not banked between Security states. RW from Secure state and RAZ/WI from Non-secure state.
    bit_offset: 14
    bit_size: 1
    enum: PRIS
  - name: ENDIANNESS
    description: Data endianness bit. This bit is not banked between Security states.
    bit_offset: 15
    bit_size: 1
    enum: ENDIANNESS
  - name: VECTKEY
    description: 'Register key: Reads as 0xFA05. On writes, write 0x5FA to VECTKEY, otherwise the write is ignored. This Field is not banked between Security states.'
    bit_offset: 16
    bit_size: 16
