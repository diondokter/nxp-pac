fieldset/SCR:
  description: The SCR controls features of entry to and exit from low-power state.
  fields:
  - name: SLEEPONEXIT
    description: Indicates sleep-on-exit when returning from Handler mode to Thread mode. Setting this bit to 1 enables an interrupt driven application to avoid returning to an empty main application. This bit is banked between Security states.
    bit_offset: 1
    bit_size: 1
  - name: SLEEPDEEP
    description: Controls whether the processor uses sleep or deep sleep as its low-power mode. This bit is not banked between Security states.
    bit_offset: 2
    bit_size: 1
    enum: SLEEPDEEP
  - name: SLEEPDEEPS
    description: Controls whether the SLEEPDEEP bit is only accessible from the Secure state. This bit in only accessible from the Secure state, and behaves as RAZ/WI when accessed from the Nonsecure state. This bit is not banked between Security states.
    bit_offset: 3
    bit_size: 1
    enum: SLEEPDEEPS
  - name: SEVONPEND
    description: Send Event on Pending bit. When an event or interrupt enters pending state, the event signal wakes up the processor from WFE. If the processor is not waiting for an event, the event is registered and affects the next WFE. The processor also wakes up on execution of an SEV instruction or an external event. This bit is banked between Security states.
    bit_offset: 4
    bit_size: 1
    enum: SEVONPEND
