    description: Interrupt Flag for Match Channel 2 Event.
    bit_offset: 2
    bit_size: 1
  - name: mr3int
    description: Interrupt Flag for Match Channel 3 Event.
    bit_offset: 3
    bit_size: 1
  - name: cr0int
    description: Interrupt Flag for Capture Channel 0 Event.
    bit_offset: 4
    bit_size: 1
  - name: cr1int
    description: Interrupt Flag for Capture Channel 1 Event.
    bit_offset: 5
    bit_size: 1
  - name: cr2int
    description: Interrupt Flag for Capture Channel 2 Event.
    bit_offset: 6
    bit_size: 1
  - name: cr3int
    description: Interrupt Flag for Capture Channel 3 Event.
    bit_offset: 7
    bit_size: 1
fieldset/Mcr:
