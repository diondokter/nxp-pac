    description: Capture.
    array:
      len: 4
      stride: 4
    byte_offset: 44
    access: Read
    fieldset: CR
  - name: EMR
    description: External Match.
    byte_offset: 60
    fieldset: EMR
  - name: CTCR
    description: Count Control.
    byte_offset: 112
    fieldset: CTCR
  - name: PWMC
    description: PWM Control.
    byte_offset: 116
    fieldset: PWMC
  - name: MSR
    description: Match Shadow.
    array:
      len: 4
      stride: 4
    byte_offset: 120
    fieldset: MSR
