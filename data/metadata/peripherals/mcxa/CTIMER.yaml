    description: Prescale.
    byte_offset: 12
    fieldset: PR
  - name: PC
    description: Prescale Counter.
    byte_offset: 16
    fieldset: PC
  - name: MCR
    description: Match Control.
    byte_offset: 20
    fieldset: MCR
  - name: MR
    description: Match.
    array:
      len: 4
      stride: 4
    byte_offset: 24
    fieldset: MR
  - name: CCR
    description: Capture Control.
    byte_offset: 40
    fieldset: CCR
