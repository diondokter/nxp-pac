block/Ctimer:
  description: Standard Counter or Timer.
  items:
  - name: ir
    description: Interrupt.
    byte_offset: 0
    fieldset: Ir
  - name: tcr
    description: Timer Control.
    byte_offset: 4
    fieldset: Tcr
  - name: tc
    description: Timer Counter.
    byte_offset: 8
    fieldset: Tc
  - name: pr
    description: Prescale.
    byte_offset: 12
    fieldset: Pr
  - name: pc
    description: Prescale Counter.
    byte_offset: 16
    fieldset: Pc
  - name: mcr
    description: Match Control.
    byte_offset: 20
    fieldset: Mcr
  - name: mr
    description: Match.
    array:
      len: 4
      stride: 4
    byte_offset: 24
    fieldset: Mr
  - name: ccr
    description: Capture Control.
    byte_offset: 40
    fieldset: Ccr
  - name: cr
    description: Capture.
    array:
      len: 4
      stride: 4
    byte_offset: 44
    access: Read
    fieldset: Cr
  - name: emr
    description: External Match.
    byte_offset: 60
    fieldset: Emr
  - name: ctcr
    description: Count Control.
    byte_offset: 112
    fieldset: Ctcr
  - name: pwmc
    description: PWM Control.
    byte_offset: 116
    fieldset: Pwmc
  - name: msr
    description: Match Shadow.
    array:
      len: 4
      stride: 4
    byte_offset: 120
    fieldset: Msr
fieldset/Ccr:
  description: Capture Control.
  fields:
  - name: cap0re
    description: Rising Edge of Capture Channel 0.
    bit_offset: 0
    bit_size: 1
  - name: cap0fe
    description: Falling Edge of Capture Channel 0.
    bit_offset: 1
    bit_size: 1
  - name: cap0i
    description: Generate Interrupt on Channel 0 Capture Event.
    bit_offset: 2
    bit_size: 1
  - name: cap1re
    description: Rising Edge of Capture Channel 1.
    bit_offset: 3
    bit_size: 1
  - name: cap1fe
    description: Falling Edge of Capture Channel 1.
    bit_offset: 4
    bit_size: 1
  - name: cap1i
    description: Generate Interrupt on Channel 1 Capture Event.
    bit_offset: 5
    bit_size: 1
  - name: cap2re
    description: Rising Edge of Capture Channel 2.
    bit_offset: 6
    bit_size: 1
  - name: cap2fe
    description: Falling Edge of Capture Channel 2.
    bit_offset: 7
    bit_size: 1
  - name: cap2i
    description: Generate Interrupt on Channel 2 Capture Event.
    bit_offset: 8
    bit_size: 1
  - name: cap3re
    description: Rising Edge of Capture Channel 3.
    bit_offset: 9
    bit_size: 1
  - name: cap3fe
    description: Falling Edge of Capture Channel 3.
    bit_offset: 10
    bit_size: 1
  - name: cap3i
    description: Generate Interrupt on Channel 3 Capture Event.
    bit_offset: 11
    bit_size: 1
fieldset/Cr:
  description: Capture.
  fields:
  - name: cap
    description: Timer Counter Capture Value.
    bit_offset: 0
    bit_size: 32
fieldset/Ctcr:
  description: Count Control.
  fields:
  - name: ctmode
    description: Counter Timer Mode.
    bit_offset: 0
    bit_size: 2
    enum: Ctmode
  - name: cinsel
    description: Count Input Select.
    bit_offset: 2
    bit_size: 2
    enum: Cinsel
  - name: encc
    description: Capture Channel Enable.
    bit_offset: 4
    bit_size: 1
  - name: selcc
    description: Edge Select.
    bit_offset: 5
    bit_size: 3
    enum: Selcc
fieldset/Emr:
  description: External Match.
  fields:
  - name: em0
    description: External Match 0.
    bit_offset: 0
    bit_size: 1
  - name: em1
    description: External Match 1.
    bit_offset: 1
    bit_size: 1
  - name: em2
    description: External Match 2.
    bit_offset: 2
    bit_size: 1
  - name: em3
    description: External Match 3.
    bit_offset: 3
    bit_size: 1
  - name: emc0
    description: External Match Control 0.
    bit_offset: 4
    bit_size: 2
    enum: Emc
  - name: emc1
    description: External Match Control 1.
    bit_offset: 6
    bit_size: 2
    enum: Emc
  - name: emc2
    description: External Match Control 2.
    bit_offset: 8
    bit_size: 2
    enum: Emc
  - name: emc3
    description: External Match Control 3.
    bit_offset: 10
    bit_size: 2
    enum: Emc
