block/Port:
  description: Port Control.
  items:
  - name: verid
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: Verid
  - name: gpclr
    description: Global Pin Control Low.
    byte_offset: 16
    fieldset: Gpclr
  - name: gpchr
    description: Global Pin Control High.
    byte_offset: 20
    fieldset: Gpchr
  - name: config
    description: Configuration.
    byte_offset: 32
    fieldset: Config
  - name: pcr
    description: Pin Control 0.
    array:
      len: 32
      stride: 4
    byte_offset: 128
    fieldset: Pcr
fieldset/Config:
  description: Configuration.
  fields:
  - name: range
    description: Port Voltage Range.
    bit_offset: 0
    bit_size: 1
    enum: Range
fieldset/Gpchr:
  description: Global Pin Control High.
  fields:
  - name: gpwd
    description: Global Pin Write Data.
    bit_offset: 0
    bit_size: 16
  - name: gpwe
    description: Global Pin Write Enable.
    bit_offset: 16
    bit_size: 1
    array:
      len: 16
      stride: 1
    enum: Gpwe
fieldset/Gpclr:
  description: Global Pin Control Low.
  fields:
  - name: gpwd
    description: Global Pin Write Data.
    bit_offset: 0
    bit_size: 16
  - name: gpwe
    description: Global Pin Write Enable.
    bit_offset: 16
    bit_size: 1
    array:
      len: 16
      stride: 1
    enum: Gpwe
fieldset/Pcr:
  description: Pin Control 2.
  fields:
  - name: ps
    description: Pull Select.
    bit_offset: 0
    bit_size: 1
    enum: Ps
  - name: pe
    description: Pull Enable.
    bit_offset: 1
    bit_size: 1
    enum: Pe
  - name: sre
    description: Slew Rate Enable.
    bit_offset: 3
    bit_size: 1
    enum: Sre
  - name: ode
    description: Open Drain Enable.
    bit_offset: 5
    bit_size: 1
    enum: Ode
  - name: dse
    description: Drive Strength Enable.
    bit_offset: 6
    bit_size: 1
    enum: Dse
  - name: mux
    description: Pin Multiplex Control.
    bit_offset: 8
    bit_size: 4
    enum: Mux
  - name: ibe
    description: Input Buffer Enable.
    bit_offset: 12
    bit_size: 1
    enum: Ibe
  - name: inv
    description: Invert Input.
    bit_offset: 13
    bit_size: 1
    enum: Inv
  - name: lk
    description: Lock Register.
    bit_offset: 15
    bit_size: 1
    enum: Lk
fieldset/Verid:
  description: Version ID.
  fields:
  - name: feature
    description: Feature Specification Number.
    bit_offset: 0
    bit_size: 16
    enum: Feature
  - name: minor
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: major
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/Dse:
  bit_size: 1
  variants:
  - name: Dse0
    description: Low.
    value: 0
  - name: Dse1
    description: High.
    value: 1
enum/Feature:
  bit_size: 16
  variants:
  - name: Feature0
    description: Basic implementation.
    value: 0
enum/Gpwe:
  bit_size: 1
  variants:
  - name: Gpwe0
    description: Not updated.
    value: 0
  - name: Gpwe1
    description: Updated.
    value: 1
enum/Ibe:
  bit_size: 1
  variants:
  - name: Ibe0
    description: Disables.
    value: 0
  - name: Ibe1
    description: Enables.
    value: 1
enum/Inv:
  bit_size: 1
  variants:
  - name: Inv0
    description: Does not invert.
    value: 0
  - name: Inv1
    description: Inverts.
    value: 1
enum/Lk:
  bit_size: 1
  variants:
  - name: Lk0
    description: Does not lock.
    value: 0
  - name: Lk1
    description: Locks.
    value: 1
enum/Mux:
  bit_size: 4
  variants:
  - name: Mux0
    value: 0
  - name: Mux1
    value: 1
  - name: Mux2
    value: 2
  - name: Mux3
    value: 3
  - name: Mux4
    value: 4
  - name: Mux5
    value: 5
  - name: Mux6
    value: 6
  - name: Mux7
    value: 7
  - name: Mux8
    value: 8
  - name: Mux9
    value: 9
  - name: Mux10
    value: 10
  - name: Mux11
    value: 11
  - name: Mux12
    value: 12
  - name: Mux13
    value: 13
enum/Ode:
  bit_size: 1
  variants:
  - name: Ode0
    description: Disables.
    value: 0
  - name: Ode1
    description: Enables.
    value: 1
enum/Pe:
  bit_size: 1
  variants:
  - name: Pe0
    description: Disables.
    value: 0
  - name: Pe1
    description: Enables.
    value: 1
enum/Ps:
  bit_size: 1
  variants:
  - name: Ps0
    description: Enables internal pulldown resistor.
    value: 0
  - name: Ps1
    description: Enables internal pullup resistor.
    value: 1
enum/Range:
  bit_size: 1
  variants:
  - name: Range0
    description: 1.71 V-3.6 V.
    value: 0
  - name: Range1
    description: 2.70 V-3.6 V.
    value: 1
enum/Sre:
  bit_size: 1
  variants:
  - name: Sre0
    description: Fast.
    value: 0
  - name: Sre1
    description: Slow.
    value: 1
