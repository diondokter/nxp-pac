    bit_offset: 0
    bit_size: 16
  - name: DLC
    description: Length of the data to be stored/transmitted.
    bit_offset: 16
    bit_size: 4
  - name: RTR
    description: Remote Transmission Request. One/zero for remote/data frame.
    bit_offset: 20
    bit_size: 1
  - name: IDE
    description: ID Extended. One/zero for extended/standard format frame.
    bit_offset: 21
    bit_size: 1
  - name: SRR
    description: Substitute Remote Request. Contains a fixed recessive bit.
    bit_offset: 22
    bit_size: 1
  - name: CODE
    description: Message Buffer Code. This 4-bit field can be accessed (read or write) by the CPU and by the FlexCAN module itself, as part of the message buffer matching and arbitration process.
    bit_offset: 24
    bit_size: 4
  - name: ESI
    description: Error State Indicator. This bit indicates if the transmitting node is error active or error passive.
    bit_offset: 29
    bit_size: 1
  - name: BRS
    description: Bit Rate Switch. This bit defines whether the bit rate is switched inside a CAN FD format frame.
    bit_offset: 30
    bit_size: 1
  - name: EDL
    description: Extended Data Length. This bit distinguishes between CAN format and CAN FD format frames. The EDL bit must not be set for Message Buffers configured to RANSWER with code field 0b1010.
    bit_offset: 31
    bit_size: 1
fieldset/MB9_8B_ID:
  description: Message Buffer 9 ID Register.
  fields:
  - name: EXT
    description: Contains extended (LOW word) identifier of message buffer.
    bit_offset: 0
    bit_size: 18
  - name: STD
    description: Contains standard/extended (HIGH word) identifier of message buffer.
    bit_offset: 18
    bit_size: 11
  - name: PRIO
    description: Local priority. This 3-bit fieldis only used when LPRIO_EN bit is set in MCR and it only makes sense for Tx buffers. These bits are not transmitted. They are appended to the regular ID to define the transmission priority.
