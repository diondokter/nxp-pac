      description: Nonsecure protection level for DMA transfers.
      value: 0
    - name: SecureProtection
      description: Secure protection level for DMA transfers.
      value: 1
enum/Size:
  bit_size: 3
  variants:
    - name: EightBit
      description: 8-bit.
      value: 0
    - name: SixteenBit
      description: 16-bit.
      value: 1
    - name: ThirtytwoBit
      description: 32-bit.
      value: 2
    - name: SixtyfourBit
      description: 64-bit.
      value: 3
    - name: SixteenByte
      description: 16-byte.
      value: 4
    - name: ThirtytwoByte
      description: 32-byte.
      value: 5
enum/Start:
  bit_size: 1
  variants:
