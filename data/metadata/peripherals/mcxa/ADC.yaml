    bit_offset: 10
    bit_size: 1
    enum: CalRdy
  - name: adc_active
    description: ADC Active.
    bit_offset: 11
    bit_size: 1
    enum: AdcActive
  - name: trgact
    description: Trigger Active.
    bit_offset: 16
    bit_size: 2
    enum: Trgact
  - name: cmdact
    description: Command Active.
    bit_offset: 24
    bit_size: 3
    enum: Cmdact
fieldset/Swtrig:
  description: Software Trigger Register.
  fields:
  - name: swt
    description: Software Trigger 0 Event.
    bit_offset: 0
