    bit_offset: 8
    bit_size: 1
    enum: Vr1rngi
  - name: iadcki
    description: Internal ADC Clock Implemented.
    bit_offset: 9
    bit_size: 1
    enum: Iadcki
  - name: calofsi
    description: Calibration Function Implemented.
    bit_offset: 10
    bit_size: 1
    enum: Calofsi
  - name: num_sec
    description: Number of Single Ended Outputs Supported.
    bit_offset: 11
    bit_size: 1
    enum: NumSec
  - name: num_fifo
    description: Number of FIFOs.
    bit_offset: 12
    bit_size: 3
    enum: NumFifo
