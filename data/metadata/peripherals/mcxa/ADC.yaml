    bit_size: 8
  - name: major
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/AdcActive:
  bit_size: 1
  variants:
  - name: NOT_ACTIVE
    description: The ADC is IDLE. There are no pending triggers to service and no active commands are being processed.
    value: 0
  - name: BUSY
    description: The ADC is processing a conversion, running through the power up delay, or servicing a trigger.
    value: 1
enum/Avgs:
  bit_size: 4
  variants:
  - name: NO_AVERAGE
    description: Single conversion.
    value: 0
  - name: AVERAGE_2
    description: 2 conversions averaged.
    value: 1
  - name: AVERAGE_4
    description: 4 conversions averaged.
    value: 2
  - name: AVERAGE_8
    description: 8 conversions averaged.
    value: 3
  - name: AVERAGE_16
    description: 16 conversions averaged.
    value: 4
  - name: AVERAGE_32
    description: 32 conversions averaged.
    value: 5
  - name: AVERAGE_64
    description: 64 conversions averaged.
    value: 6
  - name: AVERAGE_128
    description: 128 conversions averaged.
    value: 7
  - name: AVERAGE_256
    description: 256 conversions averaged.
    value: 8
  - name: AVERAGE_512
    description: 512 conversions averaged.
    value: 9
  - name: AVERAGE_1024
    description: 1024 conversions averaged.
    value: 10
enum/CalAvgs:
  bit_size: 4
  variants:
  - name: NO_AVERAGE
    description: Single conversion.
    value: 0
  - name: AVERAGE_2
    description: 2 conversions averaged.
    value: 1
  - name: AVERAGE_4
    description: 4 conversions averaged.
    value: 2
  - name: AVERAGE_8
    description: 8 conversions averaged.
    value: 3
  - name: AVERAGE_16
    description: 16 conversions averaged.
    value: 4
  - name: AVERAGE_32
    description: 32 conversions averaged.
    value: 5
  - name: AVERAGE_64
    description: 64 conversions averaged.
    value: 6
  - name: AVERAGE_128
    description: 128 conversions averaged.
    value: 7
  - name: AVERAGE_256
    description: 256 conversions averaged.
    value: 8
  - name: AVERAGE_512
    description: 512 conversions averaged.
    value: 9
  - name: AVERAGE_1024
    description: 1024 conversions averaged.
    value: 10
enum/CalRdy:
  bit_size: 1
  variants:
  - name: NOT_SET
    description: Calibration is incomplete or hasn't been ran.
    value: 0
  - name: HARDWARE_CAL_STEP_COMPLETED
    description: The ADC is calibrated.
    value: 1
enum/CalReq:
  bit_size: 1
  variants:
  - name: NO_CALIBRATION_REQUEST
    description: No request for hardware calibration has been made.
    value: 0
  - name: CALIBRATION_REQUEST_PENDING
    description: A request for hardware calibration has been made.
    value: 1
enum/Calhs:
  bit_size: 1
  variants:
  - name: NO_ACTIVE_HS_TRIM_REQUEST
    description: No request for high speed mode trim has been made.
    value: 0
  - name: HS_TRIM_REQUEST_PENDING
    description: Request for high speed mode trim has been made.
    value: 1
enum/Calofs:
  bit_size: 1
  variants:
  - name: NO_ACTIVE_OFFSET_CALIBRATION_REQUEST
    description: No request for offset calibration has been made.
    value: 0
  - name: OFFSET_CALIBRATION_REQUEST_PENDING
    description: Request for offset calibration function.
    value: 1
enum/Calofsi:
  bit_size: 1
  variants:
  - name: CAL_FUNCTION_NOT_AVAILABLE
    description: Calibration Not Implemented.
    value: 0
  - name: CAL_FUNCTION_AVAILABLE
    description: Calibration Implemented.
    value: 1
enum/Cmdact:
  bit_size: 3
  variants:
  - name: NO_COMMAND_ACTIVE
    description: No command is currently in progress.
    value: 0
  - name: COMMAND_1
    description: Command 1 currently being executed.
    value: 1
  - name: COMMAND_2
    description: Command 2 currently being executed.
    value: 2
  - name: COMMAND_X_3
    description: Associated command number is currently being executed.
    value: 3
  - name: COMMAND_X_4
    description: Associated command number is currently being executed.
    value: 4
  - name: COMMAND_X_5
    description: Associated command number is currently being executed.
    value: 5
  - name: COMMAND_X_6
    description: Associated command number is currently being executed.
    value: 6
  - name: COMMAND_X_7
    description: Associated command number is currently being executed.
    value: 7
enum/Cmdsrc:
  bit_size: 3
  variants:
  - name: NOT_VALID
    description: Not a valid value CMDSRC value for a dataword in RESFIFO. 0x0 is only found in initial FIFO state prior to an ADC conversion result dataword being stored to a RESFIFO buffer.
    value: 0
  - name: CMD1
    description: CMD1 buffer used as control settings for this conversion.
    value: 1
  - name: CORRESPONDING_CMD_2
    description: Corresponding command buffer used as control settings for this conversion.
    value: 2
  - name: CORRESPONDING_CMD_3
    description: Corresponding command buffer used as control settings for this conversion.
    value: 3
  - name: CORRESPONDING_CMD_4
    description: Corresponding command buffer used as control settings for this conversion.
    value: 4
  - name: CORRESPONDING_CMD_5
    description: Corresponding command buffer used as control settings for this conversion.
    value: 5
  - name: CORRESPONDING_CMD_6
    description: Corresponding command buffer used as control settings for this conversion.
    value: 6
  - name: CMD7
    description: CMD7 buffer used as control settings for this conversion.
    value: 7
enum/Cmpen:
  bit_size: 2
  variants:
  - name: DISABLED_ALWAYS_STORE_RESULT
    description: Compare disabled.
    value: 0
  - name: COMPARE_RESULT_STORE_IF_TRUE
    description: Compare enabled. Store on true.
    value: 2
  - name: COMPARE_RESULT_KEEP_CONVERTING_UNTIL_TRUE_STORE_IF_TRUE
    description: Compare enabled. Repeat channel acquisition (sample/convert/compare) until true.
    value: 3
enum/Csw:
  bit_size: 3
  variants:
  - name: CSCALE_NOT_SUPPORTED
    description: Channel scaling not supported.
    value: 0
  - name: BIT_WIDTH_1
    description: Channel scaling supported. 1-bit CSCALE control field.
    value: 1
  - name: BIT_WIDTH_6
    description: Channel scaling supported. 6-bit CSCALE control field.
    value: 6
enum/Ctype:
  bit_size: 2
  variants:
  - name: SINGLE_ENDED_A_SIDE_CHANNEL
    description: Single-Ended Mode. Only A side channel is converted.
    value: 0
enum/Diffen:
  bit_size: 1
  variants:
  - name: DIFFERENTIAL_NOT_SUPPORTED
    description: Differential operation not supported.
    value: 0
  - name: DIFFERENTIAL_SUPPORTED
    description: Differential operation supported.
    value: 1
enum/Dozen:
  bit_size: 1
  variants:
  - name: ENABLED
    description: ADC is enabled in low power mode.
    value: 0
  - name: DISABLED
    description: ADC is disabled in low power mode.
    value: 1
enum/Fifosize:
  bit_size: 8
  variants:
  - name: ENTRIES_2
    description: Result FIFO depth = 2 dataword.
    value: 1
  - name: ENTRIES_4
    description: Result FIFO depth = 4 datawords.
    value: 4
  - name: ENTRIES_8
    description: Result FIFO depth = 8 datawords.
    value: 8
  - name: ENTRIES_16
    description: Result FIFO depth = 16 datawords.
    value: 16
  - name: ENTRIES_32
    description: Result FIFO depth = 32 datawords.
    value: 32
  - name: ENTRIES_64
    description: Result FIFO depth = 64 datawords.
    value: 64
enum/Fof0:
  bit_size: 1
  variants:
  - name: NO_OVERFLOW
    description: No result FIFO 0 overflow has occurred since the last time the flag was cleared.
    value: 0
  - name: OVERFLOW_DETECTED
    description: At least one result FIFO 0 overflow has occurred since the last time the flag was cleared.
    value: 1
enum/Gcc0Rdy:
  bit_size: 1
  variants:
  - name: GAIN_CAL_NOT_VALID
    description: The GAIN_CAL value is invalid. Run the hardware calibration routine for this value to be set.
    value: 0
  - name: HARDWARE_CAL_ROUTINE_COMPLETED
    description: The GAIN_CAL value is valid. GAIN_CAL should be used by software to derive GCRa[GCALR].
    value: 1
enum/HptExdi:
  bit_size: 1
  variants:
  - name: ENABLED
    description: High priority trigger exceptions are enabled.
    value: 0
  - name: DISABLED
    description: High priority trigger exceptions are disabled.
    value: 1
enum/Hsextra:
  bit_size: 1
  variants:
  - name: HSEXTRA_0
    description: No extra cycle added.
    value: 0
  - name: HSEXTRA_1
    description: Extra cycle added.
    value: 1
enum/Iadcki:
  bit_size: 1
  variants:
  - name: INTERNAL_CLK_NOT_AVAILABLE
    description: Internal clock source not implemented.
    value: 0
  - name: INTERNAL_CLK_AVAILABLE
    description: Internal clock source (and CFG[ADCKEN]) implemented.
    value: 1
enum/Loop:
  bit_size: 4
  variants:
  - name: CMD_EXEC_1X
    description: Looping not enabled. Command executes 1 time.
    value: 0
  - name: CMD_EXEC_2X
    description: Loop 1 time. Command executes 2 times.
    value: 1
  - name: CMD_EXEC_3X
    description: Loop 2 times. Command executes 3 times.
    value: 2
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_3
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 3
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_4
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 4
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_5
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 5
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_6
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 6
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_7
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 7
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_8
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 8
  - name: CMD_EXECUTES_CORRESPONDING_TIMES_9
    description: Loop corresponding number of times. Command executes LOOP+1 times.
    value: 9
  - name: CMD_EXEC_15X
    description: Loop 15 times. Command executes 16 times.
    value: 15
enum/Loopcnt:
  bit_size: 4
