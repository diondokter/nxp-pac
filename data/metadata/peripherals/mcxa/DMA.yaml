fieldset/ChGrpri:
  description: Channel Arbitration Group.
  fields:
  - name: grpri
    description: Arbitration Group For Channel n.
    bit_offset: 0
    bit_size: 5
fieldset/MpCsr4:
  description: Management Page Control.
  fields:
  - name: edbg
    description: Enable Debug.
    bit_offset: 1
    bit_size: 1
  - name: erca
    description: Enable Round Robin Channel Arbitration.
    bit_offset: 2
    bit_size: 1
  - name: hae
    description: Halt After Error.
    bit_offset: 4
    bit_size: 1
    enum: Hae
  - name: halt
    description: Halt DMA Operations.
    bit_offset: 5
    bit_size: 1
    enum: Halt
  - name: gclc
    description: Global Channel Linking Control.
    bit_offset: 6
    bit_size: 1
  - name: gmrc
    description: Global Master ID Replication Control.
    bit_offset: 7
    bit_size: 1
  - name: ecx
    description: Cancel Transfer With Error.
    bit_offset: 8
    bit_size: 1
    enum: MpCsrEcx
  - name: cx
    description: Cancel Transfer.
    bit_offset: 9
    bit_size: 1
    enum: Cx
  - name: active_id
    description: Active Channel ID.
    bit_offset: 24
    bit_size: 2
  - name: active
    description: DMA Active Status.
    bit_offset: 31
    bit_size: 1
    enum: Active
