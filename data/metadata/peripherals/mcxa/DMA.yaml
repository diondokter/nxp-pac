block/Dma4:
  description: DMA MP.
  items:
  - name: mp_csr
    description: Management Page Control.
    byte_offset: 0
    fieldset: MpCsr4
  - name: mp_es
    description: Management Page Error Status.
    byte_offset: 4
    access: Read
    fieldset: MpEs4
  - name: mp_int
    description: Management Page Interrupt Request Status.
    byte_offset: 8
    access: Read
    fieldset: MpInt
  - name: mp_hrs
    description: Management Page Hardware Request Status.
    byte_offset: 12
    access: Read
    fieldset: MpHrs
  - name: ch_grpri
    description: Channel Arbitration Group.
    array:
      len: 4
      stride: 4
    byte_offset: 256
    fieldset: ChGrpri
