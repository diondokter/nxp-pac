block/LPUART:
  description: LPUART.
  items:
  - name: VERID
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: VERID
  - name: PARAM
    description: Parameter.
    byte_offset: 4
    access: Read
    fieldset: PARAM
  - name: GLOBAL
    description: Global.
    byte_offset: 8
    fieldset: GLOBAL
  - name: PINCFG
    description: Pin Configuration.
    byte_offset: 12
    fieldset: PINCFG
  - name: BAUD
    description: Baud Rate.
    byte_offset: 16
    fieldset: BAUD
  - name: STAT
    description: Status.
    byte_offset: 20
    fieldset: STAT
  - name: CTRL
    description: Control.
    byte_offset: 24
    fieldset: CTRL
  - name: DATA
    description: Data.
    byte_offset: 28
    fieldset: DATA
  - name: MATCH
    description: Match Address.
    byte_offset: 32
    fieldset: MATCH
  - name: MODIR
    description: MODEM IrDA.
    byte_offset: 36
    fieldset: MODIR
  - name: FIFO
    description: FIFO.
    byte_offset: 40
    fieldset: FIFO
  - name: WATER
    description: Watermark.
    byte_offset: 44
    fieldset: WATER
  - name: DATARO
    description: Data Read-Only.
    byte_offset: 48
    access: Read
    fieldset: DATARO
fieldset/BAUD:
  description: Baud Rate.
  fields:
  - name: SBR
    description: Baud Rate Modulo Divisor.
    bit_offset: 0
    bit_size: 13
  - name: SBNS
    description: Stop Bit Number Select.
    bit_offset: 13
    bit_size: 1
    enum: SBNS
  - name: RXEDGIE
    description: RX Input Active Edge Interrupt Enable.
    bit_offset: 14
    bit_size: 1
  - name: LBKDIE
    description: LIN Break Detect Interrupt Enable.
    bit_offset: 15
    bit_size: 1
  - name: RESYNCDIS
    description: Resynchronization Disable.
    bit_offset: 16
    bit_size: 1
    enum: RESYNCDIS
  - name: BOTHEDGE
    description: Both Edge Sampling.
    bit_offset: 17
    bit_size: 1
  - name: MATCFG
    description: Match Configuration.
    bit_offset: 18
    bit_size: 2
    enum: MATCFG
  - name: RIDMAE
    description: Receiver Idle DMA Enable.
    bit_offset: 20
    bit_size: 1
  - name: RDMAE
    description: Receiver Full DMA Enable.
    bit_offset: 21
    bit_size: 1
  - name: TDMAE
    description: Transmitter DMA Enable.
    bit_offset: 23
    bit_size: 1
  - name: OSR
    description: Oversampling Ratio.
    bit_offset: 24
    bit_size: 5
    enum: OSR
  - name: M10
    description: 10-Bit Mode Select.
    bit_offset: 29
    bit_size: 1
  - name: MAEN2
    description: Match Address Mode Enable 2.
    bit_offset: 30
    bit_size: 1
  - name: MAEN1
    description: Match Address Mode Enable 1.
    bit_offset: 31
    bit_size: 1
fieldset/CTRL:
  description: Control.
  fields:
  - name: PT
    description: Parity Type.
    bit_offset: 0
    bit_size: 1
    enum: PT
  - name: PE
    description: Parity Enable.
    bit_offset: 1
    bit_size: 1
  - name: ILT
    description: Idle Line Type Select.
    bit_offset: 2
    bit_size: 1
    enum: ILT
  - name: WAKE
    description: Receiver Wake-Up Method Select.
    bit_offset: 3
    bit_size: 1
    enum: WAKE
  - name: M
    description: 9-Bit Or 8-Bit Mode Select.
    bit_offset: 4
    bit_size: 1
    enum: M
  - name: RSRC
    description: Receiver Source Select.
    bit_offset: 5
    bit_size: 1
    enum: RSRC
  - name: DOZEEN
    description: Doze Mode.
    bit_offset: 6
    bit_size: 1
    enum: DOZEEN
  - name: LOOPS
    description: Loop Mode Select.
    bit_offset: 7
    bit_size: 1
    enum: LOOPS
  - name: IDLECFG
    description: Idle Configuration.
    bit_offset: 8
    bit_size: 3
    enum: IDLECFG
  - name: M7
    description: 7-Bit Mode Select.
    bit_offset: 11
    bit_size: 1
    enum: M7
  - name: SWAP
    description: TXD and RXD Pin Swap.
    bit_offset: 12
    bit_size: 1
    enum: SWAP
  - name: MA2IE
    description: Match 2 (MA2F) Interrupt Enable.
    bit_offset: 14
    bit_size: 1
  - name: MA1IE
    description: Match 1 (MA1F) Interrupt Enable.
    bit_offset: 15
    bit_size: 1
  - name: SBK
    description: Send Break.
    bit_offset: 16
    bit_size: 1
    enum: SBK
  - name: RWU
    description: Receiver Wake-Up Control.
    bit_offset: 17
    bit_size: 1
    enum: RWU
  - name: RE
    description: Receiver Enable.
    bit_offset: 18
    bit_size: 1
  - name: TE
    description: Transmitter Enable.
    bit_offset: 19
    bit_size: 1
  - name: ILIE
    description: Idle Line Interrupt Enable.
    bit_offset: 20
    bit_size: 1
  - name: RIE
    description: Receiver Interrupt Enable.
    bit_offset: 21
    bit_size: 1
  - name: TCIE
    description: Transmission Complete Interrupt Enable.
    bit_offset: 22
    bit_size: 1
  - name: TIE
    description: Transmit Interrupt Enable.
    bit_offset: 23
    bit_size: 1
  - name: PEIE
    description: Parity Error Interrupt Enable.
    bit_offset: 24
    bit_size: 1
  - name: FEIE
    description: Framing Error Interrupt Enable.
    bit_offset: 25
    bit_size: 1
  - name: NEIE
    description: Noise Error Interrupt Enable.
    bit_offset: 26
    bit_size: 1
  - name: ORIE
    description: Overrun Interrupt Enable.
    bit_offset: 27
    bit_size: 1
  - name: TXINV
    description: Transmit Data Inversion.
    bit_offset: 28
    bit_size: 1
  - name: TXDIR
    description: TXD Pin Direction in Single-Wire Mode.
    bit_offset: 29
    bit_size: 1
    enum: TXDIR
  - name: R9T8
    description: Receive Bit 9 Transmit Bit 8.
    bit_offset: 30
    bit_size: 1
  - name: R8T9
    description: Receive Bit 8 Transmit Bit 9.
    bit_offset: 31
    bit_size: 1
fieldset/DATA:
  description: Data.
  fields:
  - name: R0T0
    description: Read receive FIFO bit 0 or write transmit FIFO bit 0.
    bit_offset: 0
    bit_size: 1
  - name: R1T1
    description: Read receive FIFO bit 1 or write transmit FIFO bit 1.
    bit_offset: 1
    bit_size: 1
  - name: R2T2
    description: Read receive FIFO bit 2 or write transmit FIFO bit 2.
    bit_offset: 2
    bit_size: 1
  - name: R3T3
    description: Read receive FIFO bit 3 or write transmit FIFO bit 3.
    bit_offset: 3
    bit_size: 1
  - name: R4T4
    description: Read receive FIFO bit 4 or write transmit FIFO bit 4.
    bit_offset: 4
    bit_size: 1
  - name: R5T5
    description: Read receive FIFO bit 5 or write transmit FIFO bit 5.
    bit_offset: 5
    bit_size: 1
  - name: R6T6
    description: Read receive FIFO bit 6 or write transmit FIFO bit 6.
    bit_offset: 6
    bit_size: 1
  - name: R7T7
    description: Read receive FIFO bit 7 or write transmit FIFO bit 7.
    bit_offset: 7
    bit_size: 1
  - name: R8T8
    description: Read receive FIFO bit 8 or write transmit FIFO bit 8.
    bit_offset: 8
    bit_size: 1
  - name: R9T9
    description: Read receive FIFO bit 9 or write transmit FIFO bit 9.
    bit_offset: 9
    bit_size: 1
  - name: LINBRK
    description: LIN Break.
    bit_offset: 10
    bit_size: 1
  - name: IDLINE
    description: Idle Line.
    bit_offset: 11
    bit_size: 1
  - name: RXEMPT
    description: Receive Buffer Empty.
    bit_offset: 12
    bit_size: 1
  - name: FRETSC
    description: Frame Error Transmit Special Character.
    bit_offset: 13
    bit_size: 1
  - name: PARITYE
    description: Parity Error.
    bit_offset: 14
    bit_size: 1
  - name: NOISY
    description: Noisy Data Received.
    bit_offset: 15
    bit_size: 1
fieldset/DATARO:
  description: Data Read-Only.
  fields:
  - name: DATA
    description: Receive Data.
    bit_offset: 0
    bit_size: 16
fieldset/FIFO:
  description: FIFO.
  fields:
  - name: RXFIFOSIZE
    description: Receive FIFO Buffer Depth.
    bit_offset: 0
    bit_size: 3
    enum: RXFIFOSIZE
  - name: RXFE
    description: Receive FIFO Enable.
    bit_offset: 3
    bit_size: 1
  - name: TXFIFOSIZE
    description: Transmit FIFO Buffer Depth.
    bit_offset: 4
    bit_size: 3
    enum: TXFIFOSIZE
  - name: TXFE
    description: Transmit FIFO Enable.
    bit_offset: 7
    bit_size: 1
  - name: RXUFE
    description: Receive FIFO Underflow Interrupt Enable.
    bit_offset: 8
    bit_size: 1
  - name: TXOFE
    description: Transmit FIFO Overflow Interrupt Enable.
    bit_offset: 9
    bit_size: 1
  - name: RXIDEN
    description: Receiver Idle Empty Enable.
    bit_offset: 10
    bit_size: 3
    enum: RXIDEN
  - name: RXFLUSH
    description: Receive FIFO Flush.
    bit_offset: 14
    bit_size: 1
    enum: RXFLUSH
  - name: TXFLUSH
    description: Transmit FIFO Flush.
    bit_offset: 15
    bit_size: 1
    enum: TXFLUSH
  - name: RXUF
    description: Receiver FIFO Underflow Flag.
    bit_offset: 16
    bit_size: 1
  - name: TXOF
    description: Transmitter FIFO Overflow Flag.
    bit_offset: 17
    bit_size: 1
  - name: RXEMPT
    description: Receive FIFO Or Buffer Empty.
    bit_offset: 22
    bit_size: 1
  - name: TXEMPT
    description: Transmit FIFO Or Buffer Empty.
    bit_offset: 23
    bit_size: 1
fieldset/GLOBAL:
  description: Global.
  fields:
  - name: RST
    description: Software Reset.
    bit_offset: 1
    bit_size: 1
    enum: RST
fieldset/MATCH:
  description: Match Address.
  fields:
  - name: MA1
    description: Match Address 1.
    bit_offset: 0
    bit_size: 10
  - name: MA2
    description: Match Address 2.
    bit_offset: 16
    bit_size: 10
fieldset/MODIR:
  description: MODEM IrDA.
  fields:
  - name: TXCTSE
    description: Transmitter CTS Enable.
    bit_offset: 0
    bit_size: 1
  - name: TXRTSE
    description: Transmitter RTS Enable.
    bit_offset: 1
    bit_size: 1
  - name: TXRTSPOL
    description: Transmitter RTS Polarity.
    bit_offset: 2
    bit_size: 1
    enum: TXRTSPOL
  - name: RXRTSE
    description: Receiver RTS Enable.
    bit_offset: 3
    bit_size: 1
  - name: TXCTSC
    description: Transmit CTS Configuration.
    bit_offset: 4
    bit_size: 1
    enum: TXCTSC
  - name: TXCTSSRC
    description: Transmit CTS Source.
    bit_offset: 5
    bit_size: 1
    enum: TXCTSSRC
  - name: RTSWATER
    description: Receive RTS Configuration.
    bit_offset: 8
    bit_size: 2
  - name: TNP
    description: Transmitter Narrow Pulse.
    bit_offset: 16
    bit_size: 2
    enum: TNP
  - name: IREN
    description: IR Enable.
    bit_offset: 18
    bit_size: 1
fieldset/PARAM:
  description: Parameter.
  fields:
  - name: TXFIFO
    description: Transmit FIFO Size.
    bit_offset: 0
    bit_size: 8
  - name: RXFIFO
    description: Receive FIFO Size.
    bit_offset: 8
    bit_size: 8
fieldset/PINCFG:
  description: Pin Configuration.
  fields:
  - name: TRGSEL
    description: Trigger Select.
    bit_offset: 0
    bit_size: 2
    enum: TRGSEL
fieldset/STAT:
  description: Status.
  fields:
  - name: LBKFE
    description: LIN Break Flag Enable.
    bit_offset: 0
    bit_size: 1
  - name: AME
    description: Address Mark Enable.
    bit_offset: 1
    bit_size: 1
  - name: MA2F
    description: Match 2 Flag.
    bit_offset: 14
    bit_size: 1
  - name: MA1F
    description: Match 1 Flag.
    bit_offset: 15
    bit_size: 1
  - name: PF
    description: Parity Error Flag.
    bit_offset: 16
    bit_size: 1
  - name: FE
    description: Framing Error Flag.
    bit_offset: 17
    bit_size: 1
  - name: NF
    description: Noise Flag.
    bit_offset: 18
    bit_size: 1
  - name: OR
    description: Receiver Overrun Flag.
    bit_offset: 19
    bit_size: 1
  - name: IDLE
    description: Idle Line Flag.
    bit_offset: 20
    bit_size: 1
  - name: RDRF
    description: Receive Data Register Full Flag.
    bit_offset: 21
    bit_size: 1
  - name: TC
    description: Transmission Complete Flag.
    bit_offset: 22
    bit_size: 1
    enum: TC
  - name: TDRE
    description: Transmit Data Register Empty Flag.
    bit_offset: 23
    bit_size: 1
    enum: TDRE
  - name: RAF
    description: Receiver Active Flag.
    bit_offset: 24
    bit_size: 1
    enum: RAF
  - name: LBKDE
    description: LIN Break Detection Enable.
    bit_offset: 25
    bit_size: 1
  - name: BRK13
    description: Break Character Generation Length.
    bit_offset: 26
    bit_size: 1
    enum: BRK13
  - name: RWUID
    description: Receive Wake Up Idle Detect.
    bit_offset: 27
    bit_size: 1
    enum: RWUID
  - name: RXINV
    description: Receive Data Inversion.
    bit_offset: 28
    bit_size: 1
  - name: MSBF
    description: MSB First.
    bit_offset: 29
    bit_size: 1
    enum: MSBF
  - name: RXEDGIF
    description: RXD Pin Active Edge Interrupt Flag.
    bit_offset: 30
    bit_size: 1
  - name: LBKDIF
    description: LIN Break Detect Interrupt Flag.
    bit_offset: 31
    bit_size: 1
fieldset/VERID:
  description: Version ID.
  fields:
  - name: FEATURE
    description: Feature Identification Number.
    bit_offset: 0
    bit_size: 16
    enum: FEATURE
  - name: MINOR
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: MAJOR
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
fieldset/WATER:
  description: Watermark.
  fields:
  - name: TXWATER
    description: Transmit Watermark.
    bit_offset: 0
    bit_size: 2
  - name: TXCOUNT
    description: Transmit Counter.
    bit_offset: 8
    bit_size: 3
  - name: RXWATER
    description: Receive Watermark.
    bit_offset: 16
    bit_size: 2
  - name: RXCOUNT
    description: Receive Counter.
    bit_offset: 24
    bit_size: 3
enum/BRK13:
  bit_size: 1
  variants:
  - name: SHORT
    description: 9 to 13 bit times.
    value: 0
  - name: LONG
    description: 12 to 15 bit times.
    value: 1
enum/DOZEEN:
  bit_size: 1
  variants:
  - name: ENABLED
    description: Enable.
    value: 0
  - name: DISABLED
    description: Disable.
    value: 1
enum/FEATURE:
  bit_size: 16
  variants:
  - name: STANDARD
    description: Standard feature set.
    value: 1
  - name: MODEM
    description: Standard feature set with MODEM and IrDA support.
    value: 3
enum/IDLECFG:
  bit_size: 3
  variants:
  - name: IDLE_1
    description: '1.'
    value: 0
  - name: IDLE_2
    description: '2.'
    value: 1
  - name: IDLE_4
    description: '4.'
    value: 2
  - name: IDLE_8
    description: '8.'
    value: 3
  - name: IDLE_16
    description: '16.'
    value: 4
  - name: IDLE_32
    description: '32.'
    value: 5
  - name: IDLE_64
    description: '64.'
    value: 6
  - name: IDLE_128
    description: '128.'
    value: 7
enum/ILT:
  bit_size: 1
  variants:
  - name: FROM_START
    description: After the start bit.
    value: 0
  - name: FROM_STOP
    description: After the stop bit.
    value: 1
enum/LOOPS:
  bit_size: 1
  variants:
  - name: NOFFECT
    description: 'Normal operation: RXD and TXD use separate pins.'
    value: 0
  - name: LOOPBACK
    description: Loop mode or Single-Wire mode.
    value: 1
enum/M:
  bit_size: 1
  variants:
  - name: DATA8
    description: 8-bit.
    value: 0
  - name: DATA9
    description: 9-bit.
    value: 1
enum/M7:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: 8-bit to 10-bit.
    value: 0
  - name: DATA7
    description: 7-bit.
    value: 1
enum/MATCFG:
  bit_size: 2
  variants:
  - name: ADDR_MATCH
    description: Address match wake-up.
    value: 0
  - name: IDLE_MATCH
    description: Idle match wake-up.
    value: 1
  - name: ONOFF_MATCH
    description: Match on and match off.
    value: 2
  - name: RWU_MATCH
    description: Enables RWU on data match and match on or off for the transmitter CTS input.
    value: 3
enum/MSBF:
  bit_size: 1
  variants:
  - name: LSB_FIRST
    description: LSB.
    value: 0
  - name: MSB_FIRST
    description: MSB.
    value: 1
enum/OSR:
  bit_size: 5
  variants:
  - name: DEFAULT
    description: Results in an OSR of 16.
    value: 0
  - name: OSR_4
    description: Results in an OSR of 4 (requires BAUD[BOTHEDGE] to be 1).
    value: 3
  - name: OSR_5
    description: Results in an OSR of 5 (requires BAUD[BOTHEDGE] to be 1).
    value: 4
  - name: OSR_6
    description: Results in an OSR of 6 (requires BAUD[BOTHEDGE] to be 1).
    value: 5
  - name: OSR_7
    description: Results in an OSR of 7 (requires BAUD[BOTHEDGE] to be 1).
    value: 6
  - name: OSR_8
    description: Results in an OSR of 8.
    value: 7
  - name: OSR_9
    description: Results in an OSR of 9.
    value: 8
  - name: OSR_10
    description: Results in an OSR of 10.
    value: 9
  - name: OSR_11
    description: Results in an OSR of 11.
    value: 10
  - name: OSR_12
    description: Results in an OSR of 12.
    value: 11
  - name: OSR_13
    description: Results in an OSR of 13.
    value: 12
  - name: OSR_14
    description: Results in an OSR of 14.
    value: 13
  - name: OSR_15
    description: Results in an OSR of 15.
    value: 14
  - name: OSR_16
    description: Results in an OSR of 16.
    value: 15
  - name: OSR_17
    description: Results in an OSR of 17.
    value: 16
  - name: OSR_18
    description: Results in an OSR of 18.
    value: 17
  - name: OSR_19
    description: Results in an OSR of 19.
    value: 18
  - name: OSR_20
    description: Results in an OSR of 20.
    value: 19
  - name: OSR_21
    description: Results in an OSR of 21.
    value: 20
  - name: OSR_22
    description: Results in an OSR of 22.
    value: 21
  - name: OSR_23
    description: Results in an OSR of 23.
    value: 22
  - name: OSR_24
    description: Results in an OSR of 24.
    value: 23
  - name: OSR_25
    description: Results in an OSR of 25.
    value: 24
  - name: OSR_26
    description: Results in an OSR of 26.
    value: 25
  - name: OSR_27
    description: Results in an OSR of 27.
    value: 26
  - name: OSR_28
    description: Results in an OSR of 28.
    value: 27
  - name: OSR_29
    description: Results in an OSR of 29.
    value: 28
  - name: OSR_30
    description: Results in an OSR of 30.
    value: 29
  - name: OSR_31
    description: Results in an OSR of 31.
    value: 30
  - name: OSR_32
    description: Results in an OSR of 32.
    value: 31
enum/PT:
  bit_size: 1
  variants:
  - name: EVEN
    description: Even parity.
    value: 0
  - name: ODD
    description: Odd parity.
    value: 1
enum/RAF:
  bit_size: 1
  variants:
  - name: IDLE
    description: Idle, waiting for a start bit.
    value: 0
  - name: ACTIVE
    description: Receiver active (RXD pin input not idle).
    value: 1
enum/RESYNCDIS:
  bit_size: 1
  variants:
  - name: RESYNC
    description: Enable.
    value: 0
  - name: NO_RESYNC
    description: Disable.
    value: 1
enum/RSRC:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Internal Loopback mode.
    value: 0
  - name: ONEWIRE
    description: Single-wire mode.
    value: 1
enum/RST:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Not reset.
    value: 0
  - name: RESET
    description: Reset.
    value: 1
enum/RWU:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Normal receiver operation.
    value: 0
  - name: RX_WAKEUP
    description: LPUART receiver in standby, waiting for a wake-up condition.
    value: 1
enum/RWUID:
  bit_size: 1
  variants:
  - name: IDLE_NOTSET
    description: STAT[IDLE] does not become 1.
    value: 0
  - name: IDLE_SET
    description: STAT[IDLE] becomes 1.
    value: 1
enum/RXFIFOSIZE:
  bit_size: 3
  variants:
  - name: FIFO_1
    description: '1.'
    value: 0
  - name: FIFO_4
    description: '4.'
    value: 1
  - name: FIFO_8
    description: '8.'
    value: 2
  - name: FIFO_16
    description: '16.'
    value: 3
  - name: FIFO_32
    description: '32.'
    value: 4
  - name: FIFO_64
    description: '64.'
    value: 5
  - name: FIFO_128
    description: '128.'
    value: 6
  - name: FIFO_256
    description: '256.'
    value: 7
enum/RXFLUSH:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: No effect.
    value: 0
  - name: RXFIFO_RST
    description: All data flushed out.
    value: 1
enum/RXIDEN:
  bit_size: 3
  variants:
  - name: DISABLED
    description: Disable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle.
    value: 0
  - name: IDLE_1
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for one character.
    value: 1
  - name: IDLE_2
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for two characters.
    value: 2
  - name: IDLE_4
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for four characters.
    value: 3
  - name: IDLE_8
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for eight characters.
    value: 4
  - name: IDLE_16
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for 16 characters.
    value: 5
  - name: IDLE_32
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for 32 characters.
    value: 6
  - name: IDLE_64
