block/Lpuart:
  description: LPUART.
  items:
  - name: verid
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: Verid
  - name: param
    description: Parameter.
    byte_offset: 4
    access: Read
    fieldset: Param
  - name: global
    description: Global.
    byte_offset: 8
    fieldset: Global
  - name: pincfg
    description: Pin Configuration.
    byte_offset: 12
    fieldset: Pincfg
  - name: baud
    description: Baud Rate.
    byte_offset: 16
    fieldset: Baud
  - name: stat
    description: Status.
    byte_offset: 20
    fieldset: Stat
  - name: ctrl
    description: Control.
    byte_offset: 24
    fieldset: Ctrl
  - name: data
    description: Data.
    byte_offset: 28
    fieldset: Data
  - name: match_
    description: Match Address.
    byte_offset: 32
    fieldset: Match
  - name: modir
    description: MODEM IrDA.
    byte_offset: 36
    fieldset: Modir
  - name: fifo
    description: FIFO.
    byte_offset: 40
    fieldset: Fifo
  - name: water
    description: Watermark.
    byte_offset: 44
    fieldset: Water
  - name: dataro
    description: Data Read-Only.
    byte_offset: 48
    access: Read
    fieldset: Dataro
fieldset/Baud:
  description: Baud Rate.
  fields:
  - name: sbr
    description: Baud Rate Modulo Divisor.
    bit_offset: 0
    bit_size: 13
  - name: sbns
    description: Stop Bit Number Select.
    bit_offset: 13
    bit_size: 1
    enum: Sbns
  - name: rxedgie
    description: RX Input Active Edge Interrupt Enable.
    bit_offset: 14
    bit_size: 1
  - name: lbkdie
    description: LIN Break Detect Interrupt Enable.
    bit_offset: 15
    bit_size: 1
  - name: resyncdis
    description: Resynchronization Disable.
    bit_offset: 16
    bit_size: 1
    enum: Resyncdis
  - name: bothedge
    description: Both Edge Sampling.
    bit_offset: 17
    bit_size: 1
  - name: matcfg
    description: Match Configuration.
    bit_offset: 18
    bit_size: 2
    enum: Matcfg
  - name: ridmae
    description: Receiver Idle DMA Enable.
    bit_offset: 20
    bit_size: 1
  - name: rdmae
    description: Receiver Full DMA Enable.
    bit_offset: 21
    bit_size: 1
  - name: tdmae
    description: Transmitter DMA Enable.
    bit_offset: 23
    bit_size: 1
  - name: osr
    description: Oversampling Ratio.
    bit_offset: 24
    bit_size: 5
  - name: m10
    description: 10-Bit Mode Select.
    bit_offset: 29
    bit_size: 1
  - name: maen2
    description: Match Address Mode Enable 2.
    bit_offset: 30
    bit_size: 1
  - name: maen1
    description: Match Address Mode Enable 1.
    bit_offset: 31
    bit_size: 1
fieldset/Ctrl:
  description: Control.
  fields:
  - name: pt
    description: Parity Type.
    bit_offset: 0
    bit_size: 1
    enum: Pt
  - name: pe
    description: Parity Enable.
    bit_offset: 1
    bit_size: 1
  - name: ilt
    description: Idle Line Type Select.
    bit_offset: 2
    bit_size: 1
    enum: Ilt
  - name: wake
    description: Receiver Wake-Up Method Select.
    bit_offset: 3
    bit_size: 1
    enum: Wake
  - name: m
    description: 9-Bit Or 8-Bit Mode Select.
    bit_offset: 4
    bit_size: 1
    enum: M
  - name: rsrc
    description: Receiver Source Select.
    bit_offset: 5
    bit_size: 1
    enum: Rsrc
  - name: dozeen
    description: Doze Mode.
    bit_offset: 6
    bit_size: 1
    enum: Dozeen
  - name: loops
    description: Loop Mode Select.
    bit_offset: 7
    bit_size: 1
    enum: Loops
  - name: idlecfg
    description: Idle Configuration.
    bit_offset: 8
    bit_size: 3
    enum: Idlecfg
  - name: m7
    description: 7-Bit Mode Select.
    bit_offset: 11
    bit_size: 1
    enum: M7
  - name: swap
    description: TXD and RXD Pin Swap.
    bit_offset: 12
    bit_size: 1
    enum: Swap
  - name: ma2ie
    description: Match 2 (MA2F) Interrupt Enable.
    bit_offset: 14
    bit_size: 1
  - name: ma1ie
    description: Match 1 (MA1F) Interrupt Enable.
    bit_offset: 15
    bit_size: 1
  - name: sbk
    description: Send Break.
    bit_offset: 16
    bit_size: 1
    enum: Sbk
  - name: rwu
    description: Receiver Wake-Up Control.
    bit_offset: 17
    bit_size: 1
    enum: Rwu
  - name: re
    description: Receiver Enable.
    bit_offset: 18
    bit_size: 1
  - name: te
    description: Transmitter Enable.
    bit_offset: 19
    bit_size: 1
  - name: ilie
    description: Idle Line Interrupt Enable.
    bit_offset: 20
    bit_size: 1
  - name: rie
    description: Receiver Interrupt Enable.
    bit_offset: 21
    bit_size: 1
  - name: tcie
    description: Transmission Complete Interrupt Enable.
    bit_offset: 22
    bit_size: 1
  - name: tie
    description: Transmit Interrupt Enable.
    bit_offset: 23
    bit_size: 1
  - name: peie
    description: Parity Error Interrupt Enable.
    bit_offset: 24
    bit_size: 1
  - name: feie
    description: Framing Error Interrupt Enable.
    bit_offset: 25
    bit_size: 1
  - name: neie
    description: Noise Error Interrupt Enable.
    bit_offset: 26
    bit_size: 1
  - name: orie
    description: Overrun Interrupt Enable.
    bit_offset: 27
    bit_size: 1
  - name: txinv
    description: Transmit Data Inversion.
    bit_offset: 28
    bit_size: 1
  - name: txdir
    description: TXD Pin Direction in Single-Wire Mode.
    bit_offset: 29
    bit_size: 1
    enum: Txdir
  - name: r9t8
    description: Receive Bit 9 Transmit Bit 8.
    bit_offset: 30
    bit_size: 1
  - name: r8t9
    description: Receive Bit 8 Transmit Bit 9.
    bit_offset: 31
    bit_size: 1
fieldset/Data:
  description: Data.
  fields:
  - name: r0t0
    description: Read receive FIFO bit 0 or write transmit FIFO bit 0.
    bit_offset: 0
    bit_size: 1
  - name: r1t1
    description: Read receive FIFO bit 1 or write transmit FIFO bit 1.
    bit_offset: 1
    bit_size: 1
  - name: r2t2
    description: Read receive FIFO bit 2 or write transmit FIFO bit 2.
    bit_offset: 2
    bit_size: 1
  - name: r3t3
    description: Read receive FIFO bit 3 or write transmit FIFO bit 3.
    bit_offset: 3
    bit_size: 1
  - name: r4t4
    description: Read receive FIFO bit 4 or write transmit FIFO bit 4.
    bit_offset: 4
    bit_size: 1
  - name: r5t5
    description: Read receive FIFO bit 5 or write transmit FIFO bit 5.
    bit_offset: 5
    bit_size: 1
  - name: r6t6
    description: Read receive FIFO bit 6 or write transmit FIFO bit 6.
    bit_offset: 6
    bit_size: 1
  - name: r7t7
    description: Read receive FIFO bit 7 or write transmit FIFO bit 7.
    bit_offset: 7
    bit_size: 1
  - name: r8t8
    description: Read receive FIFO bit 8 or write transmit FIFO bit 8.
    bit_offset: 8
    bit_size: 1
  - name: r9t9
    description: Read receive FIFO bit 9 or write transmit FIFO bit 9.
    bit_offset: 9
    bit_size: 1
  - name: linbrk
    description: LIN Break.
    bit_offset: 10
    bit_size: 1
  - name: idline
    description: Idle Line.
    bit_offset: 11
    bit_size: 1
  - name: rxempt
    description: Receive Buffer Empty.
    bit_offset: 12
    bit_size: 1
  - name: fretsc
    description: Frame Error Transmit Special Character.
    bit_offset: 13
    bit_size: 1
  - name: paritye
    description: Parity Error.
    bit_offset: 14
    bit_size: 1
  - name: noisy
    description: Noisy Data Received.
    bit_offset: 15
    bit_size: 1
fieldset/Dataro:
  description: Data Read-Only.
  fields:
  - name: data
    description: Receive Data.
    bit_offset: 0
    bit_size: 16
fieldset/Fifo:
  description: FIFO.
  fields:
  - name: rxfifosize
    description: Receive FIFO Buffer Depth.
    bit_offset: 0
    bit_size: 3
    enum: Rxfifosize
  - name: rxfe
    description: Receive FIFO Enable.
    bit_offset: 3
    bit_size: 1
  - name: txfifosize
    description: Transmit FIFO Buffer Depth.
    bit_offset: 4
    bit_size: 3
    enum: Txfifosize
  - name: txfe
    description: Transmit FIFO Enable.
    bit_offset: 7
    bit_size: 1
  - name: rxufe
    description: Receive FIFO Underflow Interrupt Enable.
    bit_offset: 8
    bit_size: 1
  - name: txofe
    description: Transmit FIFO Overflow Interrupt Enable.
    bit_offset: 9
    bit_size: 1
  - name: rxiden
    description: Receiver Idle Empty Enable.
    bit_offset: 10
    bit_size: 3
    enum: Rxiden
  - name: rxflush
    description: Receive FIFO Flush.
    bit_offset: 14
    bit_size: 1
    enum: Rxflush
  - name: txflush
    description: Transmit FIFO Flush.
    bit_offset: 15
    bit_size: 1
    enum: Txflush
  - name: rxuf
    description: Receiver FIFO Underflow Flag.
    bit_offset: 16
    bit_size: 1
  - name: txof
    description: Transmitter FIFO Overflow Flag.
    bit_offset: 17
    bit_size: 1
  - name: rxempt
    description: Receive FIFO Or Buffer Empty.
    bit_offset: 22
    bit_size: 1
  - name: txempt
    description: Transmit FIFO Or Buffer Empty.
    bit_offset: 23
    bit_size: 1
fieldset/Global:
  description: Global.
  fields:
  - name: rst
    description: Software Reset.
    bit_offset: 1
    bit_size: 1
    enum: Rst
fieldset/Match:
  description: Match Address.
  fields:
  - name: ma1
    description: Match Address 1.
    bit_offset: 0
    bit_size: 10
  - name: ma2
    description: Match Address 2.
    bit_offset: 16
    bit_size: 10
fieldset/Modir:
  description: MODEM IrDA.
  fields:
  - name: txctse
    description: Transmitter CTS Enable.
    bit_offset: 0
    bit_size: 1
  - name: txrtse
    description: Transmitter RTS Enable.
    bit_offset: 1
    bit_size: 1
  - name: txrtspol
    description: Transmitter RTS Polarity.
    bit_offset: 2
    bit_size: 1
    enum: Txrtspol
  - name: rxrtse
    description: Receiver RTS Enable.
    bit_offset: 3
    bit_size: 1
  - name: txctsc
    description: Transmit CTS Configuration.
    bit_offset: 4
    bit_size: 1
    enum: Txctsc
  - name: txctssrc
    description: Transmit CTS Source.
    bit_offset: 5
    bit_size: 1
    enum: Txctssrc
  - name: rtswater
    description: Receive RTS Configuration.
    bit_offset: 8
    bit_size: 2
  - name: tnp
    description: Transmitter Narrow Pulse.
    bit_offset: 16
    bit_size: 2
    enum: Tnp
  - name: iren
    description: IR Enable.
    bit_offset: 18
    bit_size: 1
fieldset/Param:
  description: Parameter.
  fields:
  - name: txfifo
    description: Transmit FIFO Size.
    bit_offset: 0
    bit_size: 8
  - name: rxfifo
    description: Receive FIFO Size.
    bit_offset: 8
    bit_size: 8
fieldset/Pincfg:
  description: Pin Configuration.
  fields:
  - name: trgsel
    description: Trigger Select.
    bit_offset: 0
    bit_size: 2
    enum: Trgsel
fieldset/Stat:
  description: Status.
  fields:
  - name: lbkfe
    description: LIN Break Flag Enable.
    bit_offset: 0
    bit_size: 1
  - name: ame
    description: Address Mark Enable.
    bit_offset: 1
    bit_size: 1
  - name: ma2f
    description: Match 2 Flag.
    bit_offset: 14
    bit_size: 1
  - name: ma1f
    description: Match 1 Flag.
    bit_offset: 15
    bit_size: 1
  - name: pf
    description: Parity Error Flag.
    bit_offset: 16
    bit_size: 1
  - name: fe
    description: Framing Error Flag.
    bit_offset: 17
    bit_size: 1
  - name: nf
    description: Noise Flag.
    bit_offset: 18
    bit_size: 1
  - name: or
    description: Receiver Overrun Flag.
    bit_offset: 19
    bit_size: 1
  - name: idle
    description: Idle Line Flag.
    bit_offset: 20
    bit_size: 1
  - name: rdrf
    description: Receive Data Register Full Flag.
    bit_offset: 21
    bit_size: 1
  - name: tc
    description: Transmission Complete Flag.
    bit_offset: 22
    bit_size: 1
    enum: Tc
  - name: tdre
    description: Transmit Data Register Empty Flag.
    bit_offset: 23
    bit_size: 1
    enum: Tdre
  - name: raf
    description: Receiver Active Flag.
    bit_offset: 24
    bit_size: 1
    enum: Raf
  - name: lbkde
    description: LIN Break Detection Enable.
    bit_offset: 25
    bit_size: 1
  - name: brk13
    description: Break Character Generation Length.
    bit_offset: 26
    bit_size: 1
    enum: Brk13
  - name: rwuid
    description: Receive Wake Up Idle Detect.
    bit_offset: 27
    bit_size: 1
    enum: Rwuid
  - name: rxinv
    description: Receive Data Inversion.
    bit_offset: 28
    bit_size: 1
  - name: msbf
    description: MSB First.
    bit_offset: 29
    bit_size: 1
    enum: Msbf
  - name: rxedgif
    description: RXD Pin Active Edge Interrupt Flag.
    bit_offset: 30
    bit_size: 1
  - name: lbkdif
    description: LIN Break Detect Interrupt Flag.
    bit_offset: 31
    bit_size: 1
fieldset/Verid:
  description: Version ID.
  fields:
  - name: feature
    description: Feature Identification Number.
    bit_offset: 0
    bit_size: 16
    enum: Feature
  - name: minor
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: major
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
fieldset/Water:
  description: Watermark.
  fields:
  - name: txwater
    description: Transmit Watermark.
    bit_offset: 0
    bit_size: 2
  - name: txcount
    description: Transmit Counter.
    bit_offset: 8
    bit_size: 3
  - name: rxwater
    description: Receive Watermark.
    bit_offset: 16
    bit_size: 2
  - name: rxcount
    description: Receive Counter.
    bit_offset: 24
    bit_size: 3
enum/Brk13:
  bit_size: 1
  variants:
  - name: SHORT
    description: 9 to 13 bit times.
    value: 0
  - name: LONG
    description: 12 to 15 bit times.
    value: 1
enum/Dozeen:
  bit_size: 1
  variants:
  - name: ENABLED
    description: Enable.
    value: 0
  - name: DISABLED
    description: Disable.
    value: 1
enum/Feature:
  bit_size: 16
  variants:
  - name: STANDARD
    description: Standard feature set.
    value: 1
  - name: MODEM
    description: Standard feature set with MODEM and IrDA support.
    value: 3
enum/Idlecfg:
  bit_size: 3
  variants:
  - name: IDLE_1
    description: '1.'
    value: 0
  - name: IDLE_2
    description: '2.'
    value: 1
  - name: IDLE_4
    description: '4.'
    value: 2
  - name: IDLE_8
    description: '8.'
    value: 3
  - name: IDLE_16
    description: '16.'
    value: 4
  - name: IDLE_32
    description: '32.'
    value: 5
  - name: IDLE_64
    description: '64.'
    value: 6
  - name: IDLE_128
    description: '128.'
    value: 7
enum/Ilt:
  bit_size: 1
  variants:
  - name: FROM_START
    description: After the start bit.
    value: 0
  - name: FROM_STOP
    description: After the stop bit.
    value: 1
enum/Loops:
  bit_size: 1
  variants:
  - name: NOFFECT
    description: 'Normal operation: RXD and TXD use separate pins.'
    value: 0
  - name: LOOPBACK
    description: Loop mode or Single-Wire mode.
    value: 1
enum/M:
  bit_size: 1
  variants:
  - name: DATA8
    description: 8-bit.
    value: 0
  - name: DATA9
    description: 9-bit.
    value: 1
enum/M7:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: 8-bit to 10-bit.
    value: 0
  - name: DATA7
    description: 7-bit.
    value: 1
enum/Matcfg:
  bit_size: 2
  variants:
  - name: ADDR_MATCH
    description: Address match wake-up.
    value: 0
  - name: IDLE_MATCH
    description: Idle match wake-up.
    value: 1
  - name: ONOFF_MATCH
    description: Match on and match off.
    value: 2
  - name: RWU_MATCH
    description: Enables RWU on data match and match on or off for the transmitter CTS input.
    value: 3
enum/Msbf:
  bit_size: 1
  variants:
  - name: LSB_FIRST
    description: LSB.
    value: 0
  - name: MSB_FIRST
    description: MSB.
    value: 1
enum/Pt:
  bit_size: 1
  variants:
  - name: EVEN
    description: Even parity.
    value: 0
  - name: ODD
    description: Odd parity.
    value: 1
enum/Raf:
  bit_size: 1
  variants:
  - name: IDLE
    description: Idle, waiting for a start bit.
    value: 0
  - name: ACTIVE
    description: Receiver active (RXD pin input not idle).
    value: 1
enum/Resyncdis:
  bit_size: 1
  variants:
  - name: RESYNC
    description: Enable.
    value: 0
  - name: NO_RESYNC
    description: Disable.
    value: 1
enum/Rsrc:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Internal Loopback mode.
    value: 0
  - name: ONEWIRE
    description: Single-wire mode.
    value: 1
enum/Rst:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Not reset.
    value: 0
  - name: RESET
    description: Reset.
    value: 1
enum/Rwu:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Normal receiver operation.
    value: 0
  - name: RX_WAKEUP
    description: LPUART receiver in standby, waiting for a wake-up condition.
    value: 1
enum/Rwuid:
  bit_size: 1
  variants:
  - name: IDLE_NOTSET
    description: STAT[IDLE] does not become 1.
    value: 0
  - name: IDLE_SET
    description: STAT[IDLE] becomes 1.
    value: 1
enum/Rxfifosize:
  bit_size: 3
  variants:
  - name: FIFO_1
    description: '1.'
    value: 0
  - name: FIFO_4
    description: '4.'
    value: 1
  - name: FIFO_8
    description: '8.'
    value: 2
  - name: FIFO_16
    description: '16.'
    value: 3
  - name: FIFO_32
    description: '32.'
    value: 4
  - name: FIFO_64
    description: '64.'
    value: 5
  - name: FIFO_128
    description: '128.'
    value: 6
  - name: FIFO_256
    description: '256.'
    value: 7
enum/Rxflush:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: No effect.
    value: 0
  - name: RXFIFO_RST
    description: All data flushed out.
    value: 1
enum/Rxiden:
  bit_size: 3
  variants:
  - name: DISABLED
    description: Disable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle.
    value: 0
  - name: IDLE_1
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for one character.
    value: 1
  - name: IDLE_2
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for two characters.
    value: 2
  - name: IDLE_4
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for four characters.
    value: 3
  - name: IDLE_8
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for eight characters.
    value: 4
  - name: IDLE_16
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for 16 characters.
    value: 5
  - name: IDLE_32
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for 32 characters.
    value: 6
  - name: IDLE_64
    description: Enable STAT[RDRF] to become 1 because of partially filled FIFO when the receiver is idle for 64 characters.
    value: 7
enum/Sbk:
  bit_size: 1
  variants:
  - name: NO_EFFECT
    description: Normal transmitter operation.
    value: 0
  - name: TX_BREAK
    description: Queue break character(s) to be sent.
    value: 1
enum/Sbns:
  bit_size: 1
  variants:
  - name: ONE
    description: One stop bit.
    value: 0
  - name: TWO
    description: Two stop bits.
    value: 1
enum/Swap:
  bit_size: 1
  variants:
  - name: STANDARD
    description: Use the standard way.
    value: 0
  - name: SWAP
    description: Swap.
    value: 1
enum/Tc:
  bit_size: 1
  variants:
  - name: ACTIVE
    description: Transmitter active.
    value: 0
  - name: COMPLETE
    description: Transmitter idle.
    value: 1
enum/Tdre:
  bit_size: 1
  variants:
  - name: TXDATA
    description: Greater than watermark.
    value: 0
  - name: NO_TXDATA
    description: Equal to or less than watermark.
    value: 1
enum/Tnp:
  bit_size: 2
  variants:
  - name: ONE_SAMPLE
    description: 1 / OSR.
    value: 0
  - name: TWO_SAMPLE
    description: 2 / OSR.
    value: 1
  - name: THREE_SAMPLE
    description: 3 / OSR.
    value: 2
  - name: FOUR_SAMPLE
    description: 4 / OSR.
    value: 3
enum/Trgsel:
  bit_size: 2
  variants:
  - name: DISABLED
    description: Input trigger disabled.
    value: 0
  - name: TRG_RXD
    description: Input trigger used instead of the RXD pin input.
    value: 1
  - name: TRG_CTS
    description: Input trigger used instead of the CTS_B pin input.
    value: 2
  - name: TRG_TXD
    description: Input trigger used to modulate the TXD pin output, which (after TXINV configuration) is internally ANDed with the input trigger.
    value: 3
enum/Txctsc:
  bit_size: 1
  variants:
  - name: START
    description: Sampled at the start of each character.
    value: 0
  - name: IDLE
    description: Sampled when the transmitter is idle.
    value: 1
enum/Txctssrc:
  bit_size: 1
  variants:
  - name: CTS
    description: The CTS_B pin.
    value: 0
  - name: MATCH
    description: An internal connection to the receiver address match result.
    value: 1
enum/Txdir:
  bit_size: 1
  variants:
  - name: TX_INPUT
    description: Input.
    value: 0
  - name: TX_OUTPUT
    description: Output.
    value: 1
enum/Txfifosize:
  bit_size: 3
  variants:
  - name: FIFO_1
    description: '1.'
    value: 0
  - name: FIFO_4
