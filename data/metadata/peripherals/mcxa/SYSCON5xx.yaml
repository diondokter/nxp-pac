fieldset/CLKUNLOCK:
  description: Clock Configuration Unlock.
  fields:
  - name: UNLOCK
    description: Controls clock configuration registers access (for example, SLOWCLKDIV, BUSCLKDIV, AHBCLKDIV, FROHFDIV, FROLFDIV, PLLxCLKDIV, MRCC_xxx_CLKDIV, MRCC_xxx_CLKSEL, MRCC_GLB_xxx).
    bit_offset: 0
    bit_size: 1
    enum: UNLOCK
fieldset/CPU0NSTCKCAL:
  description: Non-Secure CPU0 System Tick Calibration.
  fields:
  - name: TENMS
    description: Reload value for 10 ms (100 Hz) timing, subject to system clock skew errors. If the value reads as zero, the calibration value is not known.
    bit_offset: 0
    bit_size: 24
  - name: SKEW
    description: Indicates whether the TENMS value is exact.
    bit_offset: 24
    bit_size: 1
    enum: SKEW
  - name: NOREF
    description: Indicates whether the device provides a reference clock to the processor.
    bit_offset: 25
    bit_size: 1
    enum: NOREF
