enum/CkctrlCkmode:
  bit_size: 4
  variants:
  - name: CKMODE_0000
    description: Core clock is on.
    value: 0
  - name: CKMODE_0001
    description: Core clock is off.
    value: 1
  - name: CKMODE_0011
    description: Core and platform clocks are off.
    value: 3
  - name: CKMODE_0111
    description: Core, platform, and peripheral clocks are off, but no change in Low-Power mode.
    value: 7
  - name: CKMODE_1111
    description: Core, platform, and peripheral clocks are off, and core enters Low-Power mode.
    value: 15
