enum/Ckmode:
  bit_size: 4
  variants:
  - name: Ckmode0000
    description: Core clock is on.
    value: 0
  - name: Ckmode0001
    description: Core clock is off.
    value: 1
  - name: Ckmode0011
    description: Core and platform clocks are off.
    value: 3
  - name: Ckmode0111
    description: Core, platform, and peripheral clocks are off, but no change in Low-Power mode.
    value: 7
  - name: Ckmode1111
    description: Core, platform, and peripheral clocks are off, and core enters Low-Power mode.
    value: 15
enum/Observe:
  bit_size: 4
  variants:
  - name: Test0
    description: Core Active (not sleeping, halted or in reset).
    value: 0
  - name: Test1
    description: Core clock gated.
    value: 1
  - name: Test10
    description: Bus master clock gated.
    value: 2
  - name: Test11
    description: Bus slave clock gated.
    value: 3
  - name: Test100
    description: Peripherals clock gated.
    value: 4
  - name: Test101
    description: Flash clock gated.
    value: 5
  - name: Test110
    description: All clocks gated.
    value: 6
  - name: Test111
    description: CMC clock gated.
    value: 7
enum/PmctrlmainLpmode:
  bit_size: 4
