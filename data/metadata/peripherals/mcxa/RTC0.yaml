    byte_offset: 4
    fieldset: TPR
  - name: TAR
    description: RTC Time Alarm.
    byte_offset: 8
    fieldset: TAR
  - name: TCR
    description: RTC Time Compensation.
    byte_offset: 12
    fieldset: TCR
  - name: CR
    description: RTC Control.
    byte_offset: 16
    fieldset: CR
  - name: SR
    description: RTC Status.
    byte_offset: 20
    fieldset: SR
  - name: LR
    description: RTC Lock.
    byte_offset: 24
    fieldset: LR
  - name: IER
    description: RTC Interrupt Enable.
    byte_offset: 28
    fieldset: IER
fieldset/CR:
  description: RTC Control.
  fields:
  - name: SWR
    description: Software Reset.
    bit_offset: 0
    bit_size: 1
    enum: SWR
  - name: UM
    description: Update Mode.
    bit_offset: 3
    bit_size: 1
    enum: UM
  - name: LPOS
    description: LPO Select.
    bit_offset: 7
    bit_size: 1
    enum: LPOS
fieldset/IER:
  description: RTC Interrupt Enable.
  fields:
  - name: TIIE
    description: Time Invalid Interrupt Enable.
    bit_offset: 0
    bit_size: 1
    enum: TIIE
  - name: TOIE
    description: Time Overflow Interrupt Enable.
    bit_offset: 1
    bit_size: 1
    enum: TOIE
  - name: TAIE
    description: Time Alarm Interrupt Enable.
    bit_offset: 2
    bit_size: 1
    enum: TAIE
  - name: TSIE
    description: Time Seconds Interrupt Enable.
    bit_offset: 4
    bit_size: 1
    enum: TSIE
  - name: TSIC
    description: Timer Seconds Interrupt Configuration.
    bit_offset: 16
    bit_size: 3
    enum: TSIC
fieldset/LR:
  description: RTC Lock.
  fields:
  - name: TCL
    description: Time Compensation Lock.
    bit_offset: 3
    bit_size: 1
    enum: TCL
  - name: CRL
    description: Control Register Lock.
    bit_offset: 4
    bit_size: 1
    enum: CRL
  - name: SRL
    description: Status Register Lock.
    bit_offset: 5
    bit_size: 1
    enum: SRL
  - name: LRL
    description: Lock Register Lock.
    bit_offset: 6
    bit_size: 1
    enum: LRL
fieldset/SR:
  description: RTC Status.
  fields:
  - name: TIF
    description: Time Invalid Flag.
    bit_offset: 0
    bit_size: 1
    enum: TIF
  - name: TOF
    description: Time Overflow Flag.
    bit_offset: 1
    bit_size: 1
    enum: TOF
  - name: TAF
    description: Time Alarm Flag.
    bit_offset: 2
    bit_size: 1
    enum: TAF
  - name: TCE
    description: Time Counter Enable.
    bit_offset: 4
    bit_size: 1
    enum: TCE
fieldset/TAR:
  description: RTC Time Alarm.
  fields:
  - name: TAR
    description: Time Alarm Register.
    bit_offset: 0
    bit_size: 32
fieldset/TCR:
  description: RTC Time Compensation.
  fields:
  - name: TCR
    description: Time Compensation Register.
    bit_offset: 0
    bit_size: 8
    enum: TCR
  - name: CIR
    description: Compensation Interval Register.
    bit_offset: 8
    bit_size: 8
  - name: TCV
    description: Time Compensation Value.
    bit_offset: 16
    bit_size: 8
  - name: CIC
    description: Compensation Interval Counter.
    bit_offset: 24
    bit_size: 8
fieldset/TPR:
  description: RTC Time Prescaler.
  fields:
  - name: TPR
    description: Time Prescaler Register.
    bit_offset: 0
    bit_size: 16
fieldset/TSR:
  description: RTC Time Seconds.
  fields:
  - name: TSR
    description: Time Seconds Register.
    bit_offset: 0
    bit_size: 32
enum/CRL:
  bit_size: 1
  variants:
  - name: CRL_0
    description: Control Register is locked and writes are ignored.
    value: 0
  - name: CRL_1
    description: Control Register is not locked and writes complete as normal.
    value: 1
enum/LPOS:
  bit_size: 1
  variants:
  - name: LPOS_0
    description: RTC prescaler increments using 32.768 kHz clock.
    value: 0
  - name: LPOS_1
    description: RTC prescaler increments using 1 kHz LPO, bits [4:0] of the prescaler are ignored.
    value: 1
enum/LRL:
  bit_size: 1
  variants:
  - name: LRL_0
    description: Lock Register is locked and writes are ignored.
    value: 0
  - name: LRL_1
    description: Lock Register is not locked and writes complete as normal.
    value: 1
enum/SRL:
  bit_size: 1
  variants:
  - name: SRL_0
    description: Status Register is locked and writes are ignored.
    value: 0
  - name: SRL_1
    description: Status Register is not locked and writes complete as normal.
    value: 1
enum/SWR:
  bit_size: 1
  variants:
  - name: SWR_0
    description: No effect.
    value: 0
  - name: SWR_1
    description: Resets all RTC registers except for the SWR bit . The SWR bit is cleared by POR and by software explicitly clearing it.
    value: 1
enum/TAF:
  bit_size: 1
  variants:
  - name: TAF_0
    description: Time alarm has not occurred.
    value: 0
  - name: TAF_1
    description: Time alarm has occurred.
    value: 1
enum/TAIE:
  bit_size: 1
  variants:
  - name: TAIE_0
    description: No interrupt is generated.
    value: 0
  - name: TAIE_1
    description: An interrupt is generated.
    value: 1
enum/TCE:
  bit_size: 1
  variants:
  - name: TCE_0
    description: Disables.
    value: 0
  - name: TCE_1
    description: Enables.
    value: 1
enum/TCL:
  bit_size: 1
  variants:
  - name: TCL_0
    description: Time Compensation Register is locked and writes are ignored.
    value: 0
  - name: TCL_1
    description: Time Compensation Register is not locked and writes complete as normal.
    value: 1
enum/TCR:
  bit_size: 8
  variants:
  - name: TCR_0
    description: Time Prescaler Register overflows every 32768 clock cycles.
    value: 0
  - name: TCR_1
    description: Time Prescaler Register overflows every 32767 clock cycles.
    value: 1
  - name: TCR_126
    description: Time Prescaler Register overflows every 32642 clock cycles.
    value: 126
  - name: TCR_127
    description: Time Prescaler Register overflows every 32641 clock cycles.
    value: 127
  - name: TCR_128
    description: Time Prescaler Register overflows every 32896 clock cycles.
    value: 128
  - name: TCR_129
    description: Time Prescaler Register overflows every 32895 clock cycles.
    value: 129
  - name: TCR_255
    description: Time Prescaler Register overflows every 32769 clock cycles.
    value: 255
enum/TIF:
  bit_size: 1
  variants:
  - name: TIF_0
    description: Time is valid.
    value: 0
  - name: TIF_1
    description: Time is invalid and time counter is read as zero.
    value: 1
enum/TIIE:
  bit_size: 1
  variants:
  - name: TIIE_0
    description: No interrupt is generated.
    value: 0
  - name: TIIE_1
    description: An interrupt is generated.
    value: 1
enum/TOF:
  bit_size: 1
  variants:
  - name: TOF_0
    description: Time overflow has not occurred.
    value: 0
  - name: TOF_1
    description: Time overflow has occurred and time counter reads as zero.
    value: 1
enum/TOIE:
  bit_size: 1
  variants:
  - name: TOIE_0
    description: No interrupt is generated.
    value: 0
  - name: TOIE_1
    description: An interrupt is generated.
    value: 1
enum/TSIC:
  bit_size: 3
  variants:
  - name: TSIC_0
    description: 1 Hz.
    value: 0
  - name: TSIC_1
    description: 2 Hz.
    value: 1
  - name: TSIC_2
    description: 4 Hz.
    value: 2
  - name: TSIC_3
    description: 8 Hz.
    value: 3
  - name: TSIC_4
    description: 16 Hz.
    value: 4
  - name: TSIC_5
    description: 32 Hz.
    value: 5
  - name: TSIC_6
    description: 64 Hz.
    value: 6
  - name: TSIC_7
    description: 128 Hz.
    value: 7
enum/TSIE:
  bit_size: 1
  variants:
  - name: TSIE_0
    description: Disables.
    value: 0
  - name: TSIE_1
    description: Enables.
    value: 1
enum/UM:
  bit_size: 1
  variants:
  - name: UM_0
    description: Registers cannot be written when locked.
    value: 0
  - name: UM_1
    description: Registers can be written when locked under limited conditions.
    value: 1
