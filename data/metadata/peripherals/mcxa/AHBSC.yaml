    description: Secure and privileged Master.
    value: 0
  - name: NonsecurePrivMaster
    description: Secure and non-privileged Master.
    value: 1
  - name: SecureNonprivMaster
    description: Non-secure and privileged Master.
    value: 2
  - name: SecurePrivMaster
    description: Non-secure and non-privileged Master.
    value: 3
enum/MiscCtrlEnable:
  bit_size: 2
  variants:
  - name: Enabled
    description: Enables the privilege checking of non-secure mode access.
    value: 1
  - name: Disabled
    description: Disables the privilege checking of non-secure mode access.
    value: 2
enum/MiscCtrlRegDisableStrictMode:
  bit_size: 2
  variants:
  - name: Ahbtm
    description: Master strict mode is disabled and can access memories and peripherals at the same level or below that level.
    value: 1
  - name: Ahbsm1
    description: Master strict mode is enabled and can access memories and peripherals at same level only.
    value: 2
enum/MiscCtrlRegDisableViolationAbort:
  bit_size: 2
  variants:
  - name: NoAbort
    description: The violation detected by the secure checker will not cause an abort, but a secure_violation_irq (interrupt request) will still be asserted and serviced by ISR.
    value: 1
  - name: Abort
    description: The violation detected by the secure checker will cause an abort.
    value: 2
enum/MiscCtrlRegIdauAllNs:
  bit_size: 2
  variants:
  - name: Disabled
    description: IDAU is disabled, which means that all memories are attributed as non-secure memory.
    value: 1
  - name: Enabled
    description: IDAU is enabled (restrictive mode).
    value: 2
enum/MiscCtrlRegWriteLock:
  bit_size: 2
  variants:
  - name: Locked
    description: Writes to this register and to the Memory and Peripheral RULE registers are not allowed.
    value: 1
  - name: NotLocked
    description: Writes to this register and to the Memory and Peripheral RULE registers are allowed.
    value: 2
enum/Rule:
  bit_size: 2
  variants:
  - name: NonsecureNonprivUserAllowed
    description: Non-secure and non-privilege user access allowed.
    value: 0
  - name: NonsecurePrivUserAllowed
    description: Non-secure and privilege access allowed.
    value: 1
  - name: SecureNonprivUserAllowed
    description: Secure and non-privilege user access allowed.
    value: 2
  - name: SecurePrivUserAllowed
    description: Secure and privilege user access allowed.
    value: 3
