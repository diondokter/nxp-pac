block/SPC0:
  description: SPC.
  items:
  - name: VERID
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: VERID
  - name: SC
    description: Status Control.
    byte_offset: 16
    fieldset: SC
  - name: LPREQ_CFG
    description: Low-Power Request Configuration.
    byte_offset: 28
    fieldset: LPREQ_CFG
  - name: PD_STATUS0
    description: SPC Power Domain Mode Status.
    byte_offset: 48
    fieldset: PD_STATUS0
  - name: SRAMCTL
    description: SRAM Control.
    byte_offset: 64
    fieldset: SRAMCTL
  - name: SRAMRETLDO_REFTRIM
    description: SRAM Retention Reference Trim.
    byte_offset: 84
    fieldset: SRAMRETLDO_REFTRIM
  - name: SRAMRETLDO_CNTRL
    description: SRAM Retention LDO Control.
    byte_offset: 88
    fieldset: SRAMRETLDO_CNTRL
  - name: ACTIVE_CFG
    description: Active Power Mode Configuration.
    byte_offset: 256
    fieldset: ACTIVE_CFG
  - name: ACTIVE_CFG1
    description: Active Power Mode Configuration 1.
    byte_offset: 260
    fieldset: ACTIVE_CFG1
  - name: LP_CFG
    description: Low-Power Mode Configuration.
    byte_offset: 264
    fieldset: LP_CFG
  - name: LP_CFG1
    description: Low Power Mode Configuration 1.
    byte_offset: 268
    fieldset: LP_CFG1
  - name: LPWKUP_DELAY
    description: Low Power Wake-Up Delay.
    byte_offset: 288
    fieldset: LPWKUP_DELAY
  - name: ACTIVE_VDELAY
    description: Active Voltage Trim Delay.
    byte_offset: 292
    fieldset: ACTIVE_VDELAY
  - name: VD_STAT
    description: Voltage Detect Status.
    byte_offset: 304
    fieldset: VD_STAT
  - name: VD_CORE_CFG
    description: Core Voltage Detect Configuration.
    byte_offset: 308
    fieldset: VD_CORE_CFG
  - name: VD_SYS_CFG
    description: System Voltage Detect Configuration.
    byte_offset: 312
    fieldset: VD_SYS_CFG
  - name: EVD_CFG
    description: External Voltage Domain Configuration.
    byte_offset: 320
    fieldset: EVD_CFG
  - name: CORELDO_CFG
    description: LDO_CORE Configuration.
    byte_offset: 768
    fieldset: CORELDO_CFG
fieldset/ACTIVE_CFG:
  description: Active Power Mode Configuration.
  fields:
  - name: CORELDO_VDD_DS
    description: LDO_CORE VDD Drive Strength.
    bit_offset: 0
    bit_size: 1
    enum: ACTIVE_CFG_CORELDO_VDD_DS
  - name: CORELDO_VDD_LVL
    description: LDO_CORE VDD Regulator Voltage Level.
    bit_offset: 2
    bit_size: 2
    enum: ACTIVE_CFG_CORELDO_VDD_LVL
  - name: BGMODE
    description: Bandgap Mode.
    bit_offset: 20
    bit_size: 2
    enum: ACTIVE_CFG_BGMODE
  - name: VDD_VD_DISABLE
    description: VDD Voltage Detect Disable.
    bit_offset: 23
    bit_size: 1
    enum: VDD_VD_DISABLE
  - name: CORE_LVDE
    description: Core Low-Voltage Detection Enable.
    bit_offset: 24
    bit_size: 1
  - name: SYS_LVDE
    description: System Low-Voltage Detection Enable.
    bit_offset: 25
    bit_size: 1
  - name: SYS_HVDE
    description: System High-Voltage Detection Enable.
    bit_offset: 28
    bit_size: 1
fieldset/ACTIVE_CFG1:
  description: Active Power Mode Configuration 1.
  fields:
  - name: SOC_CNTRL
    description: Active Config Chip Control.
    bit_offset: 0
    bit_size: 32
fieldset/ACTIVE_VDELAY:
  description: Active Voltage Trim Delay.
  fields:
  - name: ACTIVE_VDELAY
    description: Active Voltage Delay.
    bit_offset: 0
    bit_size: 16
fieldset/CORELDO_CFG:
  description: LDO_CORE Configuration.
  fields:
  - name: CORELDO_SPARE0
    description: CORELDO SPARE0.
    bit_offset: 16
    bit_size: 1
fieldset/EVD_CFG:
  description: External Voltage Domain Configuration.
  fields:
  - name: EVDISO
    description: External Voltage Domain Isolation.
    bit_offset: 0
    bit_size: 3
  - name: EVDLPISO
    description: External Voltage Domain Low-Power Isolation.
    bit_offset: 8
    bit_size: 3
  - name: EVDSTAT
    description: External Voltage Domain Status.
    bit_offset: 16
    bit_size: 3
fieldset/LPREQ_CFG:
  description: Low-Power Request Configuration.
  fields:
  - name: LPREQOE
    description: Low-Power Request Output Enable.
    bit_offset: 0
    bit_size: 1
  - name: LPREQPOL
    description: Low-Power Request Output Pin Polarity Control.
    bit_offset: 1
    bit_size: 1
    enum: LPREQPOL
  - name: LPREQOV
    description: Low-Power Request Output Override.
    bit_offset: 2
    bit_size: 2
    enum: LPREQOV
fieldset/LPWKUP_DELAY:
  description: Low Power Wake-Up Delay.
  fields:
  - name: LPWKUP_DELAY
    description: Low-Power Wake-Up Delay.
    bit_offset: 0
    bit_size: 16
fieldset/LP_CFG:
  description: Low-Power Mode Configuration.
  fields:
  - name: CORELDO_VDD_DS
    description: LDO_CORE VDD Drive Strength.
    bit_offset: 0
    bit_size: 1
    enum: LP_CFG_CORELDO_VDD_DS
  - name: CORELDO_VDD_LVL
    description: LDO_CORE VDD Regulator Voltage Level.
    bit_offset: 2
    bit_size: 2
    enum: LP_CFG_CORELDO_VDD_LVL
  - name: SRAMLDO_DPD_ON
    description: SRAM_LDO Deep Power Low Power IREF Enable.
    bit_offset: 19
    bit_size: 1
  - name: BGMODE
    description: Bandgap Mode.
    bit_offset: 20
    bit_size: 2
    enum: LP_CFG_BGMODE
  - name: LP_IREFEN
    description: Low-Power IREF Enable.
    bit_offset: 23
    bit_size: 1
  - name: CORE_LVDE
    description: Core Low Voltage Detect Enable.
    bit_offset: 24
    bit_size: 1
  - name: SYS_LVDE
    description: System Low Voltage Detect Enable.
    bit_offset: 25
    bit_size: 1
  - name: SYS_HVDE
    description: System High Voltage Detect Enable.
    bit_offset: 28
    bit_size: 1
fieldset/LP_CFG1:
  description: Low Power Mode Configuration 1.
  fields:
  - name: SOC_CNTRL
    description: Low-Power Configuration Chip Control.
    bit_offset: 0
    bit_size: 32
fieldset/PD_STATUS0:
  description: SPC Power Domain Mode Status.
  fields:
  - name: PWR_REQ_STATUS
    description: Power Request Status Flag.
    bit_offset: 0
    bit_size: 1
    enum: PWR_REQ_STATUS
  - name: PD_LP_REQ
    description: Power Domain Low Power Request Flag.
    bit_offset: 4
    bit_size: 1
    enum: PD_LP_REQ
  - name: LP_MODE
    description: Power Domain Low Power Mode Request.
    bit_offset: 8
    bit_size: 4
    enum: LP_MODE
fieldset/SC:
  description: Status Control.
  fields:
  - name: BUSY
    description: SPC Busy Status Flag.
    bit_offset: 0
    bit_size: 1
    enum: BUSY
  - name: SPC_LP_REQ
    description: SPC Power Mode Configuration Status Flag.
    bit_offset: 1
    bit_size: 1
    enum: SPC_LP_REQ
  - name: SPC_LP_MODE
    description: Power Domain Low-Power Mode Request.
    bit_offset: 4
    bit_size: 4
    enum: SPC_LP_MODE
  - name: ISO_CLR
    description: Isolation Clear Flags.
    bit_offset: 16
    bit_size: 1
fieldset/SRAMCTL:
  description: SRAM Control.
  fields:
  - name: VSM
    description: Voltage Select Margin.
    bit_offset: 0
    bit_size: 2
    enum: VSM
  - name: REQ
    description: SRAM Voltage Update Request.
    bit_offset: 30
    bit_size: 1
    enum: REQ
  - name: ACK
    description: SRAM Voltage Update Request Acknowledge.
    bit_offset: 31
    bit_size: 1
    enum: ACK
fieldset/SRAMRETLDO_CNTRL:
  description: SRAM Retention LDO Control.
  fields:
  - name: SRAMLDO_ON
    description: SRAM LDO Regulator Enable.
    bit_offset: 0
    bit_size: 1
  - name: SRAM_RET_EN
    description: SRAM Retention.
    bit_offset: 8
    bit_size: 4
fieldset/SRAMRETLDO_REFTRIM:
  description: SRAM Retention Reference Trim.
  fields:
  - name: REFTRIM
    description: Reference Trim. Voltage range is around 0.48V - 0.85V. Trim step is 12 mV.
    bit_offset: 0
    bit_size: 5
fieldset/VD_CORE_CFG:
  description: Core Voltage Detect Configuration.
  fields:
  - name: LVDRE
    description: Core LVD Reset Enable.
    bit_offset: 0
    bit_size: 1
  - name: LVDIE
    description: Core LVD Interrupt Enable.
    bit_offset: 1
    bit_size: 1
  - name: LOCK
    description: Core Voltage Detect Reset Enable Lock.
    bit_offset: 16
    bit_size: 1
    enum: VD_CORE_CFG_LOCK
fieldset/VD_STAT:
  description: Voltage Detect Status.
  fields:
  - name: COREVDD_LVDF
    description: Core Low-Voltage Detect Flag.
    bit_offset: 0
    bit_size: 1
    enum: COREVDD_LVDF
  - name: SYSVDD_LVDF
    description: System Low-Voltage Detect Flag.
    bit_offset: 1
    bit_size: 1
    enum: SYSVDD_LVDF
  - name: SYSVDD_HVDF
    description: System HVD Flag.
    bit_offset: 5
    bit_size: 1
    enum: SYSVDD_HVDF
fieldset/VD_SYS_CFG:
  description: System Voltage Detect Configuration.
  fields:
  - name: LVDRE
    description: System LVD Reset Enable.
    bit_offset: 0
    bit_size: 1
  - name: LVDIE
    description: System LVD Interrupt Enable.
    bit_offset: 1
    bit_size: 1
  - name: HVDRE
    description: System HVD Reset Enable.
    bit_offset: 2
    bit_size: 1
  - name: HVDIE
    description: System HVD Interrupt Enable.
    bit_offset: 3
    bit_size: 1
  - name: LOCK
    description: System Voltage Detect Reset Enable Lock.
    bit_offset: 16
    bit_size: 1
    enum: VD_SYS_CFG_LOCK
fieldset/VERID:
  description: Version ID.
  fields:
  - name: FEATURE
    description: Feature Specification Number.
    bit_offset: 0
    bit_size: 16
    enum: FEATURE
  - name: MINOR
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: MAJOR
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/ACK:
  bit_size: 1
  variants:
  - name: ACK_NO
    description: Not acknowledged.
    value: 0
  - name: ACK_YES
    description: Acknowledged.
    value: 1
enum/ACTIVE_CFG_BGMODE:
  bit_size: 2
  variants:
  - name: BGMODE0
    description: Bandgap disabled.
    value: 0
  - name: BGMODE01
    description: Bandgap enabled, buffer disabled.
    value: 1
  - name: BGMODE10
    description: Bandgap enabled, buffer enabled.
    value: 2
enum/ACTIVE_CFG_CORELDO_VDD_DS:
  bit_size: 1
  variants:
  - name: LOW
    description: Low.
    value: 0
  - name: NORMAL
    description: Normal.
    value: 1
enum/ACTIVE_CFG_CORELDO_VDD_LVL:
  bit_size: 2
  variants:
  - name: MID
    description: Regulate to mid voltage (1.0 V).
    value: 1
  - name: NORMAL
    description: Regulate to normal voltage (1.1 V).
    value: 2
  - name: OVER
    description: Regulate to overdrive voltage (1.15 V).
    value: 3
enum/BUSY:
  bit_size: 1
  variants:
  - name: BUSY_NO
    description: Not busy.
    value: 0
  - name: BUSY_YES
    description: Busy.
    value: 1
enum/COREVDD_LVDF:
  bit_size: 1
  variants:
  - name: EVENT_NO
    description: Event not detected.
    value: 0
  - name: EVENT_YES
    description: Event detected.
    value: 1
enum/FEATURE:
  bit_size: 16
  variants:
  - name: STANDARD
    description: Standard features.
    value: 0
enum/LPREQOV:
  bit_size: 2
  variants:
  - name: FORCE_NO
    description: Not forced.
    value: 0
  - name: FORCE_LOW
    description: Forced low (ignore LPREQPOL settings).
    value: 2
  - name: FORCE_HIGH
    description: Forced high (ignore LPREQPOL settings).
    value: 3
enum/LPREQPOL:
  bit_size: 1
  variants:
  - name: HIGH
    description: High.
    value: 0
  - name: LOW
    description: Low.
    value: 1
enum/LP_CFG_BGMODE:
  bit_size: 2
  variants:
  - name: BGMODE0
    description: Bandgap disabled.
    value: 0
  - name: BGMODE01
    description: Bandgap enabled, buffer disabled.
    value: 1
  - name: BGMODE10
    description: Bandgap enabled, buffer enabled.
    value: 2
enum/LP_CFG_CORELDO_VDD_DS:
  bit_size: 1
  variants:
  - name: LOW
    description: Low.
    value: 0
  - name: NORMAL
    description: Normal.
    value: 1
enum/LP_CFG_CORELDO_VDD_LVL:
  bit_size: 2
  variants:
  - name: MID
    description: Mid voltage (1.0 V).
    value: 1
  - name: NORMAL
    description: Normal voltage (1.1 V).
    value: 2
  - name: OVER
    description: Overdrive voltage (1.15 V).
    value: 3
enum/LP_MODE:
  bit_size: 4
  variants:
  - name: MODE0
    description: SLEEP with system clock running.
    value: 0
  - name: MODE1
    description: DSLEEP with system clock off.
    value: 1
  - name: MODE2
    description: PDOWN with system clock off.
    value: 2
  - name: MODE8
    description: DPDOWN with system clock off.
    value: 8
enum/PD_LP_REQ:
  bit_size: 1
  variants:
  - name: REQ_NO
    description: Did not request.
    value: 0
  - name: REQ_YES
    description: Requested.
    value: 1
enum/PWR_REQ_STATUS:
  bit_size: 1
  variants:
  - name: REQ_NO
    description: Did not request.
    value: 0
  - name: REQ_YES
    description: Requested.
    value: 1
enum/REQ:
  bit_size: 1
  variants:
  - name: REQ_NO
    description: Do not request.
    value: 0
  - name: REQ_YES
    description: Request.
    value: 1
enum/SPC_LP_MODE:
  bit_size: 4
  variants:
  - name: MODE0
    description: Sleep mode with system clock running.
    value: 0
  - name: MODE1
    description: DSLEEP with system clock off.
    value: 1
  - name: MODE2
    description: PDOWN with system clock off.
    value: 2
  - name: MODE8
    description: DPDOWN with system clock off.
    value: 8
enum/SPC_LP_REQ:
  bit_size: 1
  variants:
  - name: ACTIVE
    description: SPC is in Active mode; the ACTIVE_CFG register has control.
    value: 0
  - name: LOW_POWER
    description: All power domains requested low-power mode; SPC entered a low-power state; power-mode configuration based on the LP_CFG register.
    value: 1
enum/SYSVDD_HVDF:
  bit_size: 1
  variants:
  - name: EVENT_NO
    description: Event not detected.
    value: 0
  - name: EVENT_YES
    description: Event detected.
    value: 1
enum/SYSVDD_LVDF:
  bit_size: 1
  variants:
  - name: EVENT_NO
    description: Event not detected.
    value: 0
  - name: EVENT_YES
    description: Event detected.
    value: 1
enum/VDD_VD_DISABLE:
  bit_size: 1
  variants:
  - name: ENABLE
    description: Enable.
    value: 0
  - name: DISABLE
    description: Disable.
    value: 1
enum/VD_CORE_CFG_LOCK:
  bit_size: 1
  variants:
  - name: ALLOW
    description: Allow.
    value: 0
  - name: DENY
    description: Deny.
    value: 1
enum/VD_SYS_CFG_LOCK:
  bit_size: 1
  variants:
  - name: ALLOW
    description: Allow.
    value: 0
  - name: DENY
    description: Deny.
    value: 1
enum/VSM:
  bit_size: 2
  variants:
  - name: VSM1
    description: 1.0 V.
    value: 1
  - name: VSM2
    description: 1.1 V.
    value: 2
