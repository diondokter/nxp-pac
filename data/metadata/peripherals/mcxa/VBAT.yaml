enum/CapTrim:
  bit_size: 2
  variants:
  - name: Val0
    description: Default (when CAP2_TRIM = 0 and CAP_TRIM[1:0] = 00 ).
    value: 0
  - name: Val1
    description: -1us (when CAP2_TRIM = 0 and CAP_TRIM[1:0] = 01).
    value: 1
  - name: Val2
    description: -2us (when CAP2_TRIM = 0 and CAP_TRIM[1:0] = 10) or or +3.5us (when CAP2_TRIM = 1 and CAP_TRIM[1:0] = 10).
    value: 2
  - name: Val3
    description: -2.5us (when CAP2_TRIM = 0 and CAP_TRIM[1:0] = 11) or +1us (when CAP2_TRIM = 1 and CAP_TRIM[1:0] = 11).
