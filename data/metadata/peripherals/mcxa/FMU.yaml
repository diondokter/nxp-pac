block/FMU:
  description: Flash.
  items:
  - name: FSTAT
    description: Flash Status Register.
    byte_offset: 0
    fieldset: FSTAT
  - name: FCNFG
    description: Flash Configuration Register.
    byte_offset: 4
    fieldset: FCNFG
  - name: FCTRL
    description: Flash Control Register.
    byte_offset: 8
    fieldset: FCTRL
  - name: FCCOB
    description: Flash Common Command Object Registers.
    array:
      len: 8
      stride: 4
    byte_offset: 16
    fieldset: FCCOB
fieldset/FCCOB:
  description: Flash Common Command Object Registers.
  fields:
  - name: CCOBn
    description: CCOBn.
    bit_offset: 0
    bit_size: 32
fieldset/FCNFG:
  description: Flash Configuration Register.
  fields:
  - name: CCIE
    description: Command Complete Interrupt Enable.
    bit_offset: 7
    bit_size: 1
    enum: CCIE
  - name: ERSREQ
    description: Mass Erase Request.
    bit_offset: 8
    bit_size: 1
    enum: ERSREQ
  - name: DFDIE
    description: Double Bit Fault Detect Interrupt Enable.
    bit_offset: 16
    bit_size: 1
    enum: DFDIE
  - name: ERSIEN0
    description: Erase IFR Sector Enable - Block 0.
    bit_offset: 24
    bit_size: 4
    enum: ERSIEN0
  - name: ERSIEN1
    description: Erase IFR Sector Enable - Block 1 (for dual block configs).
    bit_offset: 28
    bit_size: 4
    enum: ERSIEN1
fieldset/FCTRL:
  description: Flash Control Register.
  fields:
  - name: RWSC
    description: Read Wait-State Control.
    bit_offset: 0
    bit_size: 4
  - name: LSACTIVE
    description: Low speed active mode.
    bit_offset: 8
    bit_size: 1
    enum: LSACTIVE
  - name: FDFD
    description: Force Double Bit Fault Detect.
    bit_offset: 16
    bit_size: 1
    enum: FDFD
  - name: ABTREQ
    description: Abort Request.
    bit_offset: 24
    bit_size: 1
    enum: ABTREQ
fieldset/FSTAT:
  description: Flash Status Register.
  fields:
  - name: FAIL
    description: Command Fail Flag.
    bit_offset: 0
    bit_size: 1
    enum: FAIL
  - name: CMDABT
    description: Command Abort Flag.
    bit_offset: 2
    bit_size: 1
    enum: CMDABT
  - name: PVIOL
    description: Command Protection Violation Flag.
    bit_offset: 4
    bit_size: 1
    enum: PVIOL
  - name: ACCERR
    description: Command Access Error Flag.
    bit_offset: 5
    bit_size: 1
    enum: ACCERR
  - name: CWSABT
    description: Command Write Sequence Abort Flag.
    bit_offset: 6
    bit_size: 1
    enum: CWSABT
  - name: CCIF
    description: Command Complete Interrupt Flag.
    bit_offset: 7
    bit_size: 1
    enum: CCIF
  - name: CMDPRT
    description: Command protection level.
    bit_offset: 8
    bit_size: 2
    enum: CMDPRT
  - name: CMDP
    description: Command protection status flag.
    bit_offset: 11
    bit_size: 1
    enum: CMDP
  - name: CMDDID
    description: Command domain ID.
    bit_offset: 12
    bit_size: 4
  - name: DFDIF
    description: Double Bit Fault Detect Interrupt Flag.
    bit_offset: 16
    bit_size: 1
    enum: DFDIF
  - name: SALV_USED
    description: Salvage Used for Erase operation.
    bit_offset: 17
    bit_size: 1
    enum: SALV_USED
  - name: PEWEN
    description: Program-Erase Write Enable Control.
    bit_offset: 24
    bit_size: 2
    enum: PEWEN
  - name: PERDY
    description: Program-Erase Ready Control/Status Flag.
    bit_offset: 31
    bit_size: 1
    enum: PERDY
enum/ABTREQ:
  bit_size: 1
  variants:
  - name: abtreq0
    description: No request to abort a command write sequence.
    value: 0
  - name: abtreq1
    description: Request to abort a command write sequence.
    value: 1
enum/ACCERR:
  bit_size: 1
  variants:
  - name: accerr0
    description: No access error detected.
    value: 0
  - name: accerr1
    description: Access error detected.
    value: 1
enum/CCIE:
  bit_size: 1
  variants:
  - name: ccie0
    description: Command complete interrupt disabled.
    value: 0
  - name: ccie1
    description: Command complete interrupt enabled.
    value: 1
enum/CCIF:
  bit_size: 1
  variants:
  - name: ccif0
    description: Flash command, initialization, or power mode recovery in progress.
    value: 0
  - name: ccif1
    description: Flash command, initialization, or power mode recovery has completed.
    value: 1
enum/CMDABT:
  bit_size: 1
  variants:
  - name: cmdabt0
    description: No command abort detected.
    value: 0
  - name: cmdabt1
    description: Command abort detected.
    value: 1
enum/CMDP:
  bit_size: 1
  variants:
  - name: cmdp0
    description: Command protection level and domain ID are stale.
    value: 0
  - name: cmdp1
    description: Command protection level (CMDPRT) and domain ID (CMDDID) are set.
    value: 1
enum/CMDPRT:
  bit_size: 2
  variants:
  - name: cmdprt00
    description: Secure, normal access.
    value: 0
  - name: cmdprt01
    description: Secure, privileged access.
    value: 1
  - name: cmdprt10
    description: Nonsecure, normal access.
    value: 2
  - name: cmdprt11
    description: Nonsecure, privileged access.
    value: 3
enum/CWSABT:
  bit_size: 1
  variants:
  - name: cwsabt0
    description: Command write sequence not aborted.
    value: 0
  - name: cwsabt1
    description: Command write sequence aborted.
    value: 1
enum/DFDIE:
  bit_size: 1
  variants:
  - name: dfdie0
    description: Double bit fault detect interrupt disabled.
    value: 0
  - name: dfdie1
    description: Double bit fault detect interrupt enabled.
    value: 1
enum/DFDIF:
  bit_size: 1
  variants:
  - name: dfdif0
    description: Double bit fault not detected during a valid flash read access.
    value: 0
  - name: dfdif1
    description: Double bit fault detected (or FCTRL[FDFD] is set) during a valid flash read access.
    value: 1
enum/ERSIEN0:
  bit_size: 4
  variants:
  - name: ersien00
    description: Block 0 IFR Sector X is protected from erase by ERSSCR command.
    value: 0
  - name: ersien01
    description: Block 0 IFR Sector X is not protected from erase by ERSSCR command.
    value: 1
enum/ERSIEN1:
  bit_size: 4
  variants:
  - name: ersien10
    description: Block 1 IFR Sector X is protected from erase by ERSSCR command.
    value: 0
  - name: ersien11
    description: Block 1 IFR Sector X is not protected from erase by ERSSCR command.
    value: 1
enum/ERSREQ:
  bit_size: 1
  variants:
  - name: ersreq0
    description: No request or request complete.
    value: 0
  - name: ersreq1
    description: Request to run the Mass Erase operation.
    value: 1
enum/FAIL:
  bit_size: 1
  variants:
  - name: fail0
    description: Error not detected.
    value: 0
  - name: fail1
    description: Error detected.
    value: 1
enum/FDFD:
  bit_size: 1
  variants:
  - name: fdfd0
    description: FSTAT[DFDIF] sets only if a double bit fault is detected during a valid flash read access from the platform flash controller.
    value: 0
  - name: fdfd1
    description: FSTAT[DFDIF] sets during any valid flash read access from the platform flash controller. An interrupt request is generated if the DFDIE bit is set.
    value: 1
enum/LSACTIVE:
  bit_size: 1
  variants:
  - name: lsactive0
    description: Full speed active mode requested.
    value: 0
  - name: lsactive1
    description: Low speed active mode requested.
    value: 1
enum/PERDY:
  bit_size: 1
  variants:
  - name: perdy0
    description: Program or sector erase command operation not stalled.
    value: 0
  - name: perdy1
    description: Program or sector erase command operation ready to execute.
    value: 1
enum/PEWEN:
  bit_size: 2
  variants:
  - name: pewen00
    description: Writes are not enabled.
    value: 0
  - name: pewen01
    description: Writes are enabled for one flash or IFR phrase (phrase programming, sector erase).
    value: 1
  - name: pewen10
    description: Writes are enabled for one flash or IFR page (page programming).
    value: 2
enum/PVIOL:
  bit_size: 1
  variants:
  - name: pviol0
    description: No protection violation detected.
    value: 0
  - name: pviol1
    description: Protection violation detected.
    value: 1
enum/SALV_USED:
  bit_size: 1
  variants:
  - name: salv_used0
    description: Salvage not used during last operation.
    value: 0
  - name: salv_used1
    description: Salvage used during the last erase operation.
    value: 1
