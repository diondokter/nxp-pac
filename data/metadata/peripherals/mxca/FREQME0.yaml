fieldset/CTRL_R:
  description: Control (in Read mode).
  fields:
  - name: RESULT
    description: Indicates the measurement result-either the target clock counter value (for Frequency Measurement mode) or pulse width measurement (for Pulse Width Measurement mode).
    bit_offset: 0
    bit_size: 31
  - name: MEASURE_IN_PROGRESS
    description: Measurement In Progress.
    bit_offset: 31
    bit_size: 1
    enum: CTRL_R_MEASURE_IN_PROGRESS
fieldset/CTRL_W:
  description: Control (in Write mode).
  fields:
  - name: REF_SCALE
    description: Reference Clock Scaling Factor.
    bit_offset: 0
    bit_size: 5
  - name: PULSE_MODE
    description: Pulse Width Measurement Mode Select.
    bit_offset: 8
    bit_size: 1
    enum: CTRL_W_PULSE_MODE
  - name: PULSE_POL
    description: Pulse Polarity.
    bit_offset: 9
    bit_size: 1
    enum: CTRL_W_PULSE_POL
  - name: LT_MIN_INT_EN
    description: Less Than Minimum Interrupt Enable.
    bit_offset: 12
    bit_size: 1
  - name: GT_MAX_INT_EN
    description: Greater Than Maximum Interrupt Enable.
    bit_offset: 13
    bit_size: 1
  - name: RESULT_READY_INT_EN
    description: Result Ready Interrupt Enable.
    bit_offset: 14
    bit_size: 1
  - name: CONTINUOUS_MODE_EN
    description: Continuous Mode Enable.
    bit_offset: 30
    bit_size: 1
  - name: MEASURE_IN_PROGRESS
    description: Measurement In Progress.
    bit_offset: 31
    bit_size: 1
    enum: CTRL_W_MEASURE_IN_PROGRESS
fieldset/MAX:
  description: Maximum.
  fields:
  - name: MAX_VALUE
    description: Maximum Value.
    bit_offset: 0
    bit_size: 31
fieldset/MIN:
  description: Minimum.
  fields:
  - name: MIN_VALUE
    description: Minimum Value.
    bit_offset: 0
    bit_size: 31
enum/CTRLSTAT_MEASURE_IN_PROGRESS:
  bit_size: 1
  variants:
  - name: IDLE
    description: Not in progress.
    value: 0
  - name: ONGOING
    description: In progress.
    value: 1
enum/CTRLSTAT_PULSE_MODE:
  bit_size: 1
  variants:
  - name: FREQ
    description: Frequency Measurement mode.
    value: 0
  - name: PULSE
    description: Pulse Width Measurement mode.
    value: 1
enum/CTRLSTAT_PULSE_POL:
  bit_size: 1
  variants:
  - name: HIGH
    description: High period.
    value: 0
  - name: LOW
    description: Low period.
    value: 1
enum/CTRL_R_MEASURE_IN_PROGRESS:
  bit_size: 1
  variants:
  - name: CYCLE_DONE
    description: Complete.
    value: 0
  - name: IN_PROGRESS
    description: In progress.
    value: 1
enum/CTRL_W_MEASURE_IN_PROGRESS:
  bit_size: 1
  variants:
  - name: FORCE_TERMINATE
    description: Terminates measurement.
    value: 0
  - name: INITIATE_A_FREQME_CYCLE
    description: Initiates measurement.
    value: 1
enum/CTRL_W_PULSE_MODE:
  bit_size: 1
  variants:
  - name: FREQ_ME_MODE
    description: Frequency Measurement mode.
    value: 0
  - name: PULSE_ME_MODE
    description: Pulse Width Measurement mode.
    value: 1
enum/CTRL_W_PULSE_POL:
  bit_size: 1
  variants:
  - name: HIGH_PERIOD
    description: High period.
    value: 0
  - name: LOW_PERIOD
    description: Low period.
    value: 1
enum/GT_MAX_STAT:
  bit_size: 1
  variants:
  - name: IN_RANGE
    description: Less than MAX[MAX_VALUE].
    value: 0
  - name: GT_MAX
    description: Greater than MAX[MAX_VALUE].
    value: 1
enum/LT_MIN_STAT:
  bit_size: 1
  variants:
  - name: IN_RANGE
    description: Greater than MIN[MIN_VALUE].
    value: 0
  - name: LT_MIN
    description: Less than MIN[MIN_VALUE].
    value: 1
