enum/FAUTO:
  bit_size: 4
  variants:
  - name: MANUAL
    description: Manual fault clearing. PWM outputs disabled by this fault are not enabled until FSTS[FFLAGx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL]. If neither FFULL nor FHALF is set, then the fault condition cannot be cleared. This is further controlled by FCTRL[FSAFE].
    value: 0
  - name: AUTOMATIC
    description: Automatic fault clearing. PWM outputs disabled by this fault are enabled when FSTS[FFPINx] is clear at the start of a half cycle or full cycle depending on the states of FSTS[FHALF] and FSTS[FFULL] without regard to the state of FSTS[FFLAGx]. If neither FFULL nor FHALF is set, then the fault condition cannot be cleared.
    value: 1
enum/FFLAG:
  bit_size: 4
  variants:
  - name: NO_FLAG
    description: No fault on the FAULTx pin.
    value: 0
  - name: FLAG
    description: Fault on the FAULTx pin.
    value: 1
enum/FFULL:
  bit_size: 4
  variants:
