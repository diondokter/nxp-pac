enum/ADDRESS_CTRL:
  bit_size: 3
  variants:
  - name: ENABLE_RESET
    description: Enable reset.
    value: 1
  - name: ENABLE_INTERRUPT
    description: Enable interrupt.
    value: 2
  - name: DISABLE_BOTH
    description: Disable both reset and interrupt.
    value: 4
enum/DEBUG_HALT_CTRL:
  bit_size: 2
  variants:
