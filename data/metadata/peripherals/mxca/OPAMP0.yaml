block/OPAMP0:
  description: OPAMP.
  items:
  - name: VERID
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: VERID
  - name: PARAM
    description: Parameter.
    byte_offset: 4
    access: Read
  - name: OPAMP_CTRL
    description: OPAMP Control.
    byte_offset: 8
    fieldset: OPAMP_CTRL
fieldset/OPAMP_CTRL:
  description: OPAMP Control.
  fields:
  - name: OPA_EN
    description: OPAMP Enable.
    bit_offset: 0
    bit_size: 1
  - name: OPA_CC_SEL
    description: Compensation capcitor config selection.
    bit_offset: 4
    bit_size: 2
    enum: OPA_CC_SEL
  - name: OPA_BC_SEL
    description: Bias current config selection.
    bit_offset: 6
    bit_size: 2
    enum: OPA_BC_SEL
fieldset/VERID:
  description: Version ID.
  fields:
  - name: FEATURE
    description: Feature Specification Number.
    bit_offset: 0
    bit_size: 16
  - name: MINOR
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: MAJOR
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/OPA_BC_SEL:
  bit_size: 2
  variants:
  - name: TBD1
    description: Default value. Keep power consumption constant.
    value: 0
  - name: TBD2
    description: Reduce power consumption to 1/4.
    value: 1
  - name: TBD3
    description: Reduce power consumption to 1/2.
    value: 2
  - name: TBD4
    description: Double the power consumption.
    value: 3
enum/OPA_CC_SEL:
  bit_size: 2
  variants:
  - name: TBD1
    description: Fit 2X gains.
    value: 0
  - name: TBD2
    description: Fit 4X gains.
    value: 1
  - name: TBD3
    description: Fit 8X gains.
    value: 2
  - name: TBD4
    description: Fit 16X gains.
    value: 3
