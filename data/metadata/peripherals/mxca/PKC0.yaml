    bit_size: 16
  - name: YPTR
    description: Start address of Y operand in PKCRAM with byte granularity.
    bit_offset: 16
    bit_size: 16
fieldset/PKC_ZRPTR1:
  description: Z+R pointer register, parameter set 1.
  fields:
  - name: ZPTR
    description: Start address of Z operand in PKCRAM with byte granularity or constant for calculation modes using CONST.
    bit_offset: 0
    bit_size: 16
  - name: RPTR
    description: Start address of R result in PKCRAM with byte granularity.
    bit_offset: 16
    bit_size: 16
fieldset/PKC_ZRPTR2:
  description: Z+R pointer register, parameter set 2.
  fields:
  - name: ZPTR
    description: Start address of Z operand in PKCRAM with byte granularity or constant for calculation modes using CONST.
    bit_offset: 0
    bit_size: 16
  - name: RPTR
    description: Start address of R result in PKCRAM with byte granularity.
    bit_offset: 16
    bit_size: 16
enum/MULSIZE:
  bit_size: 2
  variants:
  - name: bit64
    description: 64-bit multiplier.
    value: 2
enum/REDMUL:
  bit_size: 2
  variants:
  - name: fullsz
    description: full size mode, 3 least significant bits of pointer and length are ignored, minimum supported length 0x0008.
    value: 0
  - name: VALUE_64bit
    description: 64-bit mode, 3 least significant bits of pointer and length are ignored, minimum supported length 0x0008.
    value: 2
