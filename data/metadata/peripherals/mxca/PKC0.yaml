fieldset/PKC_ACCESS_ERR:
  description: Access Error.
  fields:
  - name: APB_NOTAV
    description: APB Error.
    bit_offset: 0
    bit_size: 1
  - name: APB_WRGMD
    description: APB Error.
    bit_offset: 1
    bit_size: 1
  - name: APB_MASTER
    description: APB Master that triggered first APB error (APB_WRGMD or APB_NOTAV) This bit field always reads 0.
    bit_offset: 4
    bit_size: 4
  - name: AHB
    description: AHB Error.
    bit_offset: 10
    bit_size: 1
  - name: PKCC
    description: Error in PKC coprocessor kernel.
    bit_offset: 16
    bit_size: 1
  - name: FDET
    description: Error due to error detection circuitry.
    bit_offset: 17
    bit_size: 1
  - name: CTRL
    description: Error in PKC software control.
    bit_offset: 18
    bit_size: 1
  - name: UCRC
    description: Error in layer2 CRC check.
    bit_offset: 19
    bit_size: 1
fieldset/PKC_ACCESS_ERR_CLR:
  description: Clear Access Error.
  fields:
  - name: ERR_CLR
    description: Write 1 to reset PKC_ACCESS_ERR SFR.
    bit_offset: 0
    bit_size: 1
fieldset/PKC_CFG:
  description: Configuration register.
  fields:
  - name: IDLEOP
    description: Idle operation feature not available in this version (flag is don't care).
    bit_offset: 0
    bit_size: 1
  - name: RFU1
    description: RFU.
    bit_offset: 1
    bit_size: 1
  - name: RFU2
    description: RFU.
    bit_offset: 2
    bit_size: 1
  - name: CLKRND
    description: Clock randomization feature not available in this version (flag is don't care).
    bit_offset: 3
    bit_size: 1
  - name: REDMULNOISE
    description: Noise in reduced multiplier mode feature not available in this version (flag is don't care).
    bit_offset: 4
    bit_size: 1
  - name: RNDDLY
    description: Random delay feature not available in this version (flag is don't care).
    bit_offset: 5
    bit_size: 3
  - name: SBXNOISE
    description: Noise feature not available in this version (flag is don't care).
    bit_offset: 8
    bit_size: 1
  - name: ALPNOISE
    description: Noise feature not available in this version (flag is don't care).
    bit_offset: 9
    bit_size: 1
  - name: FMULNOISE
    description: Noise feature not available in this version (flag is don't care).
    bit_offset: 10
    bit_size: 1
fieldset/PKC_CTRL:
  description: Control Register.
  fields:
  - name: RESET
    description: PKC reset control bit.
    bit_offset: 0
    bit_size: 1
  - name: STOP
    description: Freeze PKC calculation.
    bit_offset: 1
    bit_size: 1
  - name: GOD1
    description: Control bit to start direct operation using parameter set 1.
    bit_offset: 2
    bit_size: 1
  - name: GOD2
    description: Control bit to start direct operation using parameter set 2.
    bit_offset: 3
    bit_size: 1
  - name: GOM1
    description: Control bit to start MC pattern using parameter set 1.
    bit_offset: 4
    bit_size: 1
  - name: GOM2
    description: Control bit to start MC pattern using parameter set 2.
    bit_offset: 5
    bit_size: 1
  - name: GOU
    description: Control bit to start pipe operation.
    bit_offset: 6
    bit_size: 1
  - name: GF2CONV
    description: Convert to GF2 calculation modes.
    bit_offset: 7
    bit_size: 1
  - name: CLRCACHE
    description: Clear universal pointer cache.
    bit_offset: 8
    bit_size: 1
  - name: CACHE_EN
    description: Enable universal pointer cache.
    bit_offset: 9
    bit_size: 1
  - name: REDMUL
    description: Reduced multiplier mode.
    bit_offset: 10
    bit_size: 2
    enum: REDMUL
fieldset/PKC_INT_CLR_ENABLE:
  description: Interrupt enable clear.
  fields:
  - name: EN_PDONE
    description: Write to clear PDONE interrupt enable flag (PKC_INT_ENABLE[EN_PDONE]=0).
    bit_offset: 0
    bit_size: 1
fieldset/PKC_INT_CLR_STATUS:
  description: Interrupt status clear.
  fields:
  - name: INT_PDONE
    description: Write to clear End-of-computation status flag (PKC_INT_STATUS[INT_PDONE]=0).
    bit_offset: 0
    bit_size: 1
