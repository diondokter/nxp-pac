    description: Write to set PDONE interrupt enable flag (PKC_INT_ENABLE[EN_PDONE]=1).
    bit_offset: 0
    bit_size: 1
fieldset/PKC_INT_SET_STATUS:
  description: Interrupt status set.
  fields:
