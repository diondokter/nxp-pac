    description: Number of parameter sets for real calculation.
    bit_offset: 6
    bit_size: 2
  - name: SBX0AVAIL
    description: SBX0 operation is available.
    bit_offset: 8
    bit_size: 1
  - name: SBX1AVAIL
    description: SBX1 operation is available.
    bit_offset: 9
    bit_size: 1
  - name: SBX2AVAIL
    description: SBX2 operation is available.
    bit_offset: 10
    bit_size: 1
  - name: SBX3AVAIL
    description: SBX3 operation is available.
    bit_offset: 11
    bit_size: 1
