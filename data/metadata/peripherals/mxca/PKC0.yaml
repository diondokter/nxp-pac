  - name: XPTR
    description: Start address of X operand in PKCRAM with byte granularity.
    bit_offset: 0
    bit_size: 16
  - name: YPTR
    description: Start address of Y operand in PKCRAM with byte granularity.
    bit_offset: 16
    bit_size: 16
fieldset/PKC_XYPTR2:
  description: X+Y pointer register, parameter set 2.
  fields:
  - name: XPTR
    description: Start address of X operand in PKCRAM with byte granularity.
