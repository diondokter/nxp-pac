block/CMP:
  description: LPCMP.
  items:
  - name: VERID
    description: Version ID.
    byte_offset: 0
    access: Read
    fieldset: VERID
  - name: PARAM
    description: Parameter.
    byte_offset: 4
    access: Read
    fieldset: PARAM
  - name: CCR0
    description: Comparator Control Register 0.
    byte_offset: 8
    fieldset: CCR0
  - name: CCR1
    description: Comparator Control Register 1.
    byte_offset: 12
    fieldset: CCR1
  - name: CCR2
    description: Comparator Control Register 2.
    byte_offset: 16
    fieldset: CCR2
  - name: DCR
    description: DAC Control.
    byte_offset: 24
    fieldset: DCR
  - name: IER
    description: Interrupt Enable.
    byte_offset: 28
    fieldset: IER
  - name: CSR
    description: Comparator Status.
    byte_offset: 32
    fieldset: CSR
  - name: RRCR0
    description: Round Robin Control Register 0.
    byte_offset: 36
    fieldset: RRCR0
  - name: RRCR1
    description: Round Robin Control Register 1.
    byte_offset: 40
    fieldset: RRCR1
  - name: RRCSR
    description: Round Robin Control and Status.
    byte_offset: 44
    fieldset: RRCSR
  - name: RRSR
    description: Round Robin Status.
    byte_offset: 48
    fieldset: RRSR
  - name: RRCR2
    description: Round Robin Control Register 2.
    byte_offset: 56
    fieldset: RRCR2
fieldset/CCR0:
  description: Comparator Control Register 0.
  fields:
  - name: CMP_EN
    description: Comparator Enable.
    bit_offset: 0
    bit_size: 1
  - name: CMP_STOP_EN
    description: Comparator Deep Sleep Mode Enable.
    bit_offset: 1
    bit_size: 1
fieldset/CCR1:
  description: Comparator Control Register 1.
  fields:
  - name: WINDOW_EN
    description: Windowing Enable.
    bit_offset: 0
    bit_size: 1
  - name: SAMPLE_EN
    description: Sampling Enable.
    bit_offset: 1
    bit_size: 1
  - name: DMA_EN
    description: DMA Enable.
    bit_offset: 2
    bit_size: 1
  - name: COUT_INV
    description: Comparator Invert.
    bit_offset: 3
    bit_size: 1
  - name: COUT_SEL
    description: Comparator Output Select.
    bit_offset: 4
    bit_size: 1
    enum: COUT_SEL
  - name: COUT_PEN
    description: Comparator Output Pin Enable.
    bit_offset: 5
    bit_size: 1
  - name: COUTA_OWEN
    description: COUTA_OW Enable.
    bit_offset: 6
    bit_size: 1
    enum: COUTA_OWEN
  - name: COUTA_OW
    description: COUTA Output Level for Closed Window.
    bit_offset: 7
    bit_size: 1
    enum: COUTA_OW
  - name: WINDOW_INV
    description: WINDOW/SAMPLE Signal Invert.
    bit_offset: 8
    bit_size: 1
  - name: WINDOW_CLS
    description: COUT Event Window Close.
    bit_offset: 9
    bit_size: 1
  - name: EVT_SEL
    description: COUT Event Select.
    bit_offset: 10
    bit_size: 2
    enum: EVT_SEL
  - name: FUNC_CLK_SEL
    description: Functional Clock Source Select.
    bit_offset: 12
    bit_size: 2
    enum: FUNC_CLK_SEL
  - name: FILT_CNT
    description: Filter Sample Count.
    bit_offset: 16
    bit_size: 3
    enum: FILT_CNT
  - name: FILT_PER
    description: Filter Sample Period.
    bit_offset: 24
    bit_size: 8
fieldset/CCR2:
  description: Comparator Control Register 2.
  fields:
  - name: CMP_HPMD
    description: CMP High Power Mode Select.
    bit_offset: 0
    bit_size: 1
    enum: CMP_HPMD
  - name: CMP_NPMD
    description: CMP Nano Power Mode Select.
    bit_offset: 1
    bit_size: 1
  - name: HYSTCTR
    description: Comparator Hysteresis Control.
    bit_offset: 4
    bit_size: 2
    enum: HYSTCTR
  - name: PSEL
    description: Plus Input MUX Select.
    bit_offset: 16
    bit_size: 3
    enum: PSEL
  - name: MSEL
    description: Minus Input MUX Select.
    bit_offset: 20
    bit_size: 3
    enum: MSEL
fieldset/CSR:
  description: Comparator Status.
  fields:
  - name: CFR
    description: Analog Comparator Flag Rising.
    bit_offset: 0
    bit_size: 1
  - name: CFF
    description: Analog Comparator Flag Falling.
    bit_offset: 1
    bit_size: 1
  - name: RRF
    description: Round-Robin Flag.
    bit_offset: 2
    bit_size: 1
  - name: COUT
    description: Analog Comparator Output.
    bit_offset: 8
    bit_size: 1
fieldset/DCR:
  description: DAC Control.
  fields:
  - name: DAC_EN
    description: DAC Enable.
    bit_offset: 0
    bit_size: 1
  - name: DAC_HPMD
    description: DAC High Power Mode.
    bit_offset: 1
    bit_size: 1
  - name: VRSEL
    description: DAC Reference High Voltage Source Select.
    bit_offset: 8
    bit_size: 1
    enum: VRSEL
  - name: DAC_DATA
    description: DAC Output Voltage Select.
    bit_offset: 16
    bit_size: 8
fieldset/IER:
  description: Interrupt Enable.
  fields:
  - name: CFR_IE
    description: Comparator Flag Rising Interrupt Enable.
    bit_offset: 0
    bit_size: 1
  - name: CFF_IE
    description: Comparator Flag Falling Interrupt Enable.
    bit_offset: 1
    bit_size: 1
  - name: RRF_IE
    description: Round-Robin Flag Interrupt Enable.
    bit_offset: 2
    bit_size: 1
fieldset/PARAM:
  description: Parameter.
  fields:
  - name: DAC_RES
    description: DAC Resolution.
    bit_offset: 0
    bit_size: 4
    enum: DAC_RES
fieldset/RRCR0:
  description: Round Robin Control Register 0.
  fields:
  - name: RR_EN
    description: Round-Robin Enable.
    bit_offset: 0
    bit_size: 1
  - name: RR_TRG_SEL
    description: Round-Robin Trigger Select.
    bit_offset: 1
    bit_size: 1
    enum: RR_TRG_SEL
  - name: RR_NSAM
    description: Number of Sample Clocks.
    bit_offset: 8
    bit_size: 2
    enum: RR_NSAM
  - name: RR_CLK_SEL
    description: Round Robin Clock Source Select.
    bit_offset: 12
    bit_size: 2
    enum: RR_CLK_SEL
  - name: RR_INITMOD
    description: Initialization Delay Modulus.
    bit_offset: 16
    bit_size: 6
    enum: RR_INITMOD
  - name: RR_SAMPLE_CNT
    description: Number of Sample for One Channel.
    bit_offset: 24
    bit_size: 4
    enum: RR_SAMPLE_CNT
  - name: RR_SAMPLE_THRESHOLD
    description: Sample Time Threshold.
    bit_offset: 28
    bit_size: 4
    enum: RR_SAMPLE_THRESHOLD
fieldset/RRCR1:
  description: Round Robin Control Register 1.
  fields:
  - name: RR_CH0EN
    description: Channel 0 Input Enable in Trigger Mode.
    bit_offset: 0
    bit_size: 1
  - name: RR_CH1EN
    description: Channel 1 Input Enable in Trigger Mode.
    bit_offset: 1
    bit_size: 1
  - name: RR_CH2EN
    description: Channel 2 Input Enable in Trigger Mode.
    bit_offset: 2
    bit_size: 1
  - name: RR_CH3EN
    description: Channel 3 Input Enable in Trigger Mode.
    bit_offset: 3
    bit_size: 1
  - name: RR_CH4EN
    description: Channel 4 Input Enable in Trigger Mode.
    bit_offset: 4
    bit_size: 1
  - name: RR_CH5EN
    description: Channel 5 Input Enable in Trigger Mode.
    bit_offset: 5
    bit_size: 1
  - name: RR_CH6EN
    description: Channel 6 Input Enable in Trigger Mode.
    bit_offset: 6
    bit_size: 1
  - name: RR_CH7EN
    description: Channel 7 Input Enable in Trigger Mode.
    bit_offset: 7
    bit_size: 1
  - name: FIXP
    description: Fixed Port.
    bit_offset: 16
    bit_size: 1
    enum: FIXP
  - name: FIXCH
    description: Fixed Channel Select.
    bit_offset: 20
    bit_size: 3
    enum: FIXCH
fieldset/RRCR2:
  description: Round Robin Control Register 2.
  fields:
  - name: RR_TIMER_RELOAD
    description: Number of Sample Clocks.
    bit_offset: 0
    bit_size: 28
  - name: RR_TIMER_EN
    description: Round-Robin Internal Timer Enable.
    bit_offset: 31
    bit_size: 1
fieldset/RRCSR:
  description: Round Robin Control and Status.
  fields:
  - name: RR_CH0OUT
    description: Comparison Result for Channel 0.
    bit_offset: 0
    bit_size: 1
  - name: RR_CH1OUT
    description: Comparison Result for Channel 1.
    bit_offset: 1
    bit_size: 1
  - name: RR_CH2OUT
    description: Comparison Result for Channel 2.
    bit_offset: 2
    bit_size: 1
  - name: RR_CH3OUT
    description: Comparison Result for Channel 3.
    bit_offset: 3
    bit_size: 1
  - name: RR_CH4OUT
    description: Comparison Result for Channel 4.
    bit_offset: 4
    bit_size: 1
  - name: RR_CH5OUT
    description: Comparison Result for Channel 5.
    bit_offset: 5
    bit_size: 1
  - name: RR_CH6OUT
    description: Comparison Result for Channel 6.
    bit_offset: 6
    bit_size: 1
  - name: RR_CH7OUT
    description: Comparison Result for Channel 7.
    bit_offset: 7
    bit_size: 1
fieldset/RRSR:
  description: Round Robin Status.
  fields:
  - name: RR_CH0F
    description: Channel 0 Input Changed Flag.
    bit_offset: 0
    bit_size: 1
  - name: RR_CH1F
    description: Channel 1 Input Changed Flag.
    bit_offset: 1
    bit_size: 1
  - name: RR_CH2F
    description: Channel 2 Input Changed Flag.
    bit_offset: 2
    bit_size: 1
  - name: RR_CH3F
    description: Channel 3 Input Changed Flag.
    bit_offset: 3
    bit_size: 1
  - name: RR_CH4F
    description: Channel 4 Input Changed Flag.
    bit_offset: 4
    bit_size: 1
  - name: RR_CH5F
    description: Channel 5 Input Changed Flag.
    bit_offset: 5
    bit_size: 1
  - name: RR_CH6F
    description: Channel 6 Input Changed Flag.
    bit_offset: 6
    bit_size: 1
  - name: RR_CH7F
    description: Channel 7 Input Changed Flag.
    bit_offset: 7
    bit_size: 1
fieldset/VERID:
  description: Version ID.
  fields:
  - name: FEATURE
    description: Feature Specification Number.
    bit_offset: 0
    bit_size: 16
    enum: FEATURE
  - name: MINOR
    description: Minor Version Number.
    bit_offset: 16
    bit_size: 8
  - name: MAJOR
    description: Major Version Number.
    bit_offset: 24
    bit_size: 8
enum/CMP_HPMD:
  bit_size: 1
  variants:
  - name: LOW
    description: Low power (speed) comparison mode.
    value: 0
  - name: HIGH
    description: High power (speed) comparison mode.
    value: 1
enum/COUTA_OW:
  bit_size: 1
  variants:
  - name: COUTA_0
    description: COUTA is 0.
    value: 0
  - name: COUTA_1
    description: COUTA is 1.
    value: 1
enum/COUTA_OWEN:
  bit_size: 1
  variants:
  - name: SAMPLED
    description: COUTA holds the last sampled value.
    value: 0
  - name: COUTA_OW
    description: Enables the COUTA signal value to be defined by COUTA_OW.
    value: 1
enum/COUT_SEL:
  bit_size: 1
  variants:
  - name: COUT
    description: Use COUT (filtered).
    value: 0
  - name: COUTA
    description: Use COUTA (unfiltered).
    value: 1
enum/DAC_RES:
  bit_size: 4
  variants:
  - name: RESO_4
    description: 4-bit DAC.
    value: 0
  - name: RESO_6
    description: 6-bit DAC.
    value: 1
  - name: RESO_8
    description: 8-bit DAC.
    value: 2
  - name: RESO_10
    description: 10-bit DAC.
    value: 3
  - name: RESO_12
    description: 12-bit DAC.
    value: 4
  - name: RESO_14
    description: 14-bit DAC.
    value: 5
  - name: RESO_16
    description: 16-bit DAC.
    value: 6
enum/EVT_SEL:
  bit_size: 2
  variants:
  - name: RISING
    description: Rising edge.
    value: 0
  - name: FALLING
    description: Falling edge.
    value: 1
  - name: BOTH
    description: Both edges.
    value: 2
enum/FEATURE:
  bit_size: 16
  variants:
  - name: ROUND_ROBIN
    description: Round robin feature.
    value: 1
enum/FILT_CNT:
  bit_size: 3
  variants:
  - name: BYPASSED
    description: 'Filter is bypassed: COUT = COUTA.'
    value: 0
  - name: SAMPLE_1
    description: 1 consecutive sample (Comparator output is simply sampled.).
    value: 1
  - name: SAMPLE_2
    description: 2 consecutive samples.
    value: 2
  - name: SAMPLE_3
    description: 3 consecutive samples.
    value: 3
  - name: SAMPLE_4
    description: 4 consecutive samples.
    value: 4
  - name: SAMPLE_5
    description: 5 consecutive samples.
    value: 5
  - name: SAMPLE_6
    description: 6 consecutive samples.
    value: 6
  - name: SAMPLE_7
    description: 7 consecutive samples.
    value: 7
enum/FIXCH:
  bit_size: 3
  variants:
  - name: FIX_CH0
    description: Channel 0.
    value: 0
  - name: FIX_CH1
    description: Channel 1.
    value: 1
  - name: FIX_CH2
    description: Channel 2.
    value: 2
  - name: FIX_CH3
    description: Channel 3.
    value: 3
  - name: FIX_CH4
    description: Channel 4.
    value: 4
  - name: FIX_CH5
    description: Channel 5.
    value: 5
  - name: FIX_CH6
    description: Channel 6.
    value: 6
  - name: FIX_CH7
    description: Channel 7.
    value: 7
enum/FIXP:
  bit_size: 1
  variants:
  - name: FIX_PLUS
    description: Fix the plus port. Sweep only the inputs to the minus port.
    value: 0
  - name: FIX_MINUS
    description: Fix the minus port. Sweep only the inputs to the plus port.
    value: 1
enum/FUNC_CLK_SEL:
  bit_size: 2
  variants:
  - name: FUNC0
    description: Select functional clock source 0.
    value: 0
  - name: FUNC1
    description: Select functional clock source 1.
    value: 1
  - name: FUNC2
    description: Select functional clock source 2.
    value: 2
  - name: FUNC3
    description: Select functional clock source 3.
    value: 3
enum/HYSTCTR:
  bit_size: 2
  variants:
  - name: LEVEL_0
    description: 'Level 0: Analog comparator hysteresis 0 mV.'
    value: 0
  - name: LEVEL_1
    description: 'Level 1: Analog comparator hysteresis 10 mV.'
    value: 1
  - name: LEVEL_2
    description: 'Level 2: Analog comparator hysteresis 20 mV.'
    value: 2
  - name: LEVEL_3
    description: 'Level 3: Analog comparator hysteresis 30 mV.'
    value: 3
enum/MSEL:
  bit_size: 3
  variants:
  - name: INPUT_0
    description: Input 0m.
    value: 0
  - name: INPUT_1
    description: Input 1m.
    value: 1
  - name: INPUT_2
    description: Input 2m.
    value: 2
  - name: INPUT_3
    description: Input 3m.
    value: 3
  - name: INPUT_4
    description: Input 4m.
    value: 4
  - name: INPUT_5
    description: Input 5m.
    value: 5
  - name: INPUT_7
    description: Internal DAC output.
    value: 7
enum/PSEL:
  bit_size: 3
  variants:
  - name: INPUT_0
    description: Input 0p.
    value: 0
  - name: INPUT_1
    description: Input 1p.
    value: 1
  - name: INPUT_2
    description: Input 2p.
    value: 2
  - name: INPUT_3
    description: Input 3p.
    value: 3
  - name: INPUT_4
    description: Input 4p.
    value: 4
  - name: INPUT_5
    description: Input 5p.
    value: 5
  - name: INPUT_7
    description: Internal DAC output.
    value: 7
enum/RR_CLK_SEL:
  bit_size: 2
  variants:
  - name: RR0
    description: Select Round Robin clock Source 0.
    value: 0
  - name: RR1
    description: Select Round Robin clock Source 1.
    value: 1
  - name: RR2
    description: Select Round Robin clock Source 2.
    value: 2
  - name: RR3
    description: Select Round Robin clock Source 3.
    value: 3
enum/RR_INITMOD:
  bit_size: 6
  variants:
  - name: MOD_63
    description: 63 cycles (same as 111111b).
    value: 0
  - name: MOD_1_63_1
    description: 1 to 63 cycles.
    value: 1
  - name: MOD_1_63_2
    description: 1 to 63 cycles.
    value: 2
  - name: MOD_1_63_3
    description: 1 to 63 cycles.
    value: 3
  - name: MOD_1_63_4
    description: 1 to 63 cycles.
    value: 4
  - name: MOD_1_63_5
    description: 1 to 63 cycles.
    value: 5
  - name: MOD_1_63_6
    description: 1 to 63 cycles.
    value: 6
  - name: MOD_1_63_7
    description: 1 to 63 cycles.
    value: 7
  - name: MOD_1_63_8
    description: 1 to 63 cycles.
    value: 8
  - name: MOD_1_63_9
    description: 1 to 63 cycles.
    value: 9
enum/RR_NSAM:
  bit_size: 2
  variants:
  - name: WAIT_0
    description: 0 clock.
    value: 0
  - name: WAIT_1
    description: 1 clock.
    value: 1
  - name: WAIT_2
    description: 2 clocks.
    value: 2
  - name: WAIT_3
    description: 3 clocks.
    value: 3
enum/RR_SAMPLE_CNT:
  bit_size: 4
  variants:
  - name: SAMPLE_0
    description: 1 samples.
    value: 0
  - name: SAMPLE_1
    description: 2 samples.
    value: 1
  - name: SAMPLE_2
    description: 3 samples.
    value: 2
  - name: SAMPLE_3
    description: 4 samples.
    value: 3
  - name: SAMPLE_4
    description: 5 samples.
    value: 4
  - name: SAMPLE_5
    description: 6 samples.
    value: 5
  - name: SAMPLE_6
    description: 7 samples.
    value: 6
  - name: SAMPLE_7
    description: 8 samples.
    value: 7
  - name: SAMPLE_8
    description: 9 samples.
    value: 8
  - name: SAMPLE_9
    description: 10 samples.
    value: 9
  - name: SAMPLE_10
    description: 11 samples.
    value: 10
  - name: SAMPLE_11
    description: 12 samples.
    value: 11
  - name: SAMPLE_12
    description: 13 samples.
    value: 12
  - name: SAMPLE_13
    description: 14 samples.
    value: 13
  - name: SAMPLE_14
    description: 15 samples.
    value: 14
  - name: SAMPLE_15
    description: 16 samples.
    value: 15
enum/RR_SAMPLE_THRESHOLD:
  bit_size: 4
  variants:
  - name: SAMPLE_0
    description: At least 1 sampled "1", the final result is "1".
    value: 0
  - name: SAMPLE_1
    description: At least 2 sampled "1", the final result is "1".
    value: 1
  - name: SAMPLE_2
    description: At least 3 sampled "1", the final result is "1".
    value: 2
  - name: SAMPLE_3
    description: At least 4 sampled "1", the final result is "1".
    value: 3
  - name: SAMPLE_4
    description: At least 5 sampled "1", the final result is "1".
    value: 4
  - name: SAMPLE_5
    description: At least 6 sampled "1", the final result is "1".
    value: 5
  - name: SAMPLE_6
    description: At least 7 sampled "1", the final result is "1".
    value: 6
  - name: SAMPLE_7
    description: At least 8 sampled "1", the final result is "1".
    value: 7
  - name: SAMPLE_8
    description: At least 9 sampled "1", the final result is "1".
    value: 8
  - name: SAMPLE_9
    description: At least 10 sampled "1", the final result is "1".
    value: 9
  - name: SAMPLE_10
    description: At least 11 sampled "1", the final result is "1".
    value: 10
  - name: SAMPLE_11
    description: At least 12 sampled "1", the final result is "1".
    value: 11
  - name: SAMPLE_12
    description: At least 13 sampled "1", the final result is "1".
    value: 12
  - name: SAMPLE_13
    description: At least 14 sampled "1", the final result is "1".
    value: 13
  - name: SAMPLE_14
    description: At least 15 sampled "1", the final result is "1".
    value: 14
  - name: SAMPLE_15
    description: At least 16 sampled "1", the final result is "1".
    value: 15
enum/RR_TRG_SEL:
  bit_size: 1
  variants:
  - name: ENABLE
    description: External trigger.
    value: 0
  - name: DISABLE
    description: Internal trigger.
    value: 1
enum/VRSEL:
  bit_size: 1
  variants:
  - name: VREF0
    description: VREFH0.
    value: 0
  - name: VREF1
    description: VREFH1.
    value: 1
