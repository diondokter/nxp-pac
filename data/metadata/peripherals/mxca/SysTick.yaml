block/SysTick:
  description: M33 Systick module.
  items:
  - name: SYST_CSR
    description: SysTick Control and Status Register.
    byte_offset: 0
    fieldset: SYST_CSR
  - name: SYST_RVR
    description: SysTick Reload Value Register.
    byte_offset: 4
    fieldset: SYST_RVR
  - name: SYST_CVR
    description: SysTick Current Value Register.
    byte_offset: 8
    fieldset: SYST_CVR
  - name: SYST_CALIB
    description: SysTick Calibration Value Register.
    byte_offset: 12
    access: Read
    fieldset: SYST_CALIB
fieldset/SYST_CALIB:
  description: SysTick Calibration Value Register.
  fields:
  - name: TENMS
    description: Reload value to use for 10ms timing.
    bit_offset: 0
    bit_size: 24
  - name: SKEW
    description: Indicates whether the TENMS value is exact.
    bit_offset: 30
    bit_size: 1
    enum: SKEW
  - name: NOREF
    description: Indicates whether the device provides an alternative reference clock.
    bit_offset: 31
    bit_size: 1
    enum: NOREF
fieldset/SYST_CSR:
  description: SysTick Control and Status Register.
  fields:
  - name: ENABLE
    description: Enable/disable systick counter.
    bit_offset: 0
    bit_size: 1
    enum: ENABLE
  - name: TICKINT
    description: Enable Systick interrupt.
    bit_offset: 1
    bit_size: 1
    enum: TICKINT
  - name: CLKSOURCE
    description: Clock source selection.
    bit_offset: 2
    bit_size: 1
    enum: CLKSOURCE
  - name: COUNTFLAG
    description: Returns 1 if timer counted to 0 since the last read of this register.
    bit_offset: 16
    bit_size: 1
fieldset/SYST_CVR:
  description: SysTick Current Value Register.
  fields:
  - name: CURRENT
    description: Reads current counter value at the time the register is accessed. Any write to the register clears the register to 0.
    bit_offset: 0
    bit_size: 24
fieldset/SYST_RVR:
  description: SysTick Reload Value Register.
  fields:
  - name: RELOAD
    description: Value to load into the SysTick Current Value Register when the counter reaches 0.
    bit_offset: 0
    bit_size: 24
enum/CLKSOURCE:
  bit_size: 1
  variants:
  - name: EXTERNAL_CLOCK
    description: external clock.
    value: 0
  - name: PROCESSOR_CLOCK
    description: processor clock.
    value: 1
enum/ENABLE:
  bit_size: 1
  variants:
  - name: COUNTER_DISABLED
    description: counter disabled.
    value: 0
  - name: COUNTER_ENABLED
    description: counter enabled.
    value: 1
enum/NOREF:
  bit_size: 1
  variants:
  - name: CLOCK_PROVIDED
    description: The alternative reference clock is provided.
    value: 0
  - name: CLOCK_DISABLED
    description: The alternative reference clock is not provided.
    value: 1
enum/SKEW:
  bit_size: 1
  variants:
  - name: EXACT_VALUE
    description: 10ms calibration value is exact.
    value: 0
  - name: INEXACT_VALUE
    description: 10ms calibration value is inexact, because of the clock frequency.
    value: 1
enum/TICKINT:
  bit_size: 1
  variants:
  - name: INTERRUPT_DISABLED
    description: counting down to 0 does not assert the SysTick exception request.
    value: 0
  - name: INTERRUPT_ENABLED
    description: counting down to 0 asserts the SysTick exception request.
    value: 1
