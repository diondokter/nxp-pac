block/DBGMAILBOX:
  description: Debug Mailbox.
  items:
  - name: CSW
    description: Command and Status Word.
    byte_offset: 0
    fieldset: CSW
  - name: REQUEST
    description: Request Value.
    byte_offset: 4
    fieldset: REQUEST
  - name: RETURN
    description: Return Value.
    byte_offset: 8
    fieldset: RETURN
  - name: ID
    description: Identification.
    byte_offset: 252
    access: Read
    fieldset: ID
fieldset/CSW:
  description: Command and Status Word.
  fields:
  - name: RESYNCH_REQ
    description: Resynchronization Request.
    bit_offset: 0
    bit_size: 1
  - name: REQ_PENDING
    description: Request Pending.
    bit_offset: 1
    bit_size: 1
  - name: DBG_OR_ERR
    description: DBGMB Overrun Error.
    bit_offset: 2
    bit_size: 1
  - name: AHB_OR_ERR
    description: AHB Overrun Error.
    bit_offset: 3
    bit_size: 1
  - name: SOFT_RESET
    description: Soft Reset.
    bit_offset: 4
    bit_size: 1
    enum: SOFT_RESET
  - name: CHIP_RESET_REQ
    description: Chip Reset Request.
    bit_offset: 5
    bit_size: 1
    enum: CHIP_RESET_REQ
fieldset/ID:
  description: Identification.
  fields:
  - name: ID
    description: Identification Value.
    bit_offset: 0
    bit_size: 32
fieldset/REQUEST:
  description: Request Value.
  fields:
  - name: REQUEST
    description: Request Value.
    bit_offset: 0
    bit_size: 32
fieldset/RETURN:
  description: Return Value.
  fields:
  - name: RET
    description: Return Value.
    bit_offset: 0
    bit_size: 32
enum/CHIP_RESET_REQ:
  bit_size: 1
  variants:
  - name: NO_EFF
    description: No effect.
    value: 0
  - name: RESET
    description: Reset.
    value: 1
enum/SOFT_RESET:
  bit_size: 1
  variants:
  - name: NO_EFF
    description: No effect.
    value: 0
  - name: RESET
    description: Reset.
    value: 1
