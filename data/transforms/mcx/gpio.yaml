transforms:
  # MCX parts duplicate GPIO peripherals... Merge them all
  - !MergeEnums
    from: gpio\d+(_alias\d+)?::(.+)
    to: gpio::$2

  - !MergeFieldsets
    from: gpio\d+(_alias\d+)?::(.+)
    to: gpio::$2

  - !MergeFieldsets
    from: gpio\d+::(.+)
    to: gpio::$1

  - !MergeBlocks
    from: gpio(\d+)::Gpio(\d+)
    to: gpio::Gpio
    main: gpio::Gpio
    check: Layout

  - !MergeBlocks
    from: gpio(\d+)_alias(\d+)::Gpio(\d+)Alias(\d+)
    to: gpio::Gpio
    main: gpio::Gpio
    check: Layout

  - !Rename
    from: gpio0_alias(\d+)::(.*)
    to: gpio::$2
    type: All

  - !Rename
    from: gpio0::Gpio0
    to: gpio::Gpio
    type: All

  - !Delete
    from: gpio(\d+)(_alias(\d+))?::(.*)
