includes:
  - cm33.yaml
transforms:
  - !DeleteEnumVariants
    enum: inputmux::Dma0ItrigInmuxInp
    from: VAL22(.*)
  - !DeleteEnumVariants
    enum: inputmux::InpN
    from: VAL24(.*)
  - !DeleteEnumVariants
    enum: inputmux::Timer0captselCaptsel
    from: VAL25(.*)
  - !DeleteEnumVariants
    enum: inputmux::Timer1captselCaptsel
    from: VAL25(.*)
  - !DeleteEnumVariants
    enum: inputmux::Timer2captselCaptsel
    from: VAL25(.*)
  - !DeleteEnumVariants
    enum: inputmux::Timer3captselCaptsel
    from: VAL25(.*)
  - !DeleteEnumVariants
    enum: inputmux::Timer4captselCaptsel
    from: VAL25(.*)

  # - !DeleteEnumVariants
  #   enum: syscon::AdcclkselSel
  #   from: ENUM_0X[5-7]

  - !DeleteEnums
    from: syscon::AdcclkselSel

  - !Add
    ir:
      enum/syscon::AdcclkselSel:
        description: ADC clock source select
        bit_size: 3
        variants:
          - name: mainclk
            description: Main clk.
            value: 0x00
          - name: pll0
            description: PLL0 clk.
            value: 0x01
          - name: fro96
            description: FRO 96 MHZ clk.
            value: 0x02
          - name: none
            description: No clk.
            value: 0x04

  # yuppiii it does what i wanted it to do :D
  - !Add
    ir:
      enum/puf::Key:
        description: Key destination for PUF key.
        bit_size: 8
        variants:
          - name: aes
            description: Send key to AES engine.
            value: 0x56
          - name: prince0
            description: Send key to PRINCE engine for memory layout 0.
            value: 0x59
          - name: prince1
            description: Send key to PRINCE engine for memory layout 1.
            value: 0x65
          - name: prince2
            description: Send key to PRINCE engine for memory layout 2.
            value: 0x95
          - name: none
            description: Do not send key to any hardware engine.
            value: 0x55

  #   as a wise man once said(random comment in the lpc55-pac): "Fix bogus offsets"

  - !ModifyByteOffset
    blocks: sau::Sau
    add_offset: -208 # 0xd0

  #   IT WORKS yey :D

  - !DeleteRegisters
    block: syscon::Syscon
    from: ahbclkctrlx\d
  - !DeleteRegisters
    block: syscon::Syscon
    from: presetctrlx\d

  - !Delete
    from: syscon::Ahbclkctrlx\d
  - !Delete
    from: syscon::Presetctrlx\d

  - !MergeEnums
    from: iocon::Pio\d+Asw
    to: iocon::PioAsw
  - !MergeEnums
    from: iocon::Pio\d+Digimode
    to: iocon::PioDigimode
  - !MergeEnums
    from: iocon::Pio\d+Func
    to: iocon::PioFunc
  - !MergeEnums
    from: iocon::Pio\d+Mode
    to: iocon::PioMode
  - !MergeEnums
    from: iocon::Pio\d+Od
    to: iocon::PioOd
  - !MergeEnums
    from: iocon::Pio\d+Slew
    to: iocon::PioSlew
  - !MergeEnums
    from: iocon::Pio\d+Ssel
    to: iocon::PioSsel
  - !MergeEnums
    from: iocon::Pio\d+I2cfilter
    to: iocon::PioI2cfilter
  - !MergeEnums
    from: iocon::Pio\d+Filteroff
    to: iocon::PioFilteroff
  - !MergeEnums
    from: iocon::Pio\d+Egp
    to: iocon::PioEgp

  - !MakeRegisterArray
    blocks: iocon::Iocon
    from: pio0_\d+
    to: pio0
  - !MakeRegisterArray
    blocks: iocon::Iocon
    from: pio1_\d+
    to: pio1

  - !MergeFieldsets
    from: iocon::Pio\d+
    to: iocon::Pio
    main: iocon::Pio013
    check: NoCheck

  - !AddFields
    fieldset: iocon::Pio
    fields:
      - name: asw
        description: "Analog switch input control."
        bit_offset: 10
        bit_size: 1
        enum: iocon::PioAsw

  - !MergeEnums
    from: syscon::Fc\dRst
    to: syscon::FcRst
  - !MergeEnums
    from: syscon::Fcclksel\dSel
    to: syscon::FcclkselSel

  - !MakeRegisterArray
    blocks: syscon::Syscon
    from: fcclksel\d
    to: fcclksel
  - !MergeFieldsets
    from: syscon::Fcclksel\d
    to: syscon::Fcclksel

  - !MakeRegisterArray
    blocks: syscon::Syscon
    from: flexfrg\dctrl
    to: flexfrgctrl
  - !MergeFieldsets
    from: syscon::Flexfrg\dctrl
    to: syscon::Flexfrgctrl

  - !MakeRegisterArray
    blocks: syscon::Syscon
    from: fcclkselx\d
    to: fcckkselx
  - !MergeFieldsets
    from: syscon::Fcclkselx\d
    to: syscon::Fcclkselx

  - !MakeRegisterArray
    blocks: syscon::Syscon
    from: flexfrgxctrl\d
    to: flexfrgxctrl
  - !MergeFieldsets
    from: syscon::Flexfrgxctrl\d
    to: syscon::Flexfrgxctrl

  - !MakeFieldArray
    fieldsets: syscon::Presetctrl1
    from: fc\d_rst
    to: fc_rst
  - !MakeFieldArray
    fieldsets: syscon::Presetctrl1
    from: set_fc\d_rst
    to: set_fc_rst

  - !MakeFieldArray
    fieldsets: syscon::Ahbclkctrl1
    from: fc\d
    to: fc
  - !MakeFieldArray
    fieldsets: syscon::Ahbclkctrl1
    from: set_fc\d
    to: set_fc

  # SCTimer
  - !MakeRegisterArray
    blocks: sct0::Sct0
    from: match\d+
    to: match_
  - !MakeRegisterArray
    blocks: sct0::Sct0
    from: matchrel\d+
    to: matchrel
  - !MakeRegisterArray
    blocks: sct0::Sct0
    from: cap\d+
    to: cap
  - !MakeRegisterArray
    blocks: sct0::Sct0
    from: capctrl\d+
    to: capctrl
  - !MakeFieldArray
    fieldsets: sct0::Res
    from: o\d+res
    to: ores
  - !MakeFieldArray
    fieldsets: sct0::Outputdirctrl
    from: setclr\d+
    to: setclr
  - !MakeFieldArray
    fieldsets: sct0::Input
    from: ain\d+
    to: ain
  - !MakeFieldArray
    fieldsets: sct0::Input
    from: sin\d+
    to: sin
  - !MergeEnums
    from: sct0::O\d+res
    to: sct0::Ores
  - !MergeEnums
    from: sct0::Setclr\d+
    to: sct0::Setclr
  - !MergeFieldsets
    from: sct0::Cap\d+
    to: sct0::Cap
  - !MergeFieldsets
    from: sct0::Capctrl\d+
    to: sct0::Capctrl
  - !MergeFieldsets
    from: sct0::Matchrel\d+
    to: sct0::Matchrel
  - !MergeFieldsets
    from: sct0::Match\d+
    to: sct0::Match
  - !MergeEnums
    from: sct0::Bidir[L,H]
    to: sct0::Bidir

  # Turn `clr` and `set` in `` into bit arrays.
  - !DeleteFields
    fieldset: sct0::Out(Clr|Set)
    from: .*

  - !AddFields
    fieldset: sct0::OutClr
    fields:
      - name: clr
        bit_offset: 0
        bit_size: 1
        array:
          len: 16
          stride: 1
  - !AddFields
    fieldset: sct0::OutSet
    fields:
      - name: set
        bit_offset: 0
        bit_size: 1
        array:
          len: 16
          stride: 1
