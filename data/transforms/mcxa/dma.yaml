transforms:
  - !Rename
    from: edma(_)?0_tcd0::vals::Ssize
    to: edma_0_tcd0::vals::Size

  - !ModifyFieldsEnum
    fieldset: edma(_)?0_tcd0::regs::TcdAttr
    field: dsize
    enum: edma_0_tcd0::vals::Size

  - !DeleteEnums
    from: edma(_)?0_tcd0::vals::Int

  - !DeleteEnums
    from: edma(_)?0_tcd0::vals::(S|D)mod

  - !RenameInterrupts
    from: DMA0_CH([0-9])
    to: DMA_CH$1
