transforms:
  - !Rename
    from: hsadc::(.*)
    to: adc::$1
    type: All
  
  - !Rename
    from: adc::Hsadc
    to: adc::Adc
    type: Block

  - !MergeEnums
    from: adc::vals::Cmdl(\d+)(.+)
    to: adc::vals::$2

  - !MergeFieldsets
    from: adc::regs::Cmdl(\d+)
    to: adc::regs::Cmdl

  - !MakeRegisterArray
    blocks: adc::Adc
    from: cmdl(\d+)
    to: cmdl

  - !MergeEnums
    from: adc::vals::Cmdh(\d+)(.+)
    to: adc::vals::$2

  - !MergeFieldsets
    from: adc::regs::Cmdh(\d+)
    to: adc::regs::Cmdh
  
  - !MakeRegisterArray
    blocks: adc::Adc
    from: cmdh(\d+)
    to: cmdh

  - !DeleteEnums
    from: adc::vals::Swt(\d+)

  # ADC channel select is not correct at all, better use bare u8.
  - !DeleteEnums
    from: adc::vals::Adch

  - !MakeFieldArray
    fieldsets: adc::regs::Swtrig
    from: swt(\d+)
    to: swt
