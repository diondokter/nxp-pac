transforms:
  - !Rename
    from: hsadc::(.*)
    to: adc::$1
    type: All

  - !Rename
    from: adc::Hsadc
    to: adc::Adc
    type: Block

  - !MergeEnums
    from: adc::Cmdl(\d+)(.+)
    to: adc::$2

  - !MergeFieldsets
    from: adc::Cmdl(\d+)
    to: adc::Cmdl

  - !MakeRegisterArray
    blocks: adc::Adc
    from: cmdl(\d+)
    to: cmdl

  - !MergeEnums
    from: adc::Cmdh(\d+)(.+)
    to: adc::$2

  - !MergeFieldsets
    from: adc::Cmdh(\d+)
    to: adc::Cmdh

  - !MakeRegisterArray
    blocks: adc::Adc
    from: cmdh(\d+)
    to: cmdh

  - !DeleteEnums
    from: adc::Swt(\d+)

  # ADC channel select is not correct at all, better use bare u8.
  - !DeleteEnums
    from: adc::Adch

  - !MakeFieldArray
    fieldsets: adc::Swtrig
    from: swt(\d+)
    to: swt
