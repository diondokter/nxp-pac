transforms:
  # Fix badly OCR'd typo
  - !RenameEnumVariants
    enum: ctimer::Mr[0-9](.+)
    from: Mris([0-9])
    to: Mr1S$1

  - !RenameEnumVariants
    enum: ctimer::Mr[0-9](.+)
    from: Mr[0-9]([A-Za-z_]+[0-9])
    to: Mr$1

  - !DeleteEnums
    from: ctimer::Cap\d+(.+)
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Em(\d+)
    to: ctimer::Em
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Emc(\d+)
    to: ctimer::Emc
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Mr(\d+)I
    to: ctimer::MrI
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Mr(\d+)R
    to: ctimer::Mrr
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Mr(\d+)Rl
    to: ctimer::Mrrl
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Mr(\d+)S
    to: ctimer::Mrs
    skip_unmergeable: false

  - !MergeEnums
    from: ctimer::Pwmen(\d+)
    to: ctimer::Pwmen
    skip_unmergeable: false
