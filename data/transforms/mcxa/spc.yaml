transforms:
  - !DeleteEnums
    from: spc0::(Busy|Req|Ack)

  - !DeleteEnumVariants
    enum: spc0::Vsm
    from: .*

  - !AddEnumVariants
    enum: spc0::Vsm
    variants:
      - { name: Sram1v0, value: 1, description: "SRAM configured for 1.0V" }
      - { name: Sram1v1, value: 2, description: "SRAM configured for 1.1V" }
      - { name: Sram1v2, value: 3, description: "SRAM configured for 1.2V" }
