transforms:
  - !Delete
    from: sgi0::Sgi(Key|Datin|Datout)\d?[a-d]
  
  - !DeleteRegisters
    block: sgi0::Sgi0
    from: sgi_(key|datin|datout)\d?[a-d]

  - !Add
    ir:
      block/sgi::Data:
        byte_offset: 0
        items:
        - name: word
          byte_offset: 0
          array:
            offsets: [96, 64, 32, 0] # Cursed ordering
          fieldset: sgi::DataWord
      fieldset/sgi::DataWord:
        bit_size: 32
        fields: # No fields

  - !AddRegisters
    block: sgi0::Sgi0
    registers:
      - name: datin
        block: sgi::Data
        byte_offset: 512
        array:
          len: 4
          stride: 16
      - name: key
        block: sgi::Data
        byte_offset: 576
        array:
          len: 8
          stride: 16
      - name: datout
        block: sgi::Data
        byte_offset: 704
