transforms:
  - !RenamePeripherals
    from: EDMA1_TCD0
    to: EDMA_1_TCD0

  - !Rename
    from: edma1_tcd0::(.*)
    to: edma_1_tcd0::$1
    type: All

  - !Rename
    from: edma_1_tcd0::Ssize
    to: edma_1_tcd0::Size

  - !ModifyFieldsEnum
    fieldset: edma_1_tcd0::TcdAttr
    field: dsize
    enum: edma_1_tcd0::Size

  - !DeleteEnums
    from: edma_1_tcd0::Int

  - !DeleteEnums
    from: edma_1_tcd0::(S|D)mod
