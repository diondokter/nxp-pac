transforms:
  # Pick I3C Type variant (I3C1 has extra Variant:3 BT)
  - !ModifyFieldsEnum
    fieldset: i3c1::Mctrl
    field: type_
    enum: i3c::Type

  # Delete unused Type enum
  - !Delete
    from: i3c1::Type
    type: Enum

  - !MergeEnums
    from: i3c1?::(.*)
    to: i3c::$1

  # Select (less capable) I3C (without 1) variants
  - !ModifyRegisters
    blocks: i3c1::I3c1
    registers: sconfig
    fieldset: i3c::Sconfig

  - !ModifyRegisters
    blocks: i3c1::I3c1
    registers: merrwarn
    fieldset: i3c::Merrwarn

  - !ModifyRegisters
    blocks: i3c1::I3c1
    registers: scapabilities2
    fieldset: i3c::Scapabilities2

  - !ModifyRegisters
    blocks: i3c1::I3c1
    registers: scapabilities
    fieldset: i3c::Scapabilities

  - !ModifyRegisters
    blocks: i3c1::I3c1
    registers: serrwarn
    fieldset: i3c::Serrwarn

  - !Delete
    from: i3c1::(Merrwarn|Sconfig|Scapabilities|Scapabilities2|Serrwarn)

  - !MergeFieldsets
    from: i3c1?::(.*)
    to: i3c::$1

