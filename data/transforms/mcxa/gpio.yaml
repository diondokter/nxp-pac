transforms:
  # MCXA uses rgpio group name
  - !Rename
    from: rgpio::Rgpio
    to: gpio::Gpio
    type: All

  - !Rename
    from: rgpio::(.*)
    to: gpio::$1
    type: All

  - !DeleteEnums
    from: gpio::(Ptto|Pdi|Pdo)(\d+)

  - !MergeEnums
    from: gpio::(Pdd|Pid|Ptso|Ptco)(\d+)
    to: gpio::$1

  - !MakeFieldArray
    fieldsets: gpio::Pddr
    from: pdd(\d+)
    to: pdd

  - !MakeFieldArray
    fieldsets: gpio::Pidr
    from: pid(\d+)
    to: pid

  - !MakeFieldArray
    fieldsets: gpio::Psor
    from: ptso(\d+)
    to: ptso

  - !MakeFieldArray
    fieldsets: gpio::Pcor
    from: ptco(\d+)
    to: ptco

  - !MakeFieldArray
    fieldsets: gpio::Ptor
    from: ptto(\d+)
    to: ptto

  - !MakeFieldArray
    fieldsets: gpio::Pdir
    from: pdi(\d+)
    to: pdi

  - !MakeFieldArray
    fieldsets: gpio::Pdor
    from: pdo(\d+)
    to: pdo

  - !MakeRegisterArray
    blocks: gpio::Gpio
    from: isfr(\d+)
    to: isfr

  - !MergeFieldsets
    from: gpio::Isfr\d
    to: gpio::Isfr
