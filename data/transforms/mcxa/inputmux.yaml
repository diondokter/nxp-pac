transforms:
  - !MergeEnums
    from: inputmux0::(.+)(\d+)(TrigTrigin|TrigInp|trigInp|InputInp|Inp)
    to: inputmux0::$1$3
    skip_unmergeable: true

  - !MergeEnums
    from: inputmux0::TrigIn(\d+)Val
    to: inputmux0::TrigInVal

  - !MergeEnums
    from: inputmux0::FlexPwm(.+)Trigin
    to: inputmux0::FlexPwmTrigin

  - !MergeEnums
    from: inputmux0::Qdc(\d+)(Home|Icap|Index)Inp
    to: inputmux0::Qdc${2}Inp

  - !MergeFieldsets
    from: inputmux0::(Lpi2c|Lpuart|Lpspi|Cmp|Adc|Dac)(\d*)(Trig|Input|)$
    to: inputmux0::$1$3

  - !MergeFieldsets
    from: inputmux0::FlexPwm(.+)
    to: inputmux0::FlexPwm

  - !MakeRegisterArray
    blocks: inputmux0::Inputmux0
    from: lpuart(\d+)
    to: lpuart
