transforms:
  - !DeleteRegisters
    block: trng0::Trng0
    from: ent0

  - !Rename
    from: trng0::Ent0
    to: trng0::Ent
    type: Fieldset

  - !AddRegisters
    block: trng0::Trng0
    registers:
      - name: ent
        description: Entropy Read Register
        byte_offset: 64
        fieldset: trng0::Ent
        array:
          len: 8
          stride: 4

  - !DeleteEnums
    from: trng0::(IntMaskHwErr|IntMaskIntgFlt|IntStatusFrqCtFail|IntStatusHwErr|IntStatusIntgFlt|LocalEdc|LocalEdcClr|NoPrgm|RedFsm|RedFsmClr|RedSigs|RedSigsClr|IntMaskFrqCtFail|IntMaskEntVal|IntCtrlIntgFlt|IntCtrlHwErr|IntCtrlFrqCtFail|IntCtrlEntVal|BusEdcClr|BusEdc|IntStatusEntVal)
