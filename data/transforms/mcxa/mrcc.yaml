transforms:
  - !MergeEnums
    from: mrcc0::Mrcc(.+)(\d+)(.+)
    to: mrcc0::Mrcc$3
    skip_unmergeable: true

  # Merge unmergeable per number, but keep the group intact.
  - !MergeEnums
    from: mrcc0::Mrcc(.+)(\d+)(.+)
    to: mrcc0::Mrcc$1$3

  - !MergeEnums
    from: mrcc0::Mrcc(.*)(\d*)(ClkdivReset|ClkdivHalt|ClkdivUnstab)
    to: mrcc0::Mrcc$3

  - !Rename
    from: mrcc0::Mrcc(.+)
    to: mrcc0::$1

  - !MergeFieldsets
    from: mrcc0::Mrcc(.+)(\d+)(.+)
    to: mrcc0::$1$3
