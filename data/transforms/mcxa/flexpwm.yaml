transforms:
  # Fix names of sm*sel(23|45) enum variants such that they overlap
  - !RenameEnumVariants
    enum: flexpwm::Sm\d+sel\d+
    from: (.*)Sm\d+(pwm|out)\d+
    to: $1$2

  - !RenameEnumVariants
    enum: flexpwm::Sm\d+sel\d+
    from: Pwm\d+Exta
    to: PwmExta

  - !MergeEnums
    from: flexpwm::Sm\d(.+)
    to: flexpwm::Sm$1

  - !MergeEnums
    from: flexpwm::([^\d]+)\d+([^\d]*)$
    to: flexpwm::$1$2
    skip_unmergeable: true
    check: Layout

  - !MergeFieldsets
    from: flexpwm::Sm\d(.+)
    to: flexpwm::Sm$1

  - !RenameFields
    fieldset: flexpwm::Smval\d
    from: ([^\d]+)\d+
    to: $1

  - !MergeFieldsets
    from: flexpwm::Smval\d
    to: flexpwm::Smval

  - !MakeRegisterArray
    blocks: flexpwm::Flexpwm
    from: (sm\d+val)\d+
    to: $1
