transforms:
  - !Rename
    from: mbc0::Mbc0Dom0(.+)
    to: mbc0::$1

  - !MergeEnums
    from: mbc0::Mem(\d+)BlkCfgW(\d+)(Nse|Mbacsel)(\d+)
    to: mbc0::MemBlkCfgW$3

  - !Rename
    from: mbc0::MemBlkCfgW(.+)
    to: mbc0::$1

  - !Rename
    from: mbc0::Mbc0(.+)
    to: mbc0::$1

  - !MergeFieldsets
    from: mbc0::Dom0Mem(\d+)BlkCfgW(\d+)
    to: mbc0::MemnBlkCfgW

  - !MakeRegisterArray
    blocks: mbc0::Mbc0
    from: mbc0_dom0_mem0_blk_cfg_w(\d+)
    to: mbc0_dom0_mem0_blk_cfg_wn
